<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no,maximum-scale=1">
<title>🐻 곰사냥</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#060e1c;font-family:'Jua',sans-serif;touch-action:none;user-select:none;-webkit-user-select:none;}
canvas{display:block;position:absolute;top:0;left:0;z-index:1;touch-action:none;}

/* ── HUD ── */
#hud{position:absolute;top:0;left:0;right:0;z-index:30;display:flex;gap:5px;align-items:center;padding:8px 10px 4px;background:linear-gradient(180deg,rgba(0,5,18,0.92) 0%,transparent 100%);pointer-events:none;}
.pill{display:flex;align-items:center;gap:4px;background:rgba(0,6,22,0.85);border:1px solid rgba(80,160,255,0.22);border-radius:20px;padding:4px 10px;backdrop-filter:blur(6px);}
.pico{font-size:12px;}.pval{font-size:13px;color:#e8f4ff;font-weight:bold;min-width:26px;}

/* HP + Wave */
#hpWrap{position:absolute;top:44px;left:10px;z-index:30;pointer-events:none;width:158px;}
#hpBar{height:13px;background:rgba(0,0,0,0.65);border:1.5px solid rgba(220,60,60,0.4);border-radius:7px;overflow:hidden;position:relative;}
#hpFill{height:100%;transition:width .15s,background .3s;}
#hpShield{position:absolute;top:0;left:0;height:100%;background:linear-gradient(90deg,rgba(0,150,255,0.6),rgba(100,220,255,0.4));pointer-events:none;}
#hpTxt{font-size:10px;color:#ffcdd2;margin-top:2px;text-align:center;}
#expBar{height:6px;background:rgba(0,0,0,0.5);border:1px solid rgba(255,213,79,0.25);border-radius:3px;overflow:hidden;margin-top:3px;}
#expFill{height:100%;background:linear-gradient(90deg,#f57f17,#ffd54f);width:0%;transition:width .3s;}
#expTxt{font-size:8px;color:#ffd54f;text-align:center;margin-top:1px;}

#waveChip{position:absolute;top:44px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#0d2957,#0d47a1);border:1.5px solid #42a5f5;border-radius:20px;padding:4px 14px;font-size:13px;color:#e3f2fd;z-index:30;pointer-events:none;white-space:nowrap;box-shadow:0 0 18px rgba(66,165,245,0.35);}

/* Minimap */
#mmWrap{position:absolute;bottom:88px;right:10px;z-index:30;pointer-events:none;background:rgba(3,8,22,0.82);border:1.5px solid rgba(80,180,255,0.4);border-radius:10px;padding:5px;box-shadow:0 0 14px rgba(30,100,255,0.25);}
#mmLabel{font-size:8px;color:rgba(140,200,255,0.75);text-align:center;margin-bottom:3px;letter-spacing:.5px;display:block;}
#minimapCanvas2{border-radius:6px;display:block;}

/* Goal & Reincarnation */
#goalBar{position:absolute;top:68px;left:10px;z-index:30;pointer-events:none;width:158px;}
#goalLabel{font-size:9px;color:#ffd54f;margin-bottom:2px;}
#goalTrack{height:7px;background:rgba(0,0,0,0.5);border:1px solid rgba(255,213,79,0.28);border-radius:4px;overflow:hidden;}
#goalFill{height:100%;background:linear-gradient(90deg,#f57f17,#ffd54f);width:0%;transition:width .3s;}
#goalTxt{font-size:9px;color:#ffd54f;text-align:right;margin-top:1px;}

#reinChip{position:absolute;top:110px;left:10px;z-index:30;pointer-events:none;background:linear-gradient(135deg,rgba(106,27,154,0.85),rgba(49,27,146,0.85));border:1px solid rgba(179,136,255,0.4);border-radius:14px;padding:3px 10px;font-size:10px;color:#e1bee7;backdrop-filter:blur(4px);}

/* Skills */
#skills{position:absolute;left:10px;bottom:90px;z-index:100;display:flex;flex-direction:row;gap:7px;pointer-events:auto;}
.skbtn{width:56px;height:56px;border-radius:13px;background:rgba(3,10,30,0.95);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;border:2px solid #37474f;-webkit-tap-highlight-color:transparent;position:relative;overflow:hidden;box-shadow:inset 0 1px 0 rgba(255,255,255,0.06);}
.skbtn.ready{border-color:#ffd54f;box-shadow:0 0 18px rgba(255,213,79,0.5),inset 0 1px 0 rgba(255,255,255,0.1);}
.sk-name{font-size:7px;color:#90caf9;pointer-events:none;margin-top:1px;}
.sk-cd-ov{position:absolute;inset:0;border-radius:11px;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;font-size:15px;color:#fff;pointer-events:none;}

/* Bottom Bar */
#upgBar{position:absolute;bottom:0;left:0;right:0;z-index:100;background:linear-gradient(180deg,rgba(3,8,22,0.0) 0%,rgba(3,8,22,0.97) 15%);border-top:1px solid rgba(60,120,220,0.18);display:flex;overflow-x:auto;scrollbar-width:none;pointer-events:auto;min-height:82px;}
#upgBar::-webkit-scrollbar{display:none;}
.ub{flex:0 0 78px;padding:8px 3px;text-align:center;cursor:pointer;border-right:1px solid rgba(255,255,255,0.06);position:relative;-webkit-tap-highlight-color:transparent;transition:background .12s;}
.ub:active{background:rgba(80,160,255,0.1);}
.ub.dim{opacity:0.25;}
.ub.can-buy{background:rgba(40,110,45,0.22);}
.ub.can-buy::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#43a047,#66bb6a);}
.ub.equipped{background:rgba(255,160,0,0.15);}
.ub.equipped::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,#ff8f00,#ffd54f);}
.ub-ico{font-size:19px;display:block;line-height:1.3;}
.ub-name{font-size:7.5px;color:#90caf9;margin-top:1px;line-height:1.2;}
.ub-sub{font-size:7px;color:#546e7a;margin-top:1px;}
.ub-cost{font-size:11px;color:#ffd54f;font-weight:bold;}
.ub-badge{position:absolute;top:3px;right:3px;font-size:7px;background:rgba(255,80,80,0.8);color:#fff;border-radius:4px;padding:0 3px;}

/* Overlays */
#overlay{position:absolute;inset:0;z-index:200;pointer-events:auto;display:flex;align-items:center;justify-content:center;}
#overlay.h{display:none!important;}
.pbox{background:linear-gradient(145deg,#080f22,#0e1e3a);border:1px solid rgba(80,160,255,0.28);border-radius:24px;padding:28px 22px;text-align:center;width:92%;max-width:360px;box-shadow:0 0 60px rgba(10,60,200,0.25),inset 0 1px 0 rgba(255,255,255,0.05);}
.pbox h1{font-size:26px;color:#fff;margin:6px 0;}
.pbox p{font-size:13px;color:#90caf9;line-height:1.65;margin-bottom:18px;}
.pbtn{background:linear-gradient(135deg,#e53935,#ff7043);border:none;border-radius:22px;padding:12px 32px;font-family:'Jua',sans-serif;font-size:18px;color:#fff;cursor:pointer;transition:transform .1s,box-shadow .1s;margin:4px;box-shadow:0 4px 16px rgba(229,57,53,0.35);}
.pbtn:active{transform:scale(0.95);}
.pbtn.blue{background:linear-gradient(135deg,#1565c0,#1976d2);box-shadow:0 4px 16px rgba(21,101,192,0.4);}
.pbtn.green{background:linear-gradient(135deg,#2e7d32,#43a047);box-shadow:0 4px 16px rgba(46,125,50,0.4);}
.pbtn.purple{background:linear-gradient(135deg,#4527a0,#6a1b9a);box-shadow:0 4px 16px rgba(69,39,160,0.5);}

/* Shop Overlay */
#shopOverlay{position:absolute;inset:0;z-index:200;pointer-events:auto;display:flex;align-items:center;justify-content:center;background:rgba(0,4,18,0.92);}
#shopOverlay.h{display:none!important;}
.sbox{background:linear-gradient(145deg,#080f22,#0e1e3a);border:1px solid rgba(80,160,255,0.28);border-radius:24px;padding:22px 18px;width:94%;max-width:400px;max-height:90vh;overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(80,160,255,0.3) transparent;}
.sbox::-webkit-scrollbar{width:4px;}.sbox::-webkit-scrollbar-thumb{background:rgba(80,160,255,0.3);border-radius:2px;}
.sbox h2{font-size:20px;color:#fff;margin-bottom:4px;}
.stab{display:flex;gap:6px;margin-bottom:14px;flex-wrap:wrap;}
.stab-btn{padding:6px 12px;border-radius:14px;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:#90caf9;font-family:'Jua',sans-serif;font-size:12px;cursor:pointer;}
.stab-btn.active{background:rgba(80,160,255,0.18);border-color:rgba(80,160,255,0.4);color:#e3f2fd;}
.si{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.035);border:1px solid rgba(80,160,255,0.1);border-radius:12px;padding:10px 12px;margin:6px 0;cursor:pointer;text-align:left;transition:background .12s,border-color .12s;}
.si:hover,.si:active{background:rgba(80,160,255,0.08);border-color:rgba(80,160,255,0.25);}
.si.owned{border-color:rgba(102,187,106,0.35);}
.si.equipped2{border-color:rgba(255,160,0,0.5);background:rgba(255,140,0,0.08);}
.si.locked{opacity:0.32;pointer-events:none;}
.si.afford{border-color:rgba(102,187,106,0.4);}
.si-ico2{font-size:24px;flex-shrink:0;width:34px;text-align:center;}
.si-info{flex:1;min-width:0;}
.si-name2{font-size:13px;color:#e8f4ff;font-weight:bold;}
.si-desc2{font-size:9.5px;color:#607d8b;line-height:1.4;margin-top:2px;}
.si-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:4px;}
.si-tag{font-size:8px;padding:1px 5px;border-radius:4px;font-weight:bold;}
.si-cost2{font-size:13px;color:#ffd54f;font-weight:bold;white-space:nowrap;text-align:right;}
.si-cost2 small{display:block;font-size:9px;color:#78909c;}

/* Banners & Overlays */
#banner{position:absolute;top:24%;left:50%;transform:translate(-50%,-50%);font-size:26px;color:#fff;text-shadow:0 2px 14px rgba(100,200,255,0.95);opacity:0;z-index:48;pointer-events:none;text-align:center;transition:opacity .25s;white-space:pre;}
#banner.on{opacity:1;}
#dmgOv{position:absolute;inset:0;z-index:60;pointer-events:none;background:radial-gradient(ellipse at center,transparent 38%,rgba(220,20,20,0.7) 100%);opacity:0;transition:opacity .08s;}
#dmgOv.on{opacity:1;}
#blizzOv{position:absolute;inset:0;z-index:55;pointer-events:none;background:linear-gradient(135deg,rgba(100,200,255,0.18),rgba(50,120,200,0.12));opacity:0;transition:opacity .5s;}
.ft{position:absolute;pointer-events:none;font-weight:bold;font-size:15px;text-shadow:0 1px 5px #000;z-index:50;animation:ftA .9s forwards;}
@keyframes ftA{0%{opacity:1;transform:translateY(0);}100%{opacity:0;transform:translateY(-50px);}}

/* Reincarnation screen */
#reinScreen{position:absolute;inset:0;z-index:250;background:radial-gradient(ellipse at center,rgba(106,27,154,0.95),rgba(3,0,12,0.98));display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;}
#reinScreen.h{display:none!important;}
.rein-title{font-size:40px;color:#fff;text-shadow:0 0 30px rgba(200,100,255,0.9);}
.rein-sub{font-size:16px;color:#ce93d8;text-align:center;line-height:1.7;}
.rein-bonus{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin:8px 0;}
.rb{background:rgba(255,255,255,0.08);border:1px solid rgba(200,100,255,0.3);border-radius:12px;padding:10px 14px;text-align:center;min-width:90px;}
.rb-ico{font-size:24px;}
.rb-name{font-size:11px;color:#e1bee7;margin-top:4px;}
.rb-val{font-size:14px;color:#ce93d8;font-weight:bold;}
.rein-stars{font-size:28px;letter-spacing:4px;color:#ffd54f;}
</style>
</head>
<body>
<canvas id="c"></canvas>
<canvas id="minimapCanvas" width="115" height="115" style="display:none;"></canvas>

<div id="hud">
  <div class="pill"><span class="pico">🎒</span><span class="pval" id="hM">0/50</span></div>
  <div class="pill"><span class="pico">🍖</span><span class="pval" id="hCooked">0</span></div>
  <div class="pill"><span class="pico">💰</span><span class="pval" id="hG">0</span></div>
  <div class="pill"><span class="pico">💀</span><span class="pval" id="hK">0</span></div>
</div>
<div id="hpWrap">
  <div id="hpBar"><div id="hpFill"></div><div id="hpShield" style="width:0%"></div></div>
  <div id="hpTxt"></div>
  <div id="expBar"><div id="expFill"></div></div>
  <div id="expTxt">경험치 0/100</div>
</div>
<div id="waveChip">Wave 1</div>
<div id="mmWrap">
  <div id="mmLabel">MINIMAP</div>
  <canvas id="minimapCanvas2" width="115" height="115"></canvas>
</div>
<div id="goalBar">
  <div id="goalLabel">💰 다음 목표</div>
  <div id="goalTrack"><div id="goalFill"></div></div>
  <div id="goalTxt">0/200</div>
</div>
<div id="reinChip">👻 환생 0회</div>

<div id="banner"></div>
<div id="dmgOv"></div>
<div id="blizzOv"></div>
<div id="skills"></div>
<div id="upgBar"></div>

<div id="overlay">
  <div class="pbox" id="startBox">
    <div style="font-size:60px;margin-bottom:4px;">🐻</div>
    <h1 style="font-size:30px;color:#ffd54f;text-shadow:0 0 20px rgba(255,200,0,0.6);">곰사냥</h1>
    <p>곰을 사냥해 고기를 팔고<br>골드로 무기·시설을 강화하라!<br><br>⚠️ <b style="color:#ef5350">전략 없이는 생존 불가!</b><br>환생할수록 더 강해진다</p>
    <button class="pbtn" id="startBtn">⚔️ 사냥 시작</button>
    <button class="pbtn blue" id="loadBtn" style="font-size:15px;padding:9px 24px;">📂 저장 불러오기</button>
  </div>
</div>

<div id="deathOverlay" class="overlay h" style="position:absolute;inset:0;z-index:220;background:rgba(0,0,0,0.88);display:flex;align-items:center;justify-content:center;">
  <div class="pbox">
    <div style="font-size:50px">💀</div>
    <h1 style="color:#ef5350">사망</h1>
    <p id="deathStats"></p>
    <button class="pbtn purple" id="reinBtn">✨ 환생하기</button>
    <button class="pbtn blue" id="noReinBtn" style="font-size:14px;padding:8px 20px;">🔄 그냥 부활 (골드 -30%)</button>
  </div>
</div>

<div id="reinScreen" class="h">
  <div class="rein-stars" id="reinStars">★</div>
  <div class="rein-title">✨ 환생!</div>
  <div class="rein-sub" id="reinSubTxt"></div>
  <div class="rein-bonus" id="reinBonuses"></div>
  <button class="pbtn purple" id="reinConfirmBtn" style="font-size:20px;padding:14px 40px;">🐻 다시 사냥 시작!</button>
</div>

<div id="shopOverlay" class="h">
  <div class="sbox">
    <h2>🏪 상점</h2>
    <p style="font-size:11px;color:#ffd54f;margin-bottom:10px;" id="shopGoldTxt">💰 보유 골드: 0</p>
    <div class="stab" id="shopTabs">
      <button class="stab-btn active" data-tab="weapon">⚔️ 무기</button>
      <button class="stab-btn" data-tab="atk">💪 공격 강화</button>
      <button class="stab-btn" data-tab="defend">🛡️ 방어</button>
      <button class="stab-btn" data-tab="camp">🏕️ 캠프</button>
      <button class="stab-btn" data-tab="skill">⚡ 스킬</button>
    </div>
    <div id="shopContent"></div>
    <button class="pbtn" onclick="closeShop()" style="margin-top:10px;font-size:15px;padding:9px 28px;">닫기</button>
  </div>
</div>

<script>
'use strict';
// ══════════════════════════════════════════════════════
//  CONSTANTS & DATA
// ══════════════════════════════════════════════════════
// Mobile-optimised: small ISO scale = wide field of view
const ISO_X=28,ISO_Y=14;

// Weapon definitions - each has unique traits
const WEAPONS=[
  {id:'dagger',   n:'단검',       ico:'🗡️',  cost:0,    dmg:12,  spd:0.30,range:1.4,aoe:0,   proj:false, trait:'빠른연속공격',   traitDesc:'공속 1위. 명중시 체력흡수 5%',    heal:0.05, col:'#cfd8dc', tags:['근접','빠름']},
  {id:'axe',      n:'전투도끼',   ico:'🪓',  cost:120,  dmg:35,  spd:0.52,range:1.8,aoe:0,   proj:false, trait:'방어구무시',    traitDesc:'적 방어력 50% 무시',              armorPen:0.5, col:'#00e5ff', tags:['근접','강타']},
  {id:'spear',    n:'장창',       ico:'🔱',  cost:200,  dmg:28,  spd:0.45,range:3.0,aoe:1.5, proj:false, trait:'관통공격',      traitDesc:'관통 광역 1.5칸',                 col:'#4dd0e1', tags:['근접','광역']},
  {id:'bow',      n:'사냥활',     ico:'🏹',  cost:280,  dmg:22,  spd:0.35,range:5.5,aoe:0,   proj:true,  trait:'독화살',        traitDesc:'명중시 3초간 독(초당4피해)',        poison:4, poisonT:3, col:'#69f0ae', tags:['원거리','독']},
  {id:'pistol',   n:'권총',       ico:'🔫',  cost:400,  dmg:55,  spd:0.40,range:5.0,aoe:0,   proj:true,  trait:'치명타+',       traitDesc:'치명타 확률 30%, 치명타 3배',    critRate:0.30,critMul:3, col:'#ef5350', tags:['원거리','크리']},
  {id:'shotgun',  n:'산탄총',     ico:'💥',  cost:550,  dmg:75,  spd:0.65,range:4.0,aoe:2.2, proj:true,  trait:'광역산탄',      traitDesc:'광역 2.2칸 동시 피해',            col:'#ff7043', tags:['원거리','광역']},
  {id:'smg',      n:'기관단총',   ico:'🔫',  cost:700,  dmg:32,  spd:0.12,range:4.5,aoe:0,   proj:true,  trait:'연사',          traitDesc:'최고 공속. 적 이동 5% 둔화',      slow:0.05, col:'#ffd54f', tags:['원거리','연사']},
  {id:'sniper',   n:'저격소총',   ico:'🎯',  cost:900,  dmg:280, spd:1.0, range:9.0,aoe:0,   proj:true,  trait:'관통탄',        traitDesc:'탄이 적을 관통. 저지 불가',        pierce:true, col:'#ce93d8', tags:['원거리','관통']},
  {id:'rpg',      n:'로켓런처',   ico:'🚀',  cost:1400, dmg:320, spd:1.3, range:5.5,aoe:3.5, proj:true,  trait:'거대폭발',      traitDesc:'폭발 광역 3.5칸. 자폭주의',      col:'#ff6f00', tags:['원거리','폭발']},
  {id:'claymore', n:'클레이모어', ico:'⚔️',  cost:1100, dmg:420, spd:0.55,range:3.2,aoe:5.0, proj:false, trait:'360°참격',      traitDesc:'전방위 5칸 광역. 웅장한 스윙',    col:'#ffd54f', tags:['근접','광역']},
  {id:'magic',    n:'마법지팡이', ico:'🪄',  cost:1800, dmg:180, spd:0.28,range:7.0,aoe:2.8, proj:true,  trait:'마법폭발',      traitDesc:'추적탄 + 광역. 보스특효',        boss:1.8, col:'#7c4dff', tags:['원거리','마법']},
  {id:'holy',     n:'신성검',     ico:'✨',  cost:3000, dmg:650, spd:0.45,range:4.0,aoe:6.5, proj:false, trait:'신성심판',      traitDesc:'전방위 6.5칸. 보스즉사5%',        boss:2.5,instakill:0.05, col:'#ffeb3b', tags:['근접','광역','마법']},
];

// Attack upgrades
const ATK_UPGRADES=[
  {id:'dmg1',    n:'공격력 강화 I',   ico:'⚔️',  cost:80,  desc:'공격력 +25%',        effect:'dmg', val:0.25},

const SAVE_KEY='bear_hunt_v4';
function getSaveData(){
  return {
    wave,reinCount,reinBonuses,
    P:{gold:P.gold,kills:P.kills,maxHp:P.maxHp,maxMeat:P.maxMeat,
       dmgMul:P.dmgMul,spdMul:P.spdMul,critBonus:P.critBonus,
       rangeBonus:P.rangeBonus,leechRate:P.leechRate,aoeBonus:P.aoeBonus,
       extraProj:P.extraProj,moveMul:P.moveMul,regenRate:P.regenRate,iFrameBonus:P.iFrameBonus},
    purchased:[...purchased],
    boughtWeapons:[...boughtWeapons],
    equippedWeaponId,
    campState:{...campState},
    unlockedSkills:unlockedSkills.map(s=>({id:s.def.id,cd:0})),
    timestamp:Date.now(),
  };
}
function save(){
  try{localStorage.setItem(SAVE_KEY,JSON.stringify(getSaveData()));showBanner('💾 저장 완료!');}
  catch(e){showBanner('❌ 저장 실패');}
}
function load(){
  try{
    const d=JSON.parse(localStorage.getItem(SAVE_KEY)||'null');
    if(!d)return false;
    wave=d.wave||1;reinCount=d.reinCount||0;
    Object.assign(reinBonuses,d.reinBonuses||{});
    Object.assign(P,d.P||{});P.hp=P.maxHp;P.wx=0;P.wy=0;P.dead=false;P.shield=P.maxHp*0;
    purchased.clear();(d.purchased||[]).forEach(x=>purchased.add(x));
    boughtWeapons.clear();(d.boughtWeapons||['dagger']).forEach(x=>boughtWeapons.add(x));
    equippedWeaponId=d.equippedWeaponId||'dagger';
    Object.assign(campState,d.campState||{});
    unlockedSkills.length=0;
    (d.unlockedSkills||[]).forEach(s=>{const def=SKILL_DEFS.find(x=>x.id===s.id);if(def)unlockedSkills.push({def,cd:0});});
    if(campState.turretLv>0)rebuildTurrets();
    if(campState.wall)buildWalls();
    waveDur=Math.max(20,50-wave*1.4);waveTimer=waveDur;
    return true;
  }catch(e){return false;}
}

function getWpnDef(){return WEAPONS.find(w=>w.id===equippedWeaponId)||WEAPONS[0];}
function getWpnDmg(){
  const w=getWpnDef();
  let d=w.dmg*P.dmgMul*(1+reinBonuses.dmgPct);
  if(P.berserkT>0)d*=2;
  return d;
}
function getWpnSpd(){const w=getWpnDef();return w.spd*P.spdMul;}
function getWpnRange(){const w=getWpnDef();return w.range*(1+P.rangeBonus);}
function getWpnAoe(){const w=getWpnDef();return (w.aoe||0)+P.aoeBonus;}
function getMove(){return 0.032*P.moveMul;}
function getSell(){return Math.floor(10*campState.priceMul);}
function getIFrameDur(){return 0.1+P.iFrameBonus;}

function isUI(e){const t=e.target;return t.closest('#upgBar')||t.closest('#skills')||t.closest('.pbox')||t.closest('.sbox')||t.closest('.rein-bonus')||t.closest('#hud')||t.closest('#mmWrap')||t.closest('#goalBar')||t.closest('#reinScreen');}
function getPt(e){return e.touches&&e.touches.length>0?{x:e.touches[0].clientX,y:e.touches[0].clientY}:{x:e.clientX,y:e.clientY};}

function onDown(e){
  if(!running||P.dead)return;
  if(isUI(e))return;
  const p=getPt(e);
  joystick.active=true;
  joystick.originX=p.x; joystick.originY=p.y;
  joystick.x=p.x; joystick.y=p.y;
  joystick.dirX=0; joystick.dirY=0;
}
function onMove(e){
  if(!running||P.dead||!joystick.active)return;
  const p=getPt(e);
  let dx=p.x-joystick.originX, dy=p.y-joystick.originY;
  const dist=Math.hypot(dx,dy);
  if(dist>joystick.maxR){
    dx=(dx/dist)*joystick.maxR; dy=(dy/dist)*joystick.maxR;
  }
  joystick.x=joystick.originX+dx; joystick.y=joystick.originY+dy;
  if(dist>5){
    joystick.dirX=dx/joystick.maxR; joystick.dirY=dy/joystick.maxR;
  } else {
    joystick.dirX=0; joystick.dirY=0;
  }
}
function onUp(){joystick.active=false;}

cv.addEventListener('mousedown',onDown);
cv.addEventListener('mousemove',onMove);
window.addEventListener('mouseup',onUp);

cv.addEventListener('touchstart',e=>{if(!isUI(e)) e.preventDefault(); onDown(e);},{passive:false});
cv.addEventListener('touchmove',e=>{if(joystick.active) e.preventDefault(); onMove(e);},{passive:false});
window.addEventListener('touchend',e=>{onUp();},{passive:false});

window.addEventListener('keydown',e=>{
  keys[e.key.toLowerCase()]=true;
  if(e.key.toLowerCase()==='s'&&(e.ctrlKey||e.metaKey)){e.preventDefault();save();}
});
window.addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);

function drawSkIcon(c,id,sz){
  c.clearRect(0,0,sz,sz);
  if(id==='meteor'){
    const g=c.createRadialGradient(sz/2,sz/2,2,sz/2,sz/2,sz/2);
    g.addColorStop(0,'#fff');g.addColorStop(0.35,'#ff8c00');g.addColorStop(1,'#b71c1c');
    c.fillStyle=g;c.beginPath();c.arc(sz/2,sz/2,sz*0.4,0,Math.PI*2);c.fill();
    for(let i=0;i<5;i++){const a=i/5*Math.PI*2;c.strokeStyle='rgba(255,150,0,0.7)';c.lineWidth=1.5;c.beginPath();c.moveTo(sz/2+Math.cos(a)*sz*0.4,sz/2+Math.sin(a)*sz*0.4);c.lineTo(sz/2+Math.cos(a)*sz*0.49,sz/2+Math.sin(a)*sz*0.49);c.stroke();}
  } else if(id==='thunder'){
    c.fillStyle='#1a0030';c.fillRect(0,0,sz,sz);
    c.fillStyle='#e9d5ff';c.shadowColor='#a855f7';c.shadowBlur=8;
    c.beginPath();c.moveTo(sz*.55,sz*.05);c.lineTo(sz*.35,sz*.5);c.lineTo(sz*.5,sz*.5);c.lineTo(sz*.28,sz*.95);c.lineTo(sz*.46,sz*.52);c.lineTo(sz*.28,sz*.52);c.closePath();c.fill();c.shadowBlur=0;
  } else if(id==='blizzard'){
    const g=c.createRadialGradient(sz/2,sz/2,2,sz/2,sz/2,sz/2);
    g.addColorStop(0,'rgba(255,255,255,0.9)');g.addColorStop(0.5,'rgba(100,200,255,0.7)');g.addColorStop(1,'rgba(30,100,220,0)');
    c.fillStyle=g;c.beginPath();c.arc(sz/2,sz/2,sz/2,0,Math.PI*2);c.fill();
    c.strokeStyle='rgba(255,255,255,0.7)';c.lineWidth=1.5;
    for(let i=0;i<6;i++){const a=i/6*Math.PI*2;c.beginPath();c.moveTo(sz/2,sz/2);c.lineTo(sz/2+Math.cos(a)*sz*.44,sz/2+Math.sin(a)*sz*.44);c.stroke();}
  } else if(id==='nuke'){
    const g=c.createRadialGradient(sz/2,sz/2,1,sz/2,sz/2,sz/2);
    g.addColorStop(0,'#fff');g.addColorStop(0.3,'#ffeb3b');g.addColorStop(0.6,'#ff5722');g.addColorStop(1,'rgba(80,0,0,0)');
    c.fillStyle=g;c.beginPath();c.arc(sz/2,sz/2,sz/2,0,Math.PI*2);c.fill();
    ['#fff4','#fff2'].forEach((col,i)=>{c.strokeStyle=col;c.lineWidth=1;c.beginPath();c.arc(sz/2,sz/2,sz*(0.22+i*0.18),0,Math.PI*2);c.stroke();});
  } else if(id==='berserk'){
    const g=c.createRadialGradient(sz/2,sz/2,2,sz/2,sz/2,sz/2);
    g.addColorStop(0,'#ffeb3b');g.addColorStop(0.5,'#e53935');g.addColorStop(1,'rgba(150,0,0,0)');
    c.fillStyle=g;c.beginPath();c.arc(sz/2,sz/2,sz/2,0,Math.PI*2);c.fill();
    c.fillStyle='#fff';c.font=`bold ${sz*.5}px serif`;c.textAlign='center';c.textBaseline='middle';c.fillText('⚡',sz/2,sz/2+1);
    c.textBaseline='alphabetic';
  } else if(id==='shield'){
    c.fillStyle='rgba(30,80,200,0.3)';c.beginPath();c.arc(sz/2,sz/2,sz/2,0,Math.PI*2);c.fill();
    c.strokeStyle='rgba(100,200,255,0.8)';c.lineWidth=2.5;
    c.beginPath();c.moveTo(sz/2,sz*.08);c.lineTo(sz*.88,sz*.28);c.lineTo(sz*.88,sz*.55);c.quadraticCurveTo(sz*.88,sz*.85,sz/2,sz*.95);c.quadraticCurveTo(sz*.12,sz*.85,sz*.12,sz*.55);c.lineTo(sz*.12,sz*.28);c.closePath();c.stroke();
    c.fillStyle='rgba(100,200,255,0.15)';c.fill();
  }
}

function renderSkillBtns(){
  const el=document.getElementById('skills');el.innerHTML='';
  for(let i=0;i<unlockedSkills.length;i++){
    const sk=unlockedSkills[i];
    const d=document.createElement('div');
    const cd=sk.cd*(1-reinBonuses.cdReduce);
    const maxCd=sk.def.maxCd*(1-reinBonuses.cdReduce);
    d.className='skbtn'+(cd>0?'':' ready');
    const cvs=document.createElement('canvas');cvs.width=38;cvs.height=38;cvs.style.borderRadius='7px';
    drawSkIcon(cvs.getContext('2d'),sk.def.id,38);d.appendChild(cvs);
    const nm=document.createElement('div');nm.className='sk-name';nm.textContent=sk.def.n;d.appendChild(nm);
    if(cd>0){
      const ov=document.createElement('div');ov.className='sk-cd-ov';ov.id='skcd'+i;
      const pct=Math.max(0,(maxCd-cd)/maxCd*100);
      ov.style.background=`conic-gradient(rgba(80,160,255,0.35) ${pct}%, rgba(0,0,0,0.7) 0%)`;
      ov.textContent=Math.ceil(cd);d.appendChild(ov);
    }
    d.ontouchstart=(e)=>{e.stopPropagation();useSkill(i);};d.onclick=(e)=>{e.stopPropagation();useSkill(i);};
    el.appendChild(d);
  }
}

function useSkill(i){
  if(!running||P.dead)return;
  const sk=unlockedSkills[i];
  const actualCd=sk.cd*(1-reinBonuses.cdReduce);
  if(actualCd>0)return;
  sk.cd=sk.def.maxCd;
  const id=sk.def.id,px=P.wx,py=P.wy,sp=toS(px,py);

  if(id==='meteor'){
    const cnt=6+Math.floor(wave/2.5);
    for(let m=0;m<cnt;m++){
      const delay=m*0.3;
      const tx=px+(Math.random()-0.5)*14,ty=py+(Math.random()-0.5)*14;
      setTimeout(()=>{
        const tsp=toS(tx,ty);
        skillEffects.push({type:'meteor',x:tsp.x,y:tsp.y-250,tx:tsp.x,ty:tsp.y,life:1,maxLife:1,pr:0});
        setTimeout(()=>{
          const dmg=getWpnDmg()*9*(1+wave*0.1);
          for(const b of[...bears])if(Math.hypot(b.wx-tx,b.wy-ty)<4.5)hitBear(b,dmg,true);
          explosion(tsp.x,tsp.y,130,[255,100,20]);
        },350);
      },delay*1000);
    }
    showBanner('☄️ 메테오 강타!');
  } else if(id==='thunder'){
    const targets=[...bears].slice(0,10+wave);
    targets.forEach((b,idx)=>{
      setTimeout(()=>{
        if(b._dead)return;
        const bsp=toS(b.wx,b.wy);
        skillEffects.push({type:'thunder',x:bsp.x,y:bsp.y-340,tx:bsp.x,ty:bsp.y,life:0.45,maxLife:0.45});
        const dmg=getWpnDmg()*14*(1+wave*0.08);hitBear(b,dmg,true);
        for(let p=0;p<8;p++){const a=Math.random()*Math.PI*2;parts.push({x:bsp.x,y:bsp.y,vx:Math.cos(a)*4,vy:Math.sin(a)*4-2,col:'#d8b4fe',r:3,life:.8});}
      },idx*100);
    });
    showBanner('⚡ 번개폭풍!');
  } else if(id==='blizzard'){
    for(const b of bears){b.frozen=true;b.frozenT=5+wave*0.22;}
    swings.push({x:sp.x,y:sp.y,r:0,maxR:W*.9,life:.8,col:[80,200,255]});
    skillEffects.push({type:'blizzard',x:sp.x,y:sp.y,life:3,maxLife:3});
    document.getElementById('blizzOv').style.opacity='1';
    setTimeout(()=>document.getElementById('blizzOv').style.opacity='0',2500);
    showBanner('❄️ 전체 빙결!');
  } else if(id==='nuke'){
    skillEffects.push({type:'nuke',x:sp.x,y:sp.y,r:0,life:1.8,maxLife:1.8});
    setTimeout(()=>{
      for(const b of[...bears]){const dmg=getWpnDmg()*28*(1+wave*0.15);hitBear(b,dmg,true);}
      explosion(sp.x,sp.y,W,[255,220,0]);
    },400);
    showBanner('💥 핵폭발!!!');
  } else if(id==='berserk'){
    P.berserkT=15;
    skillEffects.push({type:'berserk',x:sp.x,y:sp.y,life:15,maxLife:15});
    showBanner('🔥 광전사 발동!\n공격력·공속 2배!');
  } else if(id==='shield'){
    P.shieldT=10;
    showBanner('🛡️ 성역 방어!\n10초간 무적!');
  }
  renderSkillBtns();
}

let shopTab='weapon';
function openShop(){
  document.getElementById('shopGoldTxt').textContent='💰 보유 골드: '+P.gold;
  renderShopContent();
  document.getElementById('shopOverlay').classList.remove('h');
}
function closeShop(){document.getElementById('shopOverlay').classList.add('h');}

document.getElementById('shopTabs').querySelectorAll('.stab-btn').forEach(btn=>{
  btn.onclick=()=>{
    shopTab=btn.dataset.tab;
    document.querySelectorAll('.stab-btn').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
    renderShopContent();
  };
});

function renderShopContent(){
  document.getElementById('shopGoldTxt').textContent='💰 보유 골드: '+P.gold;
  const el=document.getElementById('shopContent');el.innerHTML='';
  if(shopTab==='weapon') renderWeaponShop(el);
  else if(shopTab==='atk') renderUpgShop(el,ATK_UPGRADES);
  else if(shopTab==='defend') renderUpgShop(el,DEFEND_UPGRADES);
  else if(shopTab==='camp') renderCampShop(el);
  else if(shopTab==='skill') renderSkillShop(el);
}

function makeTagSpan(tag){
  const colors={'근접':'#ef5350','원거리':'#42a5f5','광역':'#ff7043','빠름':'#69f0ae','강타':'#ffa726','독':'#8bc34a','크리':'#ffd54f','연사':'#ce93d8','관통':'#80deea','폭발':'#ff8f00','마법':'#7c4dff'};
  return `<span class="si-tag" style="background:${colors[tag]||'#546e7a'}22;color:${colors[tag]||'#90a4ae'};border:1px solid ${colors[tag]||'#546e7a'}44;">${tag}</span>`;
}

function renderWeaponShop(el){
  const note=document.createElement('p');note.style.cssText='font-size:11px;color:#78909c;margin-bottom:8px;text-align:left;';note.textContent='⚔️ 각 무기는 고유 특성을 갖습니다. 구매 후 장착!';el.appendChild(note);
  for(const w of WEAPONS){
    const owned=boughtWeapons.has(w.id);
    const equipped=equippedWeaponId===w.id;
    const can=P.gold>=w.cost&&!owned;
    const d=document.createElement('div');
    d.className='si'+(equipped?' equipped2':owned?' owned':can?' afford':'');
    const tags=w.tags.map(makeTagSpan).join('');
    d.innerHTML=`
      <div class="si-ico2">${w.ico}</div>
      <div class="si-info">
        <div class="si-name2">${w.n}${equipped?' <span style="color:#ffd54f;font-size:10px;">⚡장착중</span>':''}</div>
        <div class="si-desc2">공격력 ${w.dmg} | 공속 ${(1/w.spd).toFixed(1)}/s | 사거리 ${w.range}<br>⭐ <b>${w.trait}</b> — ${w.traitDesc}</div>
        <div class="si-tags" style="margin-top:4px">${tags}</div>
      </div>
      <div class="si-cost2">${owned?(equipped?'✅장착':''): '💰'+w.cost}<small>${owned&&!equipped?'탭하면 장착':''}</small></div>`;
    if(!owned&&w.cost===0){d.onclick=()=>equipWeapon(w.id);}
    else if(!owned&&can){d.onclick=()=>buyWeapon(w.id);}
    else if(owned&&!equipped){d.onclick=()=>equipWeapon(w.id);}
    el.appendChild(d);
  }
}

function buyWeapon(id){
  const w=WEAPONS.find(x=>x.id===id);
  if(!w||P.gold<w.cost)return;
  P.gold-=w.cost;boughtWeapons.add(id);equippedWeaponId=id;
  addFloat(toS(P.wx,P.wy).x,toS(P.wx,P.wy).y-40,`✅ ${w.n} 구매!`,'#a5d6a7');
  updateUI();renderShopContent();renderBar();save();
}
function equipWeapon(id){
  if(!boughtWeapons.has(id))return;
  equippedWeaponId=id;
  renderShopContent();renderBar();
}

function renderUpgShop(el,list){
  for(const u of list){
    const bought=purchased.has(u.id);
    let locked=false;if(u.req&&!purchased.has(u.req)){locked=true;}
    const can=!bought&&!locked&&P.gold>=u.cost;
    const d=document.createElement('div');
    d.className='si'+(bought?' owned':locked?' locked':can?' afford':'');
    d.innerHTML=`<div class="si-ico2">${u.ico}</div><div class="si-info"><div class="si-name2">${u.n}</div><div class="si-desc2">${u.desc}${u.req&&!purchased.has(u.req)?' [선행 필요: '+list.find(x=>x.id===u.req)?.n+']':''}</div></div><div class="si-cost2">${bought?'✅':'💰'+u.cost}</div>`;
    if(!bought&&!locked&&can)d.onclick=()=>buyUpg(u,list);
    el.appendChild(d);
  }
}

function buyUpg(u,list){
  if(purchased.has(u.id)||P.gold<u.cost)return;
  if(u.req&&!purchased.has(u.req))return;
  P.gold-=u.cost;purchased.add(u.id);
  const e=u.effect,v=u.val;
  if(e==='dmg')P.dmgMul*=(1+v);
  else if(e==='spd')P.spdMul=Math.max(0.08,P.spdMul*(1+v));
  else if(e==='crit')P.critBonus+=v;
  else if(e==='range')P.rangeBonus+=v;
  else if(e==='leech')P.leechRate+=v;
  else if(e==='aoe')P.aoeBonus+=v;
  else if(e==='proj')P.extraProj+=v;
  else if(e==='pierce'){}
  else if(e==='hp'){P.maxHp+=v;P.hp=Math.min(P.hp+v,P.maxHp);}
  else if(e==='move')P.moveMul*=(1+v);
  else if(e==='regen')P.regenRate+=v;
  else if(e==='shield'){P.shield=P.maxHp*v;}
  else if(e==='bag')P.maxMeat+=v;
  else if(e==='iframe')P.iFrameBonus+=v;
  addFloat(W/2,H/2-40,'✅ '+u.n,'#a5d6a7');
  updateUI();renderShopContent();renderBar();save();
}

function renderCampShop(el){
  for(const item of CAMP_UPGRADES){
    if(item.req){const req=CAMP_UPGRADES.find(x=>x.id===item.req);if(req&&!purchased.has(item.req)){const d=document.createElement('div');d.className='si locked';d.innerHTML=`<div class="si-ico2">🔒</div><div class="si-info"><div class="si-name2" style="color:#546e7a">${item.n}</div><div class="si-desc2">선행: ${req.n} 필요</div></div>`;el.appendChild(d);continue;}}
    const bought=purchased.has(item.id);
    const can=!bought&&P.gold>=item.cost;
    const d=document.createElement('div');d.className='si'+(bought?' owned':can?' afford':'');
    d.innerHTML=`<div class="si-ico2">${item.ico}</div><div class="si-info"><div class="si-name2">${item.n}</div><div class="si-desc2">${item.desc}</div></div><div class="si-cost2">${bought?'✅':'💰'+item.cost}</div>`;
    if(!bought&&can)d.onclick=()=>buyCampItem(item.id);
    el.appendChild(d);
  }
}
function buyCampItem(id){
  const item=CAMP_UPGRADES.find(x=>x.id===id);
  if(!item||purchased.has(id)||P.gold<item.cost)return;
  P.gold-=item.cost;purchased.add(id);
  if(item.type==='turret'){campState.turretLv=item.lv;rebuildTurrets();}
  if(item.type==='wall'){campState.wall=true;buildWalls();}
  if(item.type==='chef'){campState.chefLv=item.lv;}
  if(item.type==='price'){campState.priceMul*=item.val;}
  if(item.type==='turretUpg'){campState.xbow=true;}
  addFloat(W/2,H/2-40,'✅ '+item.n,'#a5d6a7');
  updateUI();renderShopContent();renderBar();save();
}

function renderSkillShop(el){
  const note=document.createElement('p');note.style.cssText='font-size:11px;color:#78909c;margin-bottom:8px;text-align:left;';note.textContent='환생 횟수가 많을수록 스킬 쿨다운 감소!';el.appendChild(note);
  for(const def of SKILL_DEFS){
    const already=unlockedSkills.some(s=>s.def.id===def.id);
    const can=P.gold>=def.cost&&!already;
    const d=document.createElement('div');d.className='si'+(already?' owned':can?' afford':'');
    const cvs=document.createElement('canvas');cvs.width=32;cvs.height=32;cvs.style.flexShrink='0';cvs.style.borderRadius='6px';
    drawSkIcon(cvs.getContext('2d'),def.id,32);
    const info=document.createElement('div');info.className='si-info';info.innerHTML=`<div class="si-name2">${def.n}</div><div class="si-desc2">${def.desc}<br>쿨타임 ${def.maxCd}s (현재 -${Math.floor(reinBonuses.cdReduce*100)}%)</div>`;
    const cost=document.createElement('div');cost.className='si-cost2';cost.textContent=already?'✅':'💰'+def.cost;
    d.appendChild(cvs);d.appendChild(info);d.appendChild(cost);
    if(!already&&can)d.onclick=()=>unlockSkill(def.id);
    el.appendChild(d);
  }
}
function unlockSkill(id){
  const def=SKILL_DEFS.find(x=>x.id===id);
  if(!def||unlockedSkills.some(s=>s.def.id===id)||P.gold<def.cost)return;
  P.gold-=def.cost;unlockedSkills.push({def,cd:0});
  addFloat(W/2,H/2-50,'✨ '+def.n+' 언락!','#ffd54f');
  renderSkillBtns();renderShopContent();updateUI();save();
}

function rebuildTurrets(){
  turrets.length=0;
  const cnt=campState.turretLv===1?2:campState.turretLv===2?3:4;
  const angles=[Math.PI*.25,Math.PI*.75,Math.PI*1.25,Math.PI*1.75];
  for(let i=0;i<cnt;i++){const a=angles[i];turrets.push({wx:camp.wx+Math.cos(a)*4.8,wy:camp.wy+Math.sin(a)*4.8,atkCool:0,lv:campState.turretLv,angle:0});}
}
function buildWalls(){
  walls.length=0;const pts=16;
  for(let i=0;i<pts;i++){const a=i/pts*Math.PI*2;walls.push({wx:camp.wx+Math.cos(a)*6.2,wy:camp.wy+Math.sin(a)*6.2,hp:400,maxHp:400});}
}

function updateUI(){
  document.getElementById('hM').textContent=Math.floor(P.meat)+'/'+P.maxMeat;
  document.getElementById('hCooked').textContent=P.cookedMeat;
  document.getElementById('hG').textContent=P.gold;
  document.getElementById('hK').textContent=P.kills;
  const pct=Math.max(0,P.hp/P.maxHp*100);
  const hf=document.getElementById('hpFill');
  hf.style.width=pct+'%';
  hf.style.background=pct>50?'linear-gradient(90deg,#c62828,#ef9a9a)':pct>25?'linear-gradient(90deg,#e65100,#ffa726)':'linear-gradient(90deg,#b71c1c,#ff5252)';
  document.getElementById('hpTxt').textContent=`HP ${Math.ceil(P.hp)}/${P.maxHp}${P.shieldT>0?' 🛡️':''}`;
  const shieldPct=P.shieldT>0?Math.min(100,P.shieldT/10*100):0;
  document.getElementById('hpShield').style.width=shieldPct+'%';
  const expNeeded=P.level*100;const expPct=Math.min(100,P.exp/expNeeded*100);
  document.getElementById('expFill').style.width=expPct+'%';
  document.getElementById('expTxt').textContent=`Lv${P.level} EXP ${P.exp}/${expNeeded}`;
  if(!bossActive)document.getElementById('waveChip').textContent=`Wave ${wave} — ${Math.ceil(waveTimer)}s`;
  document.getElementById('reinChip').textContent=`👻 환생 ${reinCount}회`;
  renderSkillBtns();
  while(goalIdx<GOALS.length-1&&P.gold>=GOALS[goalIdx]){goalIdx++;showBanner('🎉 목표 달성!\n상점을 확인하세요!');}
  const gAmt=GOALS[Math.min(goalIdx,GOALS.length-1)],gPrev=goalIdx>0?GOALS[goalIdx-1]:0;
  const gPct=Math.min(100,((P.gold-gPrev)/Math.max(1,gAmt-gPrev))*100);
  document.getElementById('goalFill').style.width=gPct+'%';
  document.getElementById('goalTxt').textContent=P.gold+'/'+gAmt;
}

  setTimeout(()=>d.remove(),900);
}

function initWorld(){
  trees.length=0;snowflakes.length=0;
  for(let i=0;i<200;i++){let x=(Math.random()-.5)*150,y=(Math.random()-.5)*150;if(Math.hypot(x,y)>10)trees.push({wx:x,wy:y,sz:.65+Math.random()*.5,snow:Math.random()>.4,sway:Math.random()*Math.PI*2});}
  for(let i=0;i<140;i++)snowflakes.push({x:Math.random()*W,y:Math.random()*H,sp:.2+Math.random()*.6,sz:.8+Math.random()*1.2,dx:(Math.random()-.5)*.3,opa:.4+Math.random()*.5});

function getBearSc(){
  const base=1+(wave-1)*0.25;
  const reinPenalty=1+reinCount*0.15;
  return base*reinPenalty;
}

function spawnBear(boss){
  const sc=getBearSc();
  const ang=Math.random()*Math.PI*2,dist=boss?22:9+Math.random()*7;
  const bx=P.wx+Math.cos(ang)*dist,by=P.wy+Math.sin(ang)*dist;
  const bearTypes=[
    {n:'흰곰',   col:'#f0e8dc',spd:0.012,hpM:1,dmgM:1,  meat:3},
    {n:'갈색곰', col:'#a5836a',spd:0.014,hpM:0.85,dmgM:1.2,meat:2},
    {n:'흑곰',   col:'#37474f',spd:0.018,hpM:0.7,dmgM:1.5,meat:2,fast:true},
    {n:'큰곰',   col:'#78909c',spd:0.010,hpM:1.5,dmgM:0.9,meat:5,big:true},
  ];
  const waveType=Math.min(Math.floor((wave-1)/3),bearTypes.length-1);
  const bt=boss?bearTypes[0]:bearTypes[Math.min(waveType,bearTypes.length-1)];
  const variant=boss?null:bearTypes[Math.floor(Math.random()*Math.min(waveType+1,bearTypes.length))];
  const btype=boss?bt:variant;

  if(boss){
    const bossTypes=[
      {n:'거대 백곰',col:'#e0d8f0',sz:68,hpM:1,  dmgM:0.7},
      {n:'강철 흑곰',col:'#263238',sz:76,hpM:2,  dmgM:1.2,armor:0.2},
      {n:'공포의 곰왕',col:'#b71c1c',sz:84,hpM:4,dmgM:2.0,charge:true},
    ];
    const bi=Math.min(Math.floor((wave-1)/5),bossTypes.length-1);
    const bt2=bossTypes[bi];
    const bossHp=Math.ceil(200*sc*bt2.hpM);
    const bossDmg=(5+wave*1.5)*bt2.dmgM;
    bears.push({wx:bx,wy:by,hp:bossHp,maxHp:bossHp,dmg:bossDmg,spd:0.009,meat:80,sz:bt2.sz,col:bt2.col,isBoss:true,frozen:false,frozenT:0,_dead:false,armor:bt2.armor||0,name:bt2.n,charge:bt2.charge,chargeT:0});
    const wc=document.getElementById('waveChip');wc.textContent=`⚠️ BOSS: ${bt2.n}`;wc.style.background='linear-gradient(135deg,#7f0000,#b71c1c)';wc.style.borderColor='#ef5350';
    bossActive=true;showBanner(`🚨 ${bt2.n} 출현!\n기절·스킬 사용 권장!`);
  } else {
    const hpBase=(12+wave*8)*sc*(btype.hpM||1);
    const dmgBase=(2+wave*0.7)*(btype.dmgM||1);
    bears.push({wx:bx,wy:by,hp:Math.ceil(hpBase),maxHp:Math.ceil(hpBase),dmg:dmgBase,spd:btype.spd||0.011,meat:Math.ceil((btype.meat||2)+wave*.4),sz:btype.big?48:34,col:btype.col,isBoss:false,frozen:false,frozenT:0,_dead:false,armor:0,name:btype.n||'곰',charge:false});
  }
}

function hitBear(b,dmg,crit){
  if(b._dead)return;
  let d=crit?dmg*((getWpnDef().critMul||2)):dmg;
  d*=(1-(b.armor||0));
  if(b.isBoss&&getWpnDef().boss)d*=getWpnDef().boss;
  if(b.isBoss&&getWpnDef().instakill&&Math.random()<getWpnDef().instakill){d=b.hp+9999;}
  b.hp-=d;
  b._hitFlash=0.12;
  if(P.leechRate>0){P.hp=Math.min(P.maxHp,P.hp+d*P.leechRate);}
  const sp=toS(b.wx,b.wy);
  const sparkCnt=crit?10:4;
  for(let i=0;i<sparkCnt;i++){
    const a=Math.random()*Math.PI*2,s=2+Math.random()*6;
    parts.push({x:sp.x,y:sp.y-b.sz*.3,vx:Math.cos(a)*s,vy:Math.sin(a)*s-2,col:crit?'#ffd54f':'#ff8a65',r:crit?3.5:2,life:.5,gravity:.35});
  }
  const psp=toS(P.wx,P.wy);
  const ba=Math.atan2(sp.y-psp.y,sp.x-psp.x);
  for(let i=0;i<(crit?6:3);i++){
    const a=ba+(Math.random()-.5)*1.2,s=3+Math.random()*5;
    parts.push({x:sp.x,y:sp.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,col:'#c62828',r:1.5+Math.random()*2,life:.4,gravity:.4});
  }
  addFloat(sp.x+(Math.random()-.5)*24,sp.y-b.sz*.5-10,(crit?'💥':'')+Math.ceil(d),crit?'#ffd54f':'#ffbbaa');
  if(crit)triggerShake(3,0.1);
  if(b.hp<=0)killBear(b);
}

function killBear(b){
  if(b._dead)return;b._dead=true;
  P.kills++;
  const expGain=b.isBoss?wave*20+50:wave*3+5;
  P.exp+=expGain;
  while(P.exp>=P.level*100){P.exp-=P.level*100;P.level++;P.maxHp+=15;P.hp=Math.min(P.hp+15,P.maxHp);showBanner(`⬆️ Lv${P.level}!\n최대HP +15`);}

  const sp=toS(b.wx,b.wy);
  const burstCount=b.isBoss?40:22;
  for(let i=0;i<burstCount;i++){
    const a=Math.random()*Math.PI*2;
    const s=b.isBoss?4+Math.random()*12:2+Math.random()*8;
    parts.push({x:sp.x,y:sp.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-(b.isBoss?5:3),col:b.col,r:b.isBoss?5+Math.random()*5:2+Math.random()*4,life:b.isBoss?1.5:1.1,gravity:0.25});
  }
  for(let i=0;i<(b.isBoss?16:8);i++){
    const a=Math.random()*Math.PI*2,s=1+Math.random()*5;
    parts.push({x:sp.x,y:sp.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,col:'#b71c1c',r:2+Math.random()*3,life:.7,gravity:.4});
  }
  swings.push({x:sp.x,y:sp.y,r:0,maxR:b.isBoss?200:90,life:b.isBoss?1.2:.8,col:hexToRgb(b.col)});
  if(b.isBoss){
    swings.push({x:sp.x,y:sp.y,r:0,maxR:340,life:1,col:[255,200,50]});
    const fl=document.createElement('div');
    fl.style.cssText='position:absolute;inset:0;background:rgba(255,255,200,0.35);z-index:70;pointer-events:none;animation:ftA .4s forwards;';
    document.body.appendChild(fl);setTimeout(()=>fl.remove(),400);
  }
  for(let i=0;i<8;i++){
    const a=Math.random()*Math.PI*2,s=.5+Math.random()*2;
    parts.push({x:sp.x+Math.cos(a)*b.sz*.4,y:sp.y+b.sz*.2,vx:Math.cos(a)*s,vy:Math.sin(a)*s*.3-1,col:'rgba(200,180,160,0.7)',r:4+Math.random()*6,life:.9,gravity:.1});
  }
  for(let i=0;i<b.meat;i++){const a=Math.random()*Math.PI*2,s=.05+Math.random()*.12;drops.push({wx:b.wx+(Math.random()-.5),wy:b.wy+(Math.random()-.5),vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:22+Math.random()*6});}

  addDecal(b.wx,b.wy,b.isBoss?2.2:1.2,'rgba(140,10,10,0.55)');
  triggerShake(b.isBoss?14:5, b.isBoss?0.45:0.18);

  bears.splice(bears.indexOf(b),1);
  if(b.isBoss){
    bossActive=false;wave++;
    waveDur=Math.max(18,50-wave*1.4);waveTimer=waveDur;
    const wc=document.getElementById('waveChip');wc.style.background='';wc.style.borderColor='';
    const gold=Math.ceil(280*wave*(1+reinBonuses.goldPct));P.gold+=gold;
    addFloat(sp.x,sp.y-80,`💰+${gold} 보스처치!`,'#ffd54f');
    showBanner(`✅ Wave ${wave} 시작!\n${getDifficultyNote()}`);
    if(wave%5===0){showBanner(`🏆 Wave ${wave} 달성!\n특수 적 등장!`);setTimeout(()=>spawnElite(),2000);}
    save();
  }
}

function getDifficultyNote(){
  if(wave<=3)return '초급 구역';
  if(wave<=7)return '중급 — 포탑 추천';
  if(wave<=12)return '고급 — 스킬 필수!';
  if(wave<=18)return '위험 — 방벽 없으면 사망';
  if(wave<=25)return '극한 — 최강 무기 필요';
  return '전설 — 운이 좋아야 생존';
}

function spawnElite(){
  const sc=getBearSc()*2;
  const ang=Math.random()*Math.PI*2,dist=16;
  bears.push({wx:P.wx+Math.cos(ang)*dist,wy:P.wy+Math.sin(ang)*dist,hp:400*sc,maxHp:400*sc,dmg:(10+wave*3)*1.5,spd:0.016,meat:30,sz:55,col:'#7b1fa2',isBoss:false,frozen:false,frozenT:0,_dead:false,armor:0.25,name:'정예곰',charge:false});
}

function showDeathScreen(){
  const el=document.getElementById('deathOverlay');
  el.classList.remove('h');el.style.display='flex';
  document.getElementById('deathStats').innerHTML=`Wave <b>${wave}</b> | 킬 <b>${P.kills}</b> | 골드 <b>${P.gold}</b><br>환생 횟수 <b>${reinCount}</b>`;
}

function doReincarnate(){
  document.getElementById('deathOverlay').classList.add('h');document.getElementById('deathOverlay').style.display='none';
  reinCount++;
  const newDmgBonus=Math.min(0.15,reinCount*0.015);
  const newHpBonus=reinCount*5;
  const newGoldBonus=Math.min(0.10,reinCount*0.01);
  const newCdReduce=Math.min(0.15,reinCount*0.015);
  const newMeatCap=reinCount*5;
  reinBonuses.dmgPct=newDmgBonus;
  reinBonuses.hpFlat=newHpBonus;
  reinBonuses.goldPct=newGoldBonus;
  reinBonuses.cdReduce=newCdReduce;
  reinBonuses.meatCap=newMeatCap;

  const rs=document.getElementById('reinScreen');
  rs.classList.remove('h');
  const stars='★'.repeat(Math.min(reinCount,10));
  document.getElementById('reinStars').textContent=stars;
  document.getElementById('reinSubTxt').innerHTML=`<b style="color:#fff">환생 ${reinCount}회</b><br>${reinCount>=5?'<b style="color:#ffd54f">⭐ 5회 이상! 시원하게 잡힌다!</b><br>':''}누적 보너스 적용 완료`;

  const bonusEl=document.getElementById('reinBonuses');
  bonusEl.innerHTML=`
    <div class="rb"><div class="rb-ico">⚔️</div><div class="rb-name">공격력</div><div class="rb-val">+${Math.round(newDmgBonus*100)}%</div></div>
    <div class="rb"><div class="rb-ico">❤️</div><div class="rb-name">최대HP</div><div class="rb-val">+${newHpBonus}</div></div>
    <div class="rb"><div class="rb-ico">💰</div><div class="rb-name">골드획득</div><div class="rb-val">+${Math.round(newGoldBonus*100)}%</div></div>
    <div class="rb"><div class="rb-ico">⚡</div><div class="rb-name">쿨타임</div><div class="rb-val">-${Math.round(newCdReduce*100)}%</div></div>
    <div class="rb"><div class="rb-ico">🎒</div><div class="rb-name">고기용량</div><div class="rb-val">+${newMeatCap}</div></div>
  `;
}

function confirmReincarnate(){
  document.getElementById('reinScreen').classList.add('h');
  P.hp=P.maxHp+reinBonuses.hpFlat;P.maxHp+=reinBonuses.hpFlat;
  P.maxMeat=50+reinBonuses.meatCap;
  P.meat=0;P.cookedMeat=0;P.gold=0;P.kills=0;P.exp=0;P.level=1;
  P.wx=0;P.wy=0;P.dead=false;P.iFrames=.1;
  P.shield=0;P.berserkT=0;P.shieldT=0;
  wave=1;waveDur=50;waveTimer=50;bossActive=false;spawnT=0;
  bears.length=0;drops.length=0;projs.length=0;customers.length=0;skillEffects.length=0;
  campMeat=0;cookProg=0;sellT=0;goalIdx=0;
  renderBar();renderSkillBtns();updateUI();
  running=true;lastT=performance.now();
  showBanner(reinCount>=5?'🌟 강화된 환생!\n곰들이 시원하게 터진다!':'✨ 환생 완료!\n더 강해졌다!');
  requestAnimationFrame(gameLoop);
  save();
}

function respawnNoRein(){
  document.getElementById('deathOverlay').classList.add('h');document.getElementById('deathOverlay').style.display='none';
  P.gold=Math.floor(P.gold*.7);P.hp=P.maxHp;P.dead=false;P.wx=camp.wx;P.wy=camp.wy;
  bears.length=0;projs.length=0;skillEffects.length=0;bossActive=false;
  const wc=document.getElementById('waveChip');wc.style.background='';wc.style.borderColor='';
  running=true;lastT=performance.now();showBanner('🔄 부활! (골드 -30%)');
  requestAnimationFrame(gameLoop);
}

document.getElementById('reinBtn').onclick=doReincarnate;
document.getElementById('noReinBtn').onclick=respawnNoRein;
document.getElementById('reinConfirmBtn').onclick=confirmReincarnate;

// ══════════════════════════════════════════════════════
//  MAIN LOOP
// ══════════════════════════════════════════════════════
function gameLoop(ts){
  if(!running)return;
  const dt=Math.min((ts-lastT)/1000,.05);lastT=ts;gameTime+=dt;
  update(dt);draw();renderMM();
  requestAnimationFrame(gameLoop);
}

function update(dt){
  if(P.dead)return;

  for(const sk of unlockedSkills)if(sk.cd>0)sk.cd=Math.max(0,sk.cd-dt);
  if(P.berserkT>0)P.berserkT=Math.max(0,P.berserkT-dt);
  if(P.shieldT>0)P.shieldT=Math.max(0,P.shieldT-dt);
  if(!bossActive){waveTimer-=dt;if(waveTimer<=0)spawnBear(true);}
  if(P.regenRate>0){P.hp=Math.min(P.maxHp,P.hp+P.maxHp*P.regenRate*dt);}
  if(P.iFrames>0)P.iFrames-=dt;

  spawnT-=dt;
  if(spawnT<=0&&!bossActive){
    const maxB=Math.min(4+wave*3,30);
    if(bears.length<maxB){
      const cnt=Math.min(1+Math.floor(wave/2),8);
      for(let i=0;i<cnt;i++)spawnBear(false);
    }
    spawnT=Math.max(0.45,4-wave*0.25);
  }

  custSpawnT-=dt;
  if(custSpawnT<=0&&customers.length<12){
    customers.push({wx:camp.wx+18+Math.random()*4,wy:camp.wy+10+Math.random()*6,state:'walking',got:0,want:1+Math.floor(Math.random()*6),col:['#1976d2','#7b1fa2','#388e3c','#c0392b','#d35400'][Math.floor(Math.random()*5)]});
    custSpawnT=Math.max(1.5,7-wave*0.18);
  }

  // ── 조이스틱 / 이동 처리 ──
  let mdx=0,mdy=0;
  if(keys['arrowup']||keys['w']){mdy-=1;mdx-=1;}
  if(keys['arrowdown']||keys['s']){mdy+=1;mdx+=1;}
  if(keys['arrowleft']||keys['a']){mdx-=1;mdy+=1;}
  if(keys['arrowright']||keys['d']){mdx+=1;mdy-=1;}
  
  // 키보드 입력이 우선, 없을 경우 조이스틱 반영
  if(mdx!==0||mdy!==0){
    joystick.active=false;
  } else if(joystick.active){
    // 화면상의 방향(dirX, dirY)을 등각투영(Isometric) 이동 방향(mdx, mdy)으로 변환
    mdx = joystick.dirY + joystick.dirX;
    mdy = joystick.dirY - joystick.dirX;
  }

  if(mdx!==0||mdy!==0){
    const len=Math.hypot(mdx,mdy),spd=getMove()*(P.berserkT>0?1.2:1);
    P.wx+=(mdx/len)*spd;P.wy+=(mdy/len)*spd;
    for(const t of trees){const dx=P.wx-t.wx,dy=P.wy-t.wy,d=Math.hypot(dx,dy);if(d<.65){P.wx+=(dx/d)*(.65-d);P.wy+=(dy/d)*(.65-d);}}
    P.angle=Math.atan2((mdx+mdy)*ISO_Y,(mdx-mdy)*ISO_X);
  }
  cam.x+=(P.wx-cam.x)*.1;cam.y+=(P.wy-cam.y)*.1;

  // Attack
  if(P.atkCool>0)P.atkCool-=dt;
  const wdef=getWpnDef();
  let target=null,minD=getWpnRange();
  for(const b of bears){const d=Math.hypot(P.wx-b.wx,P.wy-b.wy);if(d<minD){minD=d;target=b;}}
  if(target&&P.atkCool<=0){
    const tSp=toS(target.wx,target.wy),pSp=toS(P.wx,P.wy);
    P.angle=Math.atan2(tSp.y-pSp.y,tSp.x-pSp.x);
    const speedMul=P.berserkT>0?.5:1;
    P.atkCool=getWpnSpd()*speedMul;P.swingT=.22;
    const dmg=getWpnDmg();
    const baseCrit=(wdef.critRate||.08)+P.critBonus;
    const crit=Math.random()<baseCrit;
    const aoeR=getWpnAoe();
    const projCnt=1+P.extraProj+(wdef.proj?0:0);

    const applyPoison=(b)=>{if(wdef.poison){b.poisonDmg=wdef.poison;b.poisonT=wdef.poisonT||3;}};
    const applySlow=(b)=>{if(wdef.slow)b.spd=Math.max(b.spd*(1-wdef.slow),0.004);};

    if(wdef.proj){
      const a=Math.atan2(tSp.y-pSp.y,tSp.x-pSp.x);
      const pierce=wdef.pierce||purchased.has('pierce1');
      for(let pi=0;pi<projCnt;pi++){
        const spread=pi>0?(Math.random()-.5)*.25:0;
        projs.push({x:pSp.x,y:pSp.y-12,vx:Math.cos(a+spread)*20,vy:Math.sin(a+spread)*20,dmg,col:wdef.col,life:1.2,aoe:aoeR,pierce,wdef,crit,applyFns:[applyPoison,applySlow]});
      }
    } else {
      if(aoeR>0){
        swings.push({x:pSp.x,y:pSp.y,r:0,maxR:aoeR*40,life:1.2,col:hexToRgb(wdef.col)});
        for(const b2 of[...bears]){if(Math.hypot(b2.wx-P.wx,b2.wy-P.wy)<=aoeR){hitBear(b2,dmg,crit||Math.random()<.12);applyPoison(b2);applySlow(b2);}}
      } else {
        swings.push({x:pSp.x,y:pSp.y,r:0,maxR:75,life:1,col:hexToRgb(wdef.col)});
        hitBear(target,dmg,crit);applyPoison(target);applySlow(target);
      }
    }
  }
  if(P.swingT>0)P.swingT-=dt;

  // Turrets
  for(const t of turrets){
    t.atkCool-=dt;if(t.atkCool>0)continue;
    const atkSpd=t.lv===1?.9:t.lv===2?.55:.3,range=t.lv===1?6.5:t.lv===2?8.5:11;
    let tgt=null,td=range;
    for(const b of bears){const d=Math.hypot(t.wx-b.wx,t.wy-b.wy);if(d<td){td=d;tgt=b;}}
    if(tgt){
      t.atkCool=atkSpd;
      const tsp=toS(tgt.wx,tgt.wy),sp=toS(t.wx,t.wy);
      t.angle=Math.atan2(tsp.y-sp.y,tsp.x-sp.x);
      const tdmg=(35+t.lv*45)*(1+wave*.14)*(1+reinBonuses.dmgPct);
      const aoeR=campState.xbow?2.8:0;
      const col=t.lv===3?'#ce93d8':'#64b5f6';
      projs.push({x:sp.x,y:sp.y-8,vx:Math.cos(t.angle)*17,vy:Math.sin(t.angle)*17,dmg:tdmg,col,life:1.2,aoe:aoeR,pierce:false,wdef:{},crit:false,applyFns:[]});
      if(t.lv===3){for(const off of[-.38,.38])projs.push({x:sp.x,y:sp.y-8,vx:Math.cos(t.angle+off)*17,vy:Math.sin(t.angle+off)*17,dmg:tdmg*.6,col,life:1.2,aoe:0,pierce:false,wdef:{},crit:false,applyFns:[]});}
    }
  }

  // Walls block
  if(campState.wall)for(const b of bears){if(b._dead||b.frozen)continue;for(const wl of walls){if(wl.hp<=0)continue;const d=Math.hypot(b.wx-wl.wx,b.wy-wl.wy);if(d<.85){b.wx-=(b.wx-wl.wx)/d*.07;b.wy-=(b.wy-wl.wy)/d*.07;}}}

  // Bears move & attack
  for(const b of bears){
    if(b._dead)continue;
    if(b.poisonT>0){b.poisonT-=dt;b.hp-=(b.poisonDmg||0)*dt;if(b.hp<=0)killBear(b);continue;}
    if(b.frozen){b.frozenT-=dt;if(b.frozenT<=0)b.frozen=false;continue;}
    if(b.charge){b.chargeT-=dt;if(b.chargeT<=0){b.chargeT=4+Math.random()*3;b.charging=!b.charging;}}
    const chargeSpd=b.charging?b.spd*4:b.spd;
    const dx=P.wx-b.wx,dy=P.wy-b.wy,d=Math.hypot(dx,dy)||1;
    b.wx+=(dx/d)*chargeSpd;b.wy+=(dy/d)*chargeSpd;
    const hitR=b.isBoss?.75:.72;
    if(d<hitR&&P.iFrames<=0&&P.shieldT<=0){
      const actualDmg=b.dmg*dt*1.6*(1+wave*.015);
      P.hp-=actualDmg;P.iFrames=getIFrameDur();
      if(Math.random()<.2)showHit();
      if(P.hp<=0){P.dead=true;running=false;showDeathScreen();return;}
    }
  }

  // Drops pickup
  for(let i=drops.length-1;i>=0;i--){
    const d=drops[i];d.life-=dt;d.wx+=d.vx;d.wy+=d.vy;d.vx*=.87;d.vy*=.87;
    if(d.life<=0){drops.splice(i,1);continue;}
    if(Math.hypot(P.wx-d.wx,P.wy-d.wy)<1.3&&P.meat<P.maxMeat){P.meat++;drops.splice(i,1);}
  }

  // Camp
  const cd=Math.hypot(P.wx-camp.wx,P.wy-camp.wy);
  const hasChef=campState.chefLv>0;
  if(cd<3.8&&P.meat>0){P.meat=Math.max(0,P.meat-.12);campMeat=Math.min(campMeat+.12,150);}
  if((cd<3.8||hasChef)&&campMeat>=1&&P.cookedMeat<60){
    const cookSpd=1.6/(1+campState.chefLv*1.2);
    cookProg+=dt;
    if(cookProg>=cookSpd){campMeat=Math.max(0,campMeat-1);P.cookedMeat++;cookProg=0;}
  } else if(cd>=3.8&&!hasChef) cookProg=0;

  // Customers
  sellT-=dt;
  for(let i=customers.length-1;i>=0;i--){
    const c=customers[i];const tWx=camp.wx+3.8,tWy=camp.wy+2+i*1.5;
    if(c.state==='walking'){const dx=tWx-c.wx,dy=tWy-c.wy,d=Math.hypot(dx,dy);if(d>.15){c.wx+=(dx/d)*.028;c.wy+=(dy/d)*.028;}else c.state='waiting';}
    else if(c.state==='waiting'){
      const dy2=tWy-c.wy;if(Math.abs(dy2)>.12)c.wy+=dy2*.05;
      if(i===0&&sellT<=0&&P.cookedMeat>0&&(cd<3.8||hasChef)){
        P.cookedMeat--;c.got++;const earn=Math.ceil(getSell()*(1+reinBonuses.goldPct));P.gold+=earn;
        addFloat(toS(c.wx,c.wy).x,toS(c.wx,c.wy).y-38,`+${earn}💰`,'#ffd54f');
        sellT=hasChef?.08:.22;if(c.got>=c.want)c.state='leaving';
      }
    }
    else if(c.state==='leaving'){c.wx+=.045;c.wy+=.06;if(c.wy>cam.y+30)customers.splice(i,1);}
  }

  // Projectiles
  for(let i=projs.length-1;i>=0;i--){
    const p=projs[i];p.x+=p.vx;p.y+=p.vy;p.life-=dt*1.4;
    let hit=false;
    for(const b of bears){
      if(b._dead)continue;
      const sp=toS(b.wx,b.wy);
      if(Math.hypot(p.x-sp.x,p.y-sp.y)<b.sz*.85){
        if(p.aoe>0){for(const b2 of[...bears])if(Math.hypot(b2.wx-b.wx,b2.wy-b.wy)<=p.aoe)hitBear(b2,p.dmg*.9,false);swings.push({x:sp.x,y:sp.y,r:0,maxR:p.aoe*40,life:.9,col:[255,140,30]});}
        else hitBear(b,p.dmg,p.crit);
        if(p.applyFns)for(const fn of p.applyFns)fn(b);
        if(!p.pierce){projs.splice(i,1);hit=true;break;}
        else {p.dmg*=.65;if(p.dmg<1){projs.splice(i,1);hit=true;break;}}
      }
    }
    if(!hit&&(p.life<=0||p.x<-300||p.x>W+300||p.y<-300||p.y>H+300))projs.splice(i,1);
  }

  for(let i=parts.length-1;i>=0;i--){const p=parts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=(p.gravity||0.22);p.vx*=0.94;p.life-=dt*2.3;if(p.life<=0)parts.splice(i,1);}
  for(let i=swings.length-1;i>=0;i--){const s=swings[i];s.r+=270*dt;s.life-=dt*2.8;if(s.life<=0)swings.splice(i,1);}
  for(let i=trails.length-1;i>=0;i--){trails[i].life-=dt*4;if(trails[i].life<=0)trails.splice(i,1);}
  for(let i=groundDecals.length-1;i>=0;i--){groundDecals[i].life-=dt*.12;if(groundDecals[i].life<=0)groundDecals.splice(i,1);}
  if(camShake.dur>0){camShake.dur-=dt;const sm=camShake.mag*(camShake.dur/0.45);camShake.x=(Math.random()-.5)*sm*2;camShake.y=(Math.random()-.5)*sm;}else{camShake.x*=0.85;camShake.y*=0.85;}
  bgPulse+=(bossActive?0.08:P.berserkT>0?0.06:0)*dt;bgPulse*=0.92;
  for(let i=skillEffects.length-1;i>=0;i--){
    const se=skillEffects[i];se.life-=dt;if(se.life<=0){skillEffects.splice(i,1);continue;}
    if(se.type==='meteor'||se.type==='thunder')se.pr=(se.maxLife-se.life)/se.maxLife;
  }
  for(const s of snowflakes){s.x+=s.dx+(bossActive?Math.sin(gameTime*2)*.1:0);s.y+=s.sp+(bossActive?.3:0);if(s.y>H+5){s.y=-5;s.x=Math.random()*W;}if(s.x<0)s.x=W;if(s.x>W)s.x=0;}
  for(const t of trees)t.sway+=dt*.8;

  updateUI();
}

function hexToRgb(hex){
  const r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
  return [r,g,b];
}

function draw(){
  const skyR=Math.floor(10+bgPulse*80),skyG2=Math.floor(16+bgPulse*20),skyB=Math.floor(40-bgPulse*30);
  const skyGrad=ctx.createLinearGradient(0,0,0,H);
  skyGrad.addColorStop(0,`rgb(${skyR},${skyG2},${skyB})`);
  skyGrad.addColorStop(1,`rgb(${Math.floor(26+bgPulse*40)},${Math.floor(48+bgPulse*20)},${Math.floor(80-bgPulse*40)})`);
  ctx.fillStyle=skyGrad;ctx.fillRect(0,0,W,H);

  ctx.save();
  ctx.translate(Math.round(camShake.x),Math.round(camShake.y));

  const cX=Math.floor(cam.x),cY=Math.floor(cam.y),r=18;
  for(let tx=cX-r;tx<=cX+r;tx++)for(let ty=cY-r;ty<=cY+r;ty++){
    const a=toS(tx,ty),b=toS(tx+1,ty),c=toS(tx+1,ty+1),d=toS(tx,ty+1);
    if(c.x<-40||a.x>W+40||d.y<-40||b.y>H+UBH+40)continue;
    const snowPct=(Math.sin(tx*.7+ty*.5)*.5+.5)*.3+.7;
    const dark=bossActive?0.88:1;
    const snow1=`hsl(210,28%,${Math.floor(snowPct*72*dark)}%)`;
    const snow2=`hsl(210,24%,${Math.floor(snowPct*66*dark)}%)`;
    ctx.fillStyle=(tx+ty)%2===0?snow1:snow2;
    ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.lineTo(c.x,c.y);ctx.lineTo(d.x,d.y);ctx.closePath();ctx.fill();
    ctx.strokeStyle='rgba(180,210,240,0.14)';ctx.lineWidth=.5;ctx.stroke();
  }

  for(const dec of groundDecals){
    const sp=toS(dec.wx,dec.wy);
    const alpha=Math.min(0.7,dec.life/8)*0.6;
    ctx.globalAlpha=alpha;
    ctx.fillStyle=dec.col;
    ctx.beginPath();ctx.ellipse(sp.x,sp.y+4,dec.r*ISO_X*.7,dec.r*ISO_Y*.7,0,0,Math.PI*2);ctx.fill();
  }
  ctx.globalAlpha=1;

  drawCamp();

  if(campState.wall)for(const wl of walls){if(wl.hp<=0)continue;const sp=toS(wl.wx,wl.wy);const hp=wl.hp/wl.maxHp;
    ctx.save();ctx.translate(sp.x,sp.y);
    const ig=ctx.createLinearGradient(-8,0,8,-20);ig.addColorStop(0,`rgba(${Math.floor(120+hp*80)},${Math.floor(180+hp*40)},255,0.85)`);ig.addColorStop(1,`rgba(220,240,255,0.5)`);
    ctx.fillStyle=ig;ctx.beginPath();ctx.moveTo(-8,0);ctx.lineTo(8,0);ctx.lineTo(6,-22);ctx.lineTo(-6,-22);ctx.closePath();ctx.fill();
    ctx.strokeStyle='rgba(200,240,255,0.6)';ctx.lineWidth=1;ctx.stroke();
    ctx.fillStyle='rgba(255,255,255,0.2)';ctx.beginPath();ctx.moveTo(-5,-2);ctx.lineTo(-2,-20);ctx.lineTo(1,-20);ctx.lineTo(-2,-2);ctx.closePath();ctx.fill();
    ctx.restore();
  }

  const ents=[];
  ents.push({t:'player',sy:toS(P.wx,P.wy).y});
  for(const b of bears)ents.push({t:'bear',obj:b,sy:toS(b.wx,b.wy).y});
  for(const c of customers)ents.push({t:'cust',obj:c,sy:toS(c.wx,c.wy).y});
  for(const tr of trees)ents.push({t:'tree',obj:tr,sy:toS(tr.wx,tr.wy).y});
  for(const d of drops)ents.push({t:'drop',obj:d,sy:toS(d.wx,d.wy).y});
  for(const t of turrets)ents.push({t:'turret',obj:t,sy:toS(t.wx,t.wy).y});
  ents.sort((a,b)=>a.sy-b.sy);
  for(const e of ents){if(e.sy<-150||e.sy>H+150)continue;
    if(e.t==='player')drawPlayer();
    else if(e.t==='bear')drawBear(e.obj);
    else if(e.t==='cust')drawCustomer(e.obj);
    else if(e.t==='tree')drawTree(e.obj);
    else if(e.t==='drop')drawDrop(e.obj);
    else if(e.t==='turret')drawTurret(e.obj);
  }

  drawEffects();

  if(P.berserkT>0){ctx.globalAlpha=.07+Math.sin(gameTime*6)*.03;const ag=ctx.createRadialGradient(W/2,(H-UBH)/2,50,W/2,(H-UBH)/2,W*.55);ag.addColorStop(0,'#ff5722');ag.addColorStop(1,'transparent');ctx.fillStyle=ag;ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;}
  if(bossActive){const vp=0.04+Math.sin(gameTime*4)*.025;ctx.globalAlpha=vp;ctx.fillStyle='#b71c1c';ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;}

  // 눈송이가 렌더링에 흔들림 영향 안 받게 하기
  ctx.restore();

  for(const s of snowflakes){ctx.globalAlpha=s.opa;ctx.fillStyle='#e8f4ff';ctx.beginPath();ctx.arc(s.x,s.y,s.sz,0,Math.PI*2);ctx.fill();}
  ctx.globalAlpha=1;

  // 🔥 가상 조이스틱 그리기
  if(joystick.active){
    ctx.save();
    ctx.globalAlpha = 0.5;
    ctx.beginPath();
    ctx.arc(joystick.originX, joystick.originY, joystick.maxR, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(100, 150, 255, 0.2)';
    ctx.fill();
    ctx.strokeStyle = 'rgba(100, 150, 255, 0.5)';
    ctx.lineWidth = 2;
    ctx.stroke();

    ctx.globalAlpha = 1.0;
    ctx.beginPath();
    ctx.arc(joystick.x, joystick.y, 16, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(255, 255, 255, 0.85)';
    ctx.fill();
    ctx.restore();
  }
}

  ctx.fillStyle=scaredMode?'rgba(255,255,200,0.4)':b.frozen?'rgba(200,240,255,0.4)':'rgba(255,255,255,0.1)';
  ctx.beginPath();ctx.ellipse(sz*.05,sz*.08,sz*.25,sz*.2,0,0,Math.PI*2);ctx.fill();

  ctx.fillStyle=bc;
  ctx.beginPath();ctx.ellipse(-sz*.45,sz*.12,sz*.2,sz*.12,-.4,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(sz*.45,sz*.12,sz*.2,sz*.12,.4,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(-sz*.32,sz*.3,sz*.18,sz*.11,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(sz*.32,sz*.3,sz*.18,sz*.11,0,0,Math.PI*2);ctx.fill();

  ctx.fillStyle=bc;ctx.beginPath();ctx.arc(sz*.35,-sz*.22,sz*.34,0,Math.PI*2);ctx.fill();

  ctx.beginPath();ctx.arc(sz*.26,-sz*.5,sz*.14,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.arc(sz*.54,-sz*.46,sz*.11,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=b.frozen?'rgba(200,240,255,0.6)':'rgba(255,150,150,0.5)';
  ctx.beginPath();ctx.arc(sz*.26,-sz*.5,sz*.08,0,Math.PI*2);ctx.fill();

    ctx.beginPath();ctx.arc(sz*.44,-sz*.26,sz*.07,0,Math.PI*2);ctx.fill();

    ctx.beginPath();ctx.arc(sz*.45,-sz*.27,sz*.04,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(100,200,255,0.7)';ctx.beginPath();ctx.arc(sz*.55,-sz*.18,sz*.04,0,Math.PI*2);ctx.fill();
    ctx.strokeStyle='#5d4037';ctx.lineWidth=sz*.03;ctx.beginPath();ctx.arc(sz*.36,-sz*.12,sz*.07,-.2,Math.PI+.2,true);ctx.stroke();
  } else {
    ctx.fillStyle=b.frozen?'#1565c0':'#1a1a2e';
    ctx.beginPath();ctx.arc(sz*.27,-sz*.26,sz*.05,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(sz*.44,-sz*.26,sz*.05,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(255,255,255,0.5)';
    ctx.beginPath();ctx.arc(sz*.26,-sz*.28,sz*.02,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(sz*.43,-sz*.28,sz*.02,0,Math.PI*2);ctx.fill();
  }
  ctx.fillStyle='#1a1a2e';ctx.beginPath();ctx.arc(sz*.36,-sz*.18,sz*.06,0,Math.PI*2);ctx.fill();

  if(b.isBoss){
    const cx=sz*.35,cy=-sz*.62;
    const crownG=ctx.createLinearGradient(cx-14,cy-12,cx+14,cy+6);crownG.addColorStop(0,'#fff176');crownG.addColorStop(1,'#f9a825');
    ctx.fillStyle=crownG;ctx.beginPath();ctx.moveTo(cx-14,cy+6);ctx.lineTo(cx-14,cy-8);ctx.lineTo(cx-5,cy);ctx.lineTo(cx,cy-13);ctx.lineTo(cx+5,cy);ctx.lineTo(cx+14,cy-8);ctx.lineTo(cx+14,cy+6);ctx.closePath();ctx.fill();
    ctx.strokeStyle='rgba(255,200,0,0.6)';ctx.lineWidth=1;ctx.stroke();
    ctx.fillStyle='#ef5350';ctx.beginPath();ctx.arc(cx,cy-13,3.5,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#7c4dff';ctx.beginPath();ctx.arc(cx-7,cy-4,2.5,0,Math.PI*2);ctx.fill();
    ctx.beginPath();ctx.arc(cx+7,cy-4,2.5,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=.12+Math.sin(gameTime*3)*.04;ctx.strokeStyle='#ff5252';ctx.lineWidth=6;ctx.beginPath();ctx.arc(0,0,sz*.7,0,Math.PI*2);ctx.stroke();ctx.globalAlpha=1;
  }
  if(b.charging){ctx.globalAlpha=.5+Math.sin(gameTime*15)*.3;ctx.fillStyle='#ff1744';ctx.font=`bold ${sz*.4}px sans-serif`;ctx.textAlign='center';ctx.fillText('!',sz*.35,-sz*.8);ctx.globalAlpha=1;}

  if(b.poisonT>0){ctx.globalAlpha=.2;ctx.fillStyle='#76ff03';ctx.beginPath();ctx.ellipse(0,0,sz*.65,sz*.55,0,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;}
  if(b._hitFlash>0){
    b._hitFlash=Math.max(0,b._hitFlash-0.016);

    ctx.fillStyle='rgba(255,80,80,0.75)';
    ctx.beginPath();ctx.ellipse(sz*.1,0,sz*.65,sz*.55,0,0,Math.PI*2);ctx.fill();
    ctx.globalAlpha=1;
  }

  const r=parseInt(col.slice(1,3),16),g=parseInt(col.slice(3,5),16),b=parseInt(col.slice(5,7),16);

}

function drawEffects(){
  for(const s of swings){
    const a=Math.max(0,s.life*.7);
    const col=Array.isArray(s.col)?`rgba(${s.col[0]},${s.col[1]},${s.col[2]},${a})`:s.col;
    ctx.globalAlpha=a;ctx.strokeStyle=col;ctx.lineWidth=s.life*10;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.stroke();
    ctx.strokeStyle=`rgba(255,255,255,${a*.3})`;ctx.lineWidth=2;ctx.beginPath();ctx.arc(s.x,s.y,s.r*.55,0,Math.PI*2);ctx.stroke();
  }ctx.globalAlpha=1;

  for(const p of projs){
    const trailLen=p.aoe>0?6:4;
    for(let t2=trailLen;t2>=0;t2--){
      const px=p.x-p.vx*(t2*.55),py=p.y-p.vy*(t2*.55);
      const ta=Math.max(0,(trailLen-t2)/trailLen*0.75);
      const tr2=(p.aoe>0?9:4.5)*(1-t2/trailLen*.6);
      ctx.globalAlpha=ta;
      ctx.fillStyle=p.col;ctx.shadowColor=p.col;ctx.shadowBlur=p.aoe>0?14:8;
      ctx.beginPath();ctx.arc(px,py,Math.max(.5,tr2),0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;ctx.shadowBlur=0;
  }

  for(const p of parts){
    const a=Math.max(0,p.life*.9);
    ctx.globalAlpha=a;
    if(p.r>=3){ctx.shadowColor=p.col;ctx.shadowBlur=p.r*2.5;}
    ctx.fillStyle=p.col;
    ctx.beginPath();ctx.arc(p.x,p.y,Math.max(0.5,p.r*(.5+a*.5)),0,Math.PI*2);ctx.fill();
    ctx.shadowBlur=0;
  }ctx.globalAlpha=1;

  for(const se of skillEffects){
    if(se.type==='meteor'){
      const pr=se.pr||0,cx=se.x+(se.tx-se.x)*pr,cy=se.y+(se.ty-se.y)*pr;
      ctx.shadowColor='#ff6f00';ctx.shadowBlur=30;
      ctx.fillStyle='#ff6f00';ctx.beginPath();ctx.arc(cx,cy,13,0,Math.PI*2);ctx.fill();
      ctx.shadowColor='#fff';ctx.shadowBlur=10;
      ctx.fillStyle='rgba(255,240,80,0.95)';ctx.beginPath();ctx.arc(cx,cy,7,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(cx,cy,3,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
      for(let i=1;i<=7;i++){const tp=Math.max(0,pr-i*.065);const ex=se.x+(se.tx-se.x)*tp,ey=se.y+(se.ty-se.y)*tp;ctx.globalAlpha=Math.max(0,.6-i*.08);ctx.fillStyle=`hsl(${28-i*4},100%,${55-i*4}%)`;ctx.beginPath();ctx.arc(ex,ey,11-i,0,Math.PI*2);ctx.fill();}ctx.globalAlpha=1;
    } else if(se.type==='thunder'){
      const pr=se.life/se.maxLife;
      ctx.shadowColor='#a855f7';ctx.shadowBlur=24;
      ctx.strokeStyle=`rgba(255,255,255,${pr*.8})`;ctx.lineWidth=2;
      ctx.beginPath();for(let i=0;i<=9;i++){const t2=i/9,nx=se.x+(se.tx-se.x)*t2+(i>0&&i<9?(Math.random()-.5)*24:0),ny=se.y+(se.ty-se.y)*t2;i===0?ctx.moveTo(nx,ny):ctx.lineTo(nx,ny);}ctx.stroke();
      ctx.strokeStyle=`rgba(200,130,255,${pr*.9})`;ctx.lineWidth=5+pr*5;
      ctx.beginPath();for(let i=0;i<=9;i++){const t2=i/9,nx=se.x+(se.tx-se.x)*t2+(i>0&&i<9?(Math.random()-.5)*24:0),ny=se.y+(se.ty-se.y)*t2;i===0?ctx.moveTo(nx,ny):ctx.lineTo(nx,ny);}ctx.stroke();
      ctx.shadowBlur=0;
    } else if(se.type==='nuke'){
      const pr=1-se.life/se.maxLife;ctx.globalAlpha=(se.life/se.maxLife)*.65;
      const g=ctx.createRadialGradient(se.x,se.y,0,se.x,se.y,W*.9*pr+20);
      g.addColorStop(0,'rgba(255,255,220,1)');g.addColorStop(.15,'rgba(255,220,50,0.9)');g.addColorStop(.4,'rgba(255,100,0,0.6)');g.addColorStop(.7,'rgba(150,0,0,0.3)');g.addColorStop(1,'rgba(50,0,0,0)');
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(se.x,se.y,W*.9*pr+20,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle=`rgba(255,200,80,${(se.life/se.maxLife)*.9})`;ctx.lineWidth=3;ctx.shadowColor='#ff8f00';ctx.shadowBlur=15;
      ctx.beginPath();ctx.arc(se.x,se.y,W*.9*pr,0,Math.PI*2);ctx.stroke();ctx.shadowBlur=0;
      ctx.globalAlpha=1;
    } else if(se.type==='blizzard'){
      const lp=se.life/se.maxLife;ctx.globalAlpha=lp*.32;
      const g=ctx.createRadialGradient(se.x,se.y,0,se.x,se.y,W*1.1);
      g.addColorStop(0,'rgba(220,245,255,0.95)');g.addColorStop(.4,'rgba(140,210,255,0.7)');g.addColorStop(1,'rgba(80,160,220,0)');
      ctx.fillStyle=g;ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;
    }
  }
}

function renderMM(){
  const mW=115,mH=115,msc=3.2;
  mmCtx.clearRect(0,0,mW,mH);
  mmCtx.fillStyle='rgba(3,8,22,0.9)';mmCtx.fillRect(0,0,mW,mH);
  mmCtx.strokeStyle='rgba(80,150,255,0.07)';mmCtx.lineWidth=1;
  for(let g=0;g<mW;g+=22){mmCtx.beginPath();mmCtx.moveTo(g,0);mmCtx.lineTo(g,mH);mmCtx.stroke();}
  for(let g=0;g<mH;g+=22){mmCtx.beginPath();mmCtx.moveTo(0,g);mmCtx.lineTo(mW,g);mmCtx.stroke();}
  const mm=(wx,wy)=>({x:mW/2+(wx-P.wx)*msc,y:mH/2+(wy-P.wy)*msc});
  const cs=mm(camp.wx,camp.wy);
  mmCtx.fillStyle='#ff9800';mmCtx.fillRect(cs.x-5,cs.y-5,10,10);
  mmCtx.strokeStyle='#ffd54f';mmCtx.lineWidth=1.5;mmCtx.strokeRect(cs.x-5,cs.y-5,10,10);
  for(const b of bears){const bs=mm(b.wx,b.wy);mmCtx.fillStyle=b.isBoss?'#ff1744':'#ef5350';mmCtx.beginPath();mmCtx.arc(bs.x,bs.y,b.isBoss?5:3,0,Math.PI*2);mmCtx.fill();}
  for(const t of turrets){const ts=mm(t.wx,t.wy);mmCtx.fillStyle='#64b5f6';mmCtx.fillRect(ts.x-3,ts.y-3,6,6);}
  const pulse=.5+Math.sin(gameTime*5)*.3;
  mmCtx.fillStyle='#fff';mmCtx.beginPath();mmCtx.arc(mW/2,mH/2,4.5,0,Math.PI*2);mmCtx.fill();
  mmCtx.strokeStyle=`rgba(79,195,247,${pulse})`;mmCtx.lineWidth=2;mmCtx.stroke();
  mmCtx.strokeStyle='rgba(80,180,255,0.15)';mmCtx.lineWidth=1;mmCtx.beginPath();mmCtx.arc(mW/2,mH/2,mW/2-2,0,Math.PI*2);mmCtx.stroke();
}

function startFresh(){
  document.getElementById('overlay').classList.add('h');
  initWorld();
  Object.assign(P,{wx:0,wy:0,angle:0,hp:100,maxHp:100,shield:0,meat:0,maxMeat:50,cookedMeat:0,gold:0,kills:0,exp:0,level:1,atkCool:0,swingT:0,iFrames:.1,dead:false,dmgMul:1,spdMul:1,critBonus:0,rangeBonus:0,leechRate:0,aoeBonus:0,extraProj:0,moveMul:1,regenRate:0,iFrameBonus:0,berserkT:0,shieldT:0});
  purchased.clear();boughtWeapons.clear();boughtWeapons.add('dagger');equippedWeaponId='dagger';
  unlockedSkills.length=0;Object.assign(campState,{turretLv:0,wall:false,chefLv:0,priceMul:1,xbow:false});
  turrets.length=0;walls.length=0;reinCount=0;Object.assign(reinBonuses,{dmgPct:0,hpFlat:0,goldPct:0,meatCap:0,cdReduce:0});
  wave=1;waveDur=50;waveTimer=50;bossActive=false;spawnT=0;custSpawnT=3;goalIdx=0;
  initWorld();
  renderBar();renderSkillBtns();updateUI();
  running=true;lastT=performance.now();
  showBanner('🐻 곰사냥 시작!\n전략적으로 살아남아라!');
  requestAnimationFrame(gameLoop);
}

function loadAndStart(){
  if(load()){
    document.getElementById('overlay').classList.add('h');
    initWorld();
    renderBar();renderSkillBtns();updateUI();
    running=true;lastT=performance.now();
    showBanner('📂 불러오기 완료!\nWave '+wave+'부터 시작');
    requestAnimationFrame(gameLoop);
  } else {
    alert('저장 데이터가 없습니다!');
  }
}

document.getElementById('startBtn').onclick=startFresh;
document.getElementById('loadBtn').onclick=loadAndStart;

renderBar();updateUI();

if(localStorage.getItem(SAVE_KEY)){
  document.getElementById('loadBtn').style.display='inline-block';
} else {
  document.getElementById('loadBtn').style.display='none';
}
