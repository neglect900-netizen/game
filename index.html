<style>

<script>

const mm=document.getElementById('mm'),mctx=mm.getContext('2d');
const PX=3;

function resize(){cv.width=window.innerWidth;cv.height=window.innerHeight;ctx.imageSmoothingEnabled=false;}
resize();window.addEventListener('resize',resize);

// ── 도트 폴백 스프라이트 ──
const C={
  sk:'#ffc8a0',sk2:'#e8a87c',sk3:'#c87848',
  wh:'#ffffff',wh2:'#ddddee',
  hb:'#4a3020',hb2:'#5a3820',hb3:'#8a5830',
  hp:'#ff88cc',hp2:'#dd44aa',
  hbl:'#1a2060',hbl2:'#2a3898',
  hsl:'#c0c0d8',hsl2:'#909090',
  eb:'#1a1a2e',
  ey:'#4488ff',eg:'#22cc66',er:'#cc2244',epur:'#8844cc',
  cb:'#2244aa',cb2:'#1a3388',cb3:'#3366cc',cb4:'#4488ee',
  br1:'#7a4020',br2:'#5a2c10',br3:'#9a5830',br4:'#ba7848',
  bw1:'#ddeeff',bw2:'#aaccee',bw3:'#f0f8ff',
  bk1:'#1a1a2a',bk2:'#0a0a18',bk3:'#2a2a3a',
  bn:'#330000',be:'#ff0000',be2:'#ff4444',
  bfi1:'#cc2200',bfi2:'#881100',bfi3:'#ff4400',
  bic1:'#88ccff',bic2:'#4488cc',bic3:'#aaddff',
  bpo1:'#228800',bpo2:'#114400',bpo3:'#44aa00',
  bth1:'#aa8800',bth2:'#775500',bth3:'#ffdd00',
  bdk1:'#330055',bdk2:'#220033',bdk3:'#660099',
  bst1:'#667799',bst2:'#445577',bst3:'#99aacc',
  tr1:'#4a2e12',tr2:'#6a4020',tf1:'#1a4d14',tf2:'#226618',tf3:'#2d8a20',tf4:'#44aa30',
  ro1:'#556677',ro2:'#3a4a55',ro3:'#778899',
  gl:'#ffff88',gl2:'#88ffff',gl3:'#ff88ff',
};
function makeSpr(rows,scale=PX){
  const h=rows.length,w=rows[0].length;
  const oc=document.createElement('canvas');oc.width=w*scale;oc.height=h*scale;
  const ox=oc.getContext('2d');ox.imageSmoothingEnabled=false;
  for(let y=0;y<h;y++) for(let x=0;x<w;x++){
    const v=rows[y][x];if(!v||v===0)continue;
    ox.fillStyle=C[v]||v;ox.fillRect(x*scale,y*scale,scale,scale);
  }
  return oc;
}
function makeBearRows(c1,c2,c3,c4,eye){
  return [
    [0,0,0,c2,c2,c1,c1,c1,c1,c1,c1,c2,c2,0,0,0,0,0],
    [0,0,c2,c1,c1,c3,c1,c1,c1,c1,c3,c1,c1,c2,0,0,0,0],
    [0,c2,c1,c3,c3,c1,c1,c1,c1,c1,c1,c3,c3,c1,c2,0,0,0],
    [c2,c1,c1,c1,c1,c1,c1,c1,c1,c1,c1,c1,c1,c1,c1,c2,0,0],
    [c1,c3,eye,eye,c1,c1,c1,c1,c1,c1,c1,eye,eye,c3,c1,c1,0,0],
    [c1,c1,eye,eye,c2,c1,c1,'bn','bn',c1,c2,eye,eye,c1,c1,c1,0,0],
    [c1,c1,c1,c2,c2,c1,c1,'bn','bn',c1,c2,c2,c1,c1,c1,c1,0,0],
    [c2,c1,c1,c1,c1,c1,c1,c1,c1,c1,c1,c1,c1,c1,c1,c2,0,0],
    [0,c2,c1,c1,c3,c1,c1,c1,c1,c1,c3,c1,c1,c2,0,0,0,0],
    [0,0,c2,c1,c1,c1,c1,c1,c1,c1,c1,c1,c1,c2,0,0,0,0],
    [0,c1,c1,c2,c1,c1,c1,c1,c1,c1,c1,c2,c1,c1,0,0,0,0],
    [c2,c1,c1,c1,c2,c1,c1,c1,c1,c2,c1,c1,c1,c2,0,0,0,0],
    [c1,c1,c2,c1,c1,c2,c2,c2,c2,c1,c1,c2,c1,c1,0,0,0,0],
    [c2,c1,c1,c2,c2,c1,c1,c1,c1,c2,c2,c1,c1,c2,0,0,0,0],
    [0,c2,c2,c1,c1,c1,c1,c1,c1,c1,c1,c2,c2,0,0,0,0,0],
    [0,0,c2,c2,c2,c2,c2,c2,c2,c2,c2,c2,0,0,0,0,0,0],
  ];
}

// ── 이미지 로드 ──
function loadImg(src){
  return new Promise(res=>{
    const img=new Image();
    img.onload=()=>res(img);
    img.onerror=()=>res(null);
    img.src=src;
  });
}

const SPR={};
async function initSprites(){
  // 캐릭터 이미지 로드 (같은 폴더에 파일 있어야 함)
  const [imgDefault,imgIshal,imgLin,imgYuki]=await Promise.all([
    loadImg('char_default.png'),
    loadImg('char_ishal.png'),
    loadImg('char_lin.png'),
    loadImg('char_yuki.png'),
  ]);
  // 로드 성공하면 실제 이미지, 실패하면 도트 폴백
  const FB_W=20,FB_H=25;
  function makeCharFallback(col){
    const oc=document.createElement('canvas');oc.width=FB_W*PX;oc.height=FB_H*PX;
    const ox=oc.getContext('2d');
    ox.fillStyle=col;ox.fillRect(FB_W*PX*.3,0,FB_W*PX*.4,FB_W*PX*.35);
    ox.fillStyle='#ffc8a0';ox.fillRect(FB_W*PX*.25,0,FB_W*PX*.5,FB_W*PX*.35);
    ox.fillStyle=col;ox.fillRect(FB_W*PX*.15,FB_W*PX*.35,FB_W*PX*.7,FB_W*PX*.5);
    ox.fillStyle='#333';ox.fillRect(FB_W*PX*.3,FB_H*PX*.7,FB_W*PX*.15,FB_H*PX*.3);
    ox.fillRect(FB_W*PX*.55,FB_H*PX*.7,FB_W*PX*.15,FB_H*PX*.3);
    return oc;
  }
  SPR.charDefault=imgDefault||makeCharFallback('#2244aa');
  SPR.charIshal  =imgIshal  ||makeCharFallback('#222233');
  SPR.charLin    =imgLin    ||makeCharFallback('#1a6622');
  SPR.charYuki   =imgYuki   ||makeCharFallback('#222255');
  // 곰 스프라이트
  SPR.bearBrown=makeSpr(makeBearRows('br1','br2','br3','br4','be'),PX);
  SPR.bearWhite=makeSpr(makeBearRows('bw1','bw2','bw3','bw1','be'),PX);
  SPR.bearBlack=makeSpr(makeBearRows('bk1','bk2','bk3','bk1','be2'),PX);
  SPR.bearFire=makeSpr(makeBearRows('bfi1','bfi2','bfi3','bfi1','gl'),PX);
  SPR.bearIce=makeSpr(makeBearRows('bic1','bic2','bic3','bic1','gl2'),PX);
  SPR.bearPoison=makeSpr(makeBearRows('bpo1','bpo2','bpo3','bpo1','be2'),PX);
  SPR.bearThunder=makeSpr(makeBearRows('bth1','bth2','bth3','bth1','gl'),PX);
  SPR.bearDark=makeSpr(makeBearRows('bdk1','bdk2','bdk3','bdk1','gl3'),PX);
  SPR.bearSteel=makeSpr(makeBearRows('bst1','bst2','bst3','bst1','gl2'),PX);
}

const G={
  wave:1,gold:100,kills:0,reinCount:0,rb:{atk:0,hp:0,gold:0,cd:0},
  px:0,py:0,hp:100,maxHp:100,hpRegen:0,dmgRed:0,
  atkPct:0,atkMul:1,atkSpd:1,critRate:0,
  deathShield:false,weapon:'bow',char:'default',
  ownedW:['dagger','bow'],ownedC:['default'],
  bought:{},skMul:[1,1,1,1,1,1],skCd:[0,0,0,0,0,0],
  berserkOn:false,berserkT:0,sanctuaryOn:false,sanctuaryT:0,
  autoSkill:false,gameover:false,waveKills:0,bossOn:false,
};
const ENT={bears:[],projs:[],parts:[],floats:[],swings:[]};
const CAM={shake:0,sx:0,sy:0};
const TERRAIN=[],STARS=[];

function initWorld(){
  const r=(a,b)=>a+(b-a)*Math.random();
  for(let i=0;i<280;i++) TERRAIN.push({type:'tree',x:r(-3000,3000),y:r(-3000,3000),r:r(10,22)});
  for(let i=0;i<180;i++) TERRAIN.push({type:'rock',x:r(-3000,3000),y:r(-3000,3000),r:r(8,18)});
  for(let i=0;i<90;i++) TERRAIN.push({type:'ice',x:r(-3000,3000),y:r(-3000,3000),r:r(20,45)});
  for(let i=TERRAIN.length-1;i>=0;i--) if(Math.hypot(TERRAIN[i].x,TERRAIN[i].y)<200) TERRAIN.splice(i,1);
  for(let i=0;i<180;i++) STARS.push({x:r(-4000,4000),y:r(-1000,1000),r:r(.5,2.5),blink:r(0,Math.PI*2),speed:r(.3,2.5),hue:r(160,260),sat:r(40,100),lit:r(55,95)});
}

let _uid=0;
const uid=()=>++_uid;
const wReq=()=>8+G.wave*3;
const wSc=()=>1+(G.wave-1)*.1;
const getW=()=>WEAPONS.find(w=>w.id===G.weapon)||WEAPONS[0];
const getCh=()=>CHARS.find(c=>c.id===G.char)||CHARS[0];
const getSkCd=i=>SK_DEFS[i].cd*(1-Math.min(G.rb.cd,40)/100);
const getAtk=()=>{const w=getW();let d=w.atk*(1+G.atkPct/100)*G.atkMul;if(G.berserkOn)d*=3;return d;};

function recompute(){
  const ch=getCh();const b=G.bought||{};
  let mhp=Math.round(100*ch.hm*(1+G.rb.hp/100));
  mhp+=(b.d0||0)*100+(b.d3||0)*250+(b.d6||0)*500+(b.d7||0)*800;
  G.maxHp=Math.max(50,mhp);
  G.hpRegen=(b.d2||0)*3+(b.d6||0)*3;
  G.dmgRed=Math.min(80,(b.d1||0)*12+(b.d4||0)*25);
  G.atkPct=(b.a0||0)*20+(b.a5||0)*35;
  G.atkSpd=1+(b.a4||0)*.25;
  G.critRate=(b.a2||0)*20;
  G.atkMul=((b.a7||0)>0?2:1)*(1+G.rb.atk/100)*ch.am;
  G.deathShield=(b.d5||0)>0;
  G.hp=Math.min(G.hp,G.maxHp);
}

function spawnParts(x,y,col,cnt,big){
  for(let i=0;i<cnt;i++){
    const ang=Math.random()*Math.PI*2,spd=(big?140:70)+Math.random()*(big?200:110);
    ENT.parts.push({x,y,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd-50,life:big?50:24,ml:big?50:24,col,r:Math.max(.5,(big?5:2.5)*Math.random()),glow:big});
  }
  if(big) CAM.shake=.35;
}
function addFloat(x,y,txt,col){ENT.floats.push({x,y,vy:-90,txt,col,life:60,ml:60});}

function hitBear(b,dmg,crit){
  b.hp-=dmg;
  addFloat(b.x,b.y,(crit?'💥':'')+Math.round(dmg),crit?'#ff4444':'#ffffff');
  if(b.hp<=0) killBear(b);
}
function killBear(b){
  G.gold+=Math.round(b.gold*(1+G.rb.gold/100)*(b.isBoss?5:1));
  G.kills++;if(!b.isBoss)G.waveKills++;
  spawnParts(b.x,b.y,b.isBoss?'#ffd700':'#ff8800',b.isBoss?65:18,b.isBoss);
  addFloat(b.x,b.y,'💰','#ffd700');
  if(b.isBoss){G.bossOn=false;bossRef=null;nextWave();}
  ENT.bears=ENT.bears.filter(x=>x!==b);
}
function takeDmg(raw){
  if(G.sanctuaryOn)return;
  const a=Math.round(raw*.7*(1-G.dmgRed/100));
  G.hp-=a;
  addFloat(G.px,G.py,'💥'+a,'#ff0000');
  CAM.shake=Math.max(CAM.shake,.15);
  if(G.hp<=0){
    if(G.deathShield){G.hp=1;G.deathShield=false;return;}
    G.hp=0;G.gameover=true;
    document.getElementById('dinfo').textContent='Wave '+G.wave+' | 킬 '+G.kills;
    document.getElementById('death').style.display='flex';
  }
}

let bossRef=null;
function spawnBear(){
  const pool=BTYPES.slice(0,Math.max(2,Math.min(BTYPES.length,2+Math.floor(G.wave/2))));
  const bt=pool[Math.floor(Math.random()*pool.length)];
  const ang=Math.random()*Math.PI*2,dist=700+Math.random()*500;
  const sc=wSc()*.55;
  ENT.bears.push({
    id:uid(),n:bt.n,spr:bt.spr,
    hp:Math.round(bt.hp*sc),mhp:Math.round(bt.hp*sc),
    atk:Math.round(bt.atk*sc),spd:bt.spd*(1+(G.wave-1)*.014)*wSc(),
    sz:bt.sz,x:G.px+Math.cos(ang)*dist,y:G.py+Math.sin(ang)*dist,
    gold:bt.g,armor:bt.armor||0,aura:bt.aura||null,
    rainbow:false,slow:0,poison:0,isBoss:false,
    col:bt.col,at:0,ph:Math.random()*Math.PI*2,
  });
}
function spawnBoss(){
  const bd=BOSSTYPES.reduce((a,b)=>G.wave>=b.minW?b:a,BOSSTYPES[0]);
  const ang=Math.random()*Math.PI*2;const sc=wSc()*.55;
  const b={
    id:uid(),n:bd.n,spr:bd.spr,
    hp:Math.round(bd.hp*sc),mhp:Math.round(bd.hp*sc),
    atk:Math.round(bd.atk*sc),spd:bd.spd*wSc(),
    sz:bd.sz,x:G.px+Math.cos(ang)*900,y:G.py+Math.sin(ang)*900,
    gold:100,armor:bd.armor||0,aura:bd.aura||null,
    rainbow:bd.rainbow||false,slow:0,poison:0,isBoss:true,
    col:bd.col,at:0,ph:0,
  };
  ENT.bears.push(b);bossRef=b;G.bossOn=true;
  showAnn('👑 BOSS: '+bd.n+'!');
}
function nextWave(){
  G.wave++;G.waveKills=0;ENT.bears=ENT.bears.filter(b=>b.isBoss);
  showAnn('🌊 WAVE '+G.wave+' 시작!');
  if(G.wave%20===0) triggerRebirth();
}

function fireProj(tx,ty,w,dmg){
  const dx=tx-G.px,dy=ty-G.py,d=Math.max(.01,Math.hypot(dx,dy));
  const nx=dx/d,ny=dy/d,spd=550+w.rng*1.8,maxD=w.rng*1.3;
  if(w.scatter){
    for(let i=0;i<w.scatter;i++){
      const s=(Math.random()-.5)*.65;
      const cx=nx*Math.cos(s)-ny*Math.sin(s),cy=nx*Math.sin(s)+ny*Math.cos(s);
      ENT.projs.push({id:uid(),x:G.px,y:G.py,dx:cx,dy:cy,spd,dmg,maxD,traveled:0,proj:'shot',col:w.col,pierce:false,splash:0,ang:Math.atan2(cy,cx)});
    }
  } else {
    ENT.projs.push({id:uid(),x:G.px,y:G.py,dx:nx,dy:ny,spd,dmg,maxD,traveled:0,proj:w.proj||'bullet',col:w.col,pierce:w.pierce||false,splash:w.splash||0,ang:Math.atan2(ny,nx)});
  }
}

let atkT=0,playerAtkT=0,orbAngle=0,walkPhase=0,autoT=0,spawnT=0;
function doAttack(dt){
  const w=getW();const ch=getCh();
  const atkInt=1/Math.max(.05,w.spd||1)/(G.atkSpd*ch.sm);
  atkT+=dt;if(atkT<atkInt)return;atkT=0;
  const near=ENT.bears.filter(b=>Math.hypot(b.x-G.px,b.y-G.py)<w.rng).sort((a,b)=>Math.hypot(a.x-G.px,a.y-G.py)-Math.hypot(b.x-G.px,b.y-G.py))[0];
  if(!near&&w.type!=='whirl'&&w.type!=='nova'&&w.type!=='orb')return;
  let dmg=getAtk();const isCrit=Math.random()*100<G.critRate;if(isCrit)dmg*=2;
  playerAtkT=0.2;
  if(w.type==='ranged'){
    if(!near)return;
    fireProj(near.x,near.y,w,dmg);
    spawnParts(G.px,G.py,w.col,4,false);
  } else if(w.type==='melee'){
    const ang=near?Math.atan2(near.y-G.py,near.x-G.px):0;
    ENT.bears.filter(b=>{
      const d=Math.hypot(b.x-G.px,b.y-G.py);if(d>w.rng)return false;
      let da=Math.abs(Math.atan2(b.y-G.py,b.x-G.px)-ang);if(da>Math.PI)da=Math.PI*2-da;return da<Math.PI*.55;
    }).forEach(b=>hitBear(b,dmg,isCrit));
    ENT.swings.push({x:G.px,y:G.py,ang,rng:w.rng,t:0,mt:12,col:w.col});
  } else if(w.type==='whirl'){
    ENT.bears.filter(b=>Math.hypot(b.x-G.px,b.y-G.py)<w.rng).forEach(b=>hitBear(b,dmg,isCrit));
  } else if(w.type==='orb'){
    ENT.bears.filter(b=>Math.hypot(b.x-G.px,b.y-G.py)<w.rng+40).forEach(b=>{hitBear(b,dmg*.3,false);b.slow=Math.max(b.slow,2);});
  } else if(w.type==='nova'){
    ENT.bears.filter(b=>Math.hypot(b.x-G.px,b.y-G.py)<w.rng).forEach(b=>hitBear(b,dmg,isCrit));
    spawnParts(G.px,G.py,w.col,40,true);
  }
}

function useSkill(i){
  if(G.skCd[i]>0||G.gameover)return;
  G.skCd[i]=getSkCd(i);const mul=G.skMul[i]||1;
  switch(i){
    case 0:for(let k=0;k<3;k++) setTimeout(()=>{const tx=G.px+(Math.random()-.5)*650,ty=G.py+(Math.random()-.5)*650;ENT.bears.filter(b=>Math.hypot(b.x-tx,b.y-ty)<220).forEach(b=>hitBear(b,520*mul,true));spawnParts(tx,ty,'#ff4400',60,true);CAM.shake=.4;},k*400);break;
    case 1:for(let k=0;k<6;k++) setTimeout(()=>{ENT.bears.filter(b=>Math.hypot(b.x-G.px,b.y-G.py)<550).forEach(b=>{b.slow=Math.max(b.slow,4);hitBear(b,90*mul,false);});spawnParts(G.px+(Math.random()-.5)*350,G.py+(Math.random()-.5)*350,'#88ddff',12,false);},k*200);break;
    case 2:{const nr=ENT.bears.sort((a,b)=>Math.hypot(a.x-G.px,a.y-G.py)-Math.hypot(b.x-G.px,b.y-G.py))[0];const tx=nr?nr.x:G.px+400,ty=nr?nr.y:G.py+400;const dx=tx-G.px,dy=ty-G.py,dd=Math.max(.01,Math.hypot(dx,dy));ENT.projs.push({id:uid(),x:G.px,y:G.py,dx:dx/dd,dy:dy/dd,spd:450,dmg:320*mul,maxD:1200,traveled:0,proj:'tornado',col:'#aaaaff',pierce:true,splash:180,ang:Math.atan2(dy,dx)});break;}
    case 3:for(let k=0;k<12;k++){const a=k*Math.PI/6;ENT.projs.push({id:uid(),x:G.px,y:G.py,dx:Math.cos(a),dy:Math.sin(a),spd:700,dmg:170*mul,maxD:500,traveled:0,proj:'laser',col:'#ffff00',pierce:true,splash:0,ang:a});}spawnParts(G.px,G.py,'#ffff00',50,true);break;
    case 4:G.berserkOn=true;G.berserkT=10;spawnParts(G.px,G.py,'#ff6600',30,false);break;
    case 5:G.sanctuaryOn=true;G.sanctuaryT=10;G.hp=Math.min(G.maxHp,G.hp+G.maxHp*.35);spawnParts(G.px,G.py,'#ffffff',30,false);break;
  }
}

// ── 조이스틱 ──
const JOY={on:false,dx:0,dy:0,ox:0,oy:0,bx:0,by:0,kx:0,ky:0};
function joyStart(cx,cy){
  const W=cv.width,H=cv.height;
  if(cx>W-100||cy>H-78||cy<90)return;
  JOY.on=true;JOY.ox=cx;JOY.oy=cy;JOY.bx=cx-46;JOY.by=cy-46;JOY.kx=cx-19;JOY.ky=cy-19;JOY.dx=0;JOY.dy=0;
}
function joyMove(cx,cy){
  if(!JOY.on)return;
  let dx=cx-JOY.ox,dy=cy-JOY.oy;
  const len=Math.sqrt(dx*dx+dy*dy);if(len>46){dx=dx/len*46;dy=dy/len*46;}
  JOY.dx=dx/46;JOY.dy=dy/46;JOY.kx=JOY.ox+dx-19;JOY.ky=JOY.oy+dy-19;
}
function joyEnd(){JOY.on=false;JOY.dx=0;JOY.dy=0;}
document.addEventListener('touchstart',e=>{const t=e.touches[0];e.preventDefault();joyStart(t.clientX,t.clientY);},{passive:false});
document.addEventListener('touchmove',e=>{const t=e.touches[0];e.preventDefault();joyMove(t.clientX,t.clientY);},{passive:false});
document.addEventListener('touchend',e=>{joyEnd();});
cv.addEventListener('mousedown',e=>{joyStart(e.clientX,e.clientY);});
document.addEventListener('mousemove',e=>{if(JOY.on)joyMove(e.clientX,e.clientY);});
document.addEventListener('mouseup',e=>{joyEnd();});

function buildSkillUI(){
  const bar=document.getElementById('skills');bar.innerHTML='';
  SK_DEFS.forEach((sk,i)=>{
    const b=document.createElement('button');b.className='skb';b.id='sk'+i;
    b.innerHTML=`<span class="em">${sk.em}</span><span class="nm">${sk.n}</span><div class="cdb" id="cdb${i}" style="width:100%"></div>`;
    b.addEventListener('pointerdown',e=>{e.stopPropagation();useSkill(i);});
    bar.appendChild(b);
  });
}
function updateSkillUI(){
  SK_DEFS.forEach((sk,i)=>{
    const b=document.getElementById('sk'+i);if(!b)return;
    const cd=G.skCd[i],mcd=getSkCd(i),pct=cd>0?(cd/mcd*100):0;
    b.className='skb'+(pct>0?' cd':'');
    const bar=document.getElementById('cdb'+i);if(bar)bar.style.width=(100-pct)+'%';
    let cdt=b.querySelector('.cdt');
    if(pct>0){if(!cdt){cdt=document.createElement('span');cdt.className='cdt';b.appendChild(cdt);}cdt.textContent=Math.ceil(cd)+'s';}
    else if(cdt)cdt.remove();
  });
}

// ── 렌더러 ──
function withGlow(color,blur,fn){ctx.save();ctx.shadowColor=color;ctx.shadowBlur=blur;fn();ctx.restore();}

function drawStars(t){
  STARS.forEach(s=>{
    const sx=(s.x-G.px*.02)+CAM.sx*.003,sy=(s.y-G.py*.005)+CAM.sy*.003;
    const bl=.3+.7*Math.sin(t*s.speed+s.blink);
    if(sx<-5||sx>cv.width+5||sy<-5||sy>cv.height*.6)return;
    ctx.save();ctx.globalAlpha=.18+.72*bl;
    ctx.shadowColor=`hsl(${s.hue},${s.sat}%,${s.lit}%)`;ctx.shadowBlur=s.r*4;
    ctx.fillStyle=`hsl(${s.hue},${s.sat}%,${s.lit}%)`;
    ctx.fillRect(sx-s.r/2,sy-s.r/2,s.r*(bl*.5+.5),s.r*(bl*.5+.5));
    ctx.restore();
  });
}

function drawGround(){
  const W=cv.width,H=cv.height,TILE=PX*8;
  const ox2=Math.floor((G.px-W/2)/TILE)*TILE;
  const oy2=Math.floor((G.py-H/2)/TILE)*TILE;
  for(let tx=ox2-TILE;tx<ox2+W+TILE;tx+=TILE){
    for(let ty=oy2-TILE;ty<oy2+H+TILE;ty+=TILE){
      const sx=tx-G.px+W/2+CAM.sx,sy=ty-G.py+H/2+CAM.sy;
      if(sx<-TILE||sx>W+TILE||sy<-TILE||sy>H+TILE)continue;
      const ns=Math.sin(tx*.008+ty*.012)*.5+Math.cos(tx*.015-ty*.009)*.5;
      const br=Math.round(38+ns*10);
      ctx.fillStyle=`rgb(${Math.round(br*.42)},${Math.round(br*.55)},${br})`;
      ctx.fillRect(sx,sy,TILE+1,TILE+1);
      ctx.fillStyle=`rgba(0,0,0,${.08+ns*.04})`;

function drawTerrain(){
  const W=cv.width,H=cv.height;
  TERRAIN.sort((a,b)=>a.y-b.y).forEach(t=>{
    const sx=t.x-G.px+W/2+CAM.sx,sy=t.y-G.py+H/2+CAM.sy;
    if(sx<-60||sx>W+60||sy<-60||sy>H+60)return;
    ctx.save();
    if(t.type==='tree'){
      ctx.globalAlpha=.18;ctx.fillStyle='#000';
      ctx.beginPath();ctx.ellipse(sx,sy+t.r*.4,t.r*1.8,t.r*.7,0,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
      const bs=Math.max(2,Math.round(t.r*.25))*PX;
      ctx.fillStyle=C.tr1;ctx.fillRect(sx-bs*.4,sy-bs*.2,bs*.8,bs*1.2);
      const ps=Math.max(3,PX);
      const dot=(cx2,cy2,r,col)=>{for(let py2=cy2-r;py2<cy2+r;py2+=ps)for(let px2=cx2-r;px2<cx2+r;px2+=ps)if(Math.hypot(px2-cx2,py2-cy2)<r){ctx.fillStyle=col;ctx.fillRect(px2,py2,ps,ps);}};
      dot(sx,sy-t.r*.8,t.r*1.1,C.tf1);dot(sx-t.r*.35,sy-t.r*1.3,t.r*.75,C.tf2);dot(sx+t.r*.35,sy-t.r*1.3,t.r*.75,C.tf2);dot(sx,sy-t.r*1.75,t.r*.6,C.tf3);
    } else if(t.type==='rock'){
      ctx.globalAlpha=.18;ctx.fillStyle='#000';
      ctx.beginPath();ctx.ellipse(sx,sy+2,t.r*1.8,t.r*.75,0,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
      ctx.fillStyle=C.ro1;
      const pts=[[-t.r,0],[-t.r*.6,-t.r*.9],[t.r*.2,-t.r*1.1],[t.r,t.r*.4],[t.r*.8,0]];
      ctx.beginPath();ctx.moveTo(sx+pts[0][0],sy+pts[0][1]);pts.forEach(p=>ctx.lineTo(sx+p[0],sy+p[1]));ctx.closePath();ctx.fill();
      ctx.fillStyle=C.ro3;ctx.fillRect(sx-t.r*.2,sy-t.r*.9,t.r*.8,t.r*.3);
    } else {
      ctx.globalAlpha=.22+.06*Math.sin(Date.now()*.001+t.x);
      ctx.fillStyle='rgba(150,220,255,.35)';
      ctx.beginPath();ctx.ellipse(sx,sy,t.r*2.5,t.r*.9,0,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='rgba(200,240,255,.55)';ctx.lineWidth=1.5;ctx.stroke();ctx.globalAlpha=1;
    }
    ctx.restore();
  });
}

function drawBears(t){

      const ac={fire:'#ff4400',ice:'#44aaff',poison:'#44aa00',thunder:'#ffdd00'};

      withGlow(ac[b.aura],22,()=>{ctx.fillStyle=ac[b.aura]+'44';ctx.beginPath();ctx.arc(sx,sy-s*10,s*28,0,Math.PI*2);ctx.fill();});

    ctx.globalAlpha=.18;ctx.fillStyle='#000';ctx.beginPath();ctx.ellipse(sx,sy+s*8,s*18,s*7,0,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;

        ctx.beginPath();ctx.moveTo(sx-b.sz*12,cy2);ctx.lineTo(sx-b.sz*9,cy2-b.sz*14);ctx.lineTo(sx-b.sz*2,cy2-b.sz*8);ctx.lineTo(sx,cy2-b.sz*16);ctx.lineTo(sx+b.sz*2,cy2-b.sz*8);ctx.lineTo(sx+b.sz*9,cy2-b.sz*14);ctx.lineTo(sx+b.sz*12,cy2);ctx.closePath();ctx.fill();
        ctx.fillStyle='#ff4466';ctx.beginPath();ctx.arc(sx,cy2-b.sz*14,b.sz*3.5,0,Math.PI*2);ctx.fill();
      });
      ctx.restore();
    }
    const hw=Math.max(36,s*40),hh=Math.max(4,s*5);

function drawProjs(){
  const W=cv.width,H=cv.height;
  ENT.projs.forEach(p=>{
    const sx=p.x-G.px+W/2+CAM.sx,sy=p.y-G.py+H/2+CAM.sy;

      case 'arrow':withGlow('#ffaa44',8,()=>{ctx.strokeStyle='#cc8844';ctx.lineWidth=2.5;ctx.beginPath();ctx.moveTo(-14,0);ctx.lineTo(13,0);ctx.stroke();ctx.fillStyle='#aa6622';ctx.beginPath();ctx.moveTo(13,0);ctx.lineTo(6,-4);ctx.lineTo(6,4);ctx.closePath();ctx.fill();});break;
      case 'bullet':withGlow('#ffff44',14,()=>{ctx.fillStyle='#ffff88';ctx.beginPath();ctx.ellipse(0,0,9,3.5,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#ffffff';ctx.beginPath();ctx.ellipse(3,0,4,2,0,0,Math.PI*2);ctx.fill();});break;
      case 'shot':withGlow('#ff8844',12,()=>{ctx.fillStyle='#ff9955';ctx.beginPath();ctx.arc(0,0,5.5,0,Math.PI*2);ctx.fill();});break;
      case 'beam':withGlow('#ff2200',20,()=>{ctx.strokeStyle='#ff2200';ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(-32,0);ctx.lineTo(32,0);ctx.stroke();});break;
      case 'rocket':withGlow('#ff4400',18,()=>{ctx.fillStyle='#ff6600';ctx.beginPath();ctx.ellipse(0,0,14,5,0,0,Math.PI*2);ctx.fill();ctx.fillStyle='#ffcc00';ctx.beginPath();ctx.ellipse(-18,0,10,4,0,0,Math.PI*2);ctx.fill();});break;
      case 'laser':withGlow('#00ffff',28,()=>{ctx.strokeStyle='#00ffff';ctx.lineWidth=6;ctx.beginPath();ctx.moveTo(-45,0);ctx.lineTo(45,0);ctx.stroke();});break;
      case 'tornado':withGlow('#8888ff',16,()=>{ctx.fillStyle='rgba(150,150,255,.8)';ctx.beginPath();ctx.arc(0,0,16,0,Math.PI*2);ctx.fill();ctx.fillStyle='#ffffff';ctx.beginPath();ctx.arc(0,0,4,0,Math.PI*2);ctx.fill();});break;
      default:ctx.fillStyle=p.col||'#fff';ctx.beginPath();ctx.arc(0,0,6,0,Math.PI*2);ctx.fill();
    }
    ctx.restore();
  });
}

// ── 메인 루프 ──
let last=0;
function loop(ts){
  const dt=Math.min((ts-last)/1000,.05);last=ts;
  const t=ts/1000;const W=cv.width,H=cv.height;
  if(G.gameover){requestAnimationFrame(loop);return;}
  G.skCd=G.skCd.map(c=>Math.max(0,c-dt));
  if(G.berserkOn){G.berserkT-=dt;if(G.berserkT<=0)G.berserkOn=false;}
  if(G.sanctuaryOn){G.sanctuaryT-=dt;if(G.sanctuaryT<=0)G.sanctuaryOn=false;}
  if(playerAtkT>0)playerAtkT-=dt;
  orbAngle+=dt*1.6;
  const ch=getCh();
  const moving=JOY.on&&(Math.abs(JOY.dx)>.02||Math.abs(JOY.dy)>.02);
  if(moving){const sp=175*(G.berserkOn?1.5:1)*ch.sm;G.px=Math.max(-2900,Math.min(2900,G.px+JOY.dx*sp*dt));G.py=Math.max(-2900,Math.min(2900,G.py+JOY.dy*sp*dt));walkPhase+=dt*9;}else walkPhase*=.82;
  if(G.hpRegen>0&&G.hp<G.maxHp)G.hp=Math.min(G.maxHp,G.hp+G.hpRegen*dt);
  doAttack(dt);
  if(G.autoSkill){autoT+=dt;if(autoT>=.5){autoT=0;SK_DEFS.forEach((_,i)=>{if(G.skCd[i]<=0&&ENT.bears.length>0)useSkill(i);});}}
  if(CAM.shake>0){CAM.shake-=dt*2.5;const i2=10*CAM.shake;CAM.sx=(Math.random()-.5)*i2;CAM.sy=(Math.random()-.5)*i2;}else{CAM.sx*=.7;CAM.sy*=.7;}
  if(!G.bossOn){
    const maxB=Math.min(80,10+G.wave*5),spInt=Math.max(.35,2-G.wave*.06);
    spawnT+=dt;
    if(spawnT>=spInt&&ENT.bears.length<maxB){spawnT=0;const cnt=Math.min(6,2+Math.floor(G.wave/3));for(let i=0;i<cnt;i++)spawnBear();}
    if(ENT.bears.length===0&&spawnT<.1){for(let i=0;i<5;i++)spawnBear();}
    if(G.waveKills>=wReq())spawnBoss();
  }
  const dead=[];
  ENT.bears.forEach(b=>{
    if(b.slow>0)b.slow-=dt;
    if(b.poison>0){b.poison-=dt;b.hp-=6*dt;if(b.hp<=0){dead.push(b);return;}}
    const dx=G.px-b.x,dy=G.py-b.y,d=Math.max(1,Math.hypot(dx,dy));
    b.x+=dx/d*b.spd*(b.slow>0?.25:1)*dt;b.y+=dy/d*b.spd*(b.slow>0?.25:1)*dt;b.ph+=dt;
    if(d<58){b.at=(b.at||0)+dt;if(b.at>=1){b.at=0;takeDmg(b.atk);}}
    if(b.isBoss)bossRef=b;
  });
  dead.forEach(b=>killBear(b));
  const pdead=new Set();
  ENT.projs.forEach((p,pi)=>{
    p.x+=p.dx*p.spd*dt;p.y+=p.dy*p.spd*dt;p.traveled+=p.spd*dt;
    ENT.bears.forEach(b=>{
      if(!p.pierce&&pdead.has(pi))return;
      if(Math.hypot(b.x-p.x,b.y-p.y)<b.sz*52){
        hitBear(b,p.dmg,false);
        if(p.splash>0)ENT.bears.filter(o=>o!==b&&Math.hypot(o.x-b.x,o.y-b.y)<p.splash).forEach(o=>hitBear(o,p.dmg*.5,false));
        if(!p.pierce)pdead.add(pi);
        spawnParts(p.x,p.y,p.col||'#ffffff',p.splash>0?16:6,p.splash>0);
      }
    });
    if(p.traveled>p.maxD)pdead.add(pi);
  });
  ENT.projs=ENT.projs.filter((_,i)=>!pdead.has(i));
  ENT.parts.forEach(p=>{p.life--;p.x+=p.vx*dt;p.y+=p.vy*dt;p.vx*=.9;p.vy*=.9;p.vy+=90*dt;});
  ENT.parts=ENT.parts.filter(p=>p.life>0);
  ENT.floats.forEach(f=>{f.life--;f.y+=f.vy*dt;f.vy*=.95;});
  ENT.floats=ENT.floats.filter(f=>f.life>0);

  const bgGrad=ctx.createLinearGradient(0,0,0,H);
  if(G.bossOn){bgGrad.addColorStop(0,'#1a0005');bgGrad.addColorStop(.7,'#090015');bgGrad.addColorStop(1,'#030010');}
  else{bgGrad.addColorStop(0,'#000812');bgGrad.addColorStop(.7,'#07001a');bgGrad.addColorStop(1,'#02000e');}
  ctx.fillStyle=bgGrad;ctx.fillRect(0,0,W,H);
  drawStars(t);drawGround();drawTerrain();drawCampfire(t);drawParts();drawBears(t);drawOrbFX(t);drawProjs();drawPlayer(t);drawSwings();drawFloats();drawVignette();drawScanlines();
  if(JOY.on){
    ctx.save();ctx.strokeStyle='rgba(255,255,255,.22)';ctx.fillStyle='rgba(255,255,255,.07)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(JOY.bx+46,JOY.by+46,46,0,Math.PI*2);ctx.fill();ctx.stroke();
    const kg=ctx.createRadialGradient(JOY.kx+19,JOY.ky+19,0,JOY.kx+19,JOY.ky+19,19);kg.addColorStop(0,'rgba(180,210,255,.95)');kg.addColorStop(1,'rgba(50,100,255,.7)');
    ctx.fillStyle=kg;ctx.shadowColor='#4488ff';ctx.shadowBlur=10;ctx.beginPath();ctx.arc(JOY.kx+19,JOY.ky+19,19,0,Math.PI*2);ctx.fill();ctx.restore();
  }
  drawMinimap();updateHUD();updateSkillUI();
  requestAnimationFrame(loop);
}

      const owned=G.ownedW.includes(w.id),eqp=G.weapon===w.id;
      const d=document.createElement('div');d.className='si'+(eqp?' eq':owned?' ow':'');
      d.innerHTML=`<div class="si-ic">${w.ic}</div><div class="si-b"><div class="si-n">${w.n}</div><div class="stags"><span class="stag" style="background:rgba(255,60,60,.12);color:#f88">⚔️${w.atk}</span><span class="stag" style="background:rgba(60,255,60,.1);color:#8f8">⚡${w.spd}/s</span><span class="stag" style="background:rgba(60,60,255,.1);color:#88f">🎯${w.rng}</span></div>${eqp?'<div style="color:#a080ff;font-size:9px">✅장착중</div>':owned?'<div class="si-ow">✅보유·탭:장착</div>':`<div class="si-p">💰${w.pr||'무료'}</div>`}</div>`;
      d.onclick=()=>{if(!G.ownedW.includes(w.id)&&G.gold<w.pr){alert('골드 부족!');return;}if(!G.ownedW.includes(w.id))G.gold-=w.pr;G.ownedW=[...new Set([...G.ownedW,w.id])];G.weapon=w.id;recompute();renderShop();};
      body.appendChild(d);
    });
  } else if(curTab==='atk'||curTab==='def'){
    const items=curTab==='atk'?ATK_UPS:DEF_UPS;
    const grid=document.createElement('div');grid.className='g2';
    items.forEach(it=>{
      const cnt=G.bought[it.id]||0,mx=it.once&&cnt>0;
      const d=document.createElement('div');d.className='gi'+(mx?' mx':'');
      d.innerHTML=`${cnt>0&&!it.once?`<div class="gi-c">${cnt}</div>`:''}<div class="gi-i">${it.ic}</div><div class="gi-n">${it.n}</div><div class="gi-d">${it.d}</div>${mx?'<div style="color:#4dc;font-size:9px">✅MAX</div>':`<div class="si-p">💰${it.pr}</div>`}`;
      d.onclick=()=>{if(mx)return;if(G.gold<it.pr){alert('골드 부족!');return;}G.gold-=it.pr;G.bought[it.id]=(G.bought[it.id]||0)+1;recompute();renderShop();};
      grid.appendChild(d);
    });
    body.appendChild(grid);
  } else if(curTab==='test'){
    const s=document.createElement('div');s.className='ts';
    s.innerHTML=`<button class="tg" onclick="G.gold+=10000;showAnn('💰 +10,000!');renderShop()">💰 골드 +10,000</button>
    <button class="tt" onclick="G.wave+=5;showAnn('⏩ Wave +5!')">⏩ Wave +5</button>
    <button class="tt" onclick="G.hp=G.maxHp;showAnn('❤️ HP 회복!')">❤️ HP 완전회복</button>
    <button class="tt" onclick="G.skCd=[0,0,0,0,0,0];showAnn('⚡ 쿨타임 초기화!')">⚡ 스킬 초기화</button>`;
    body.appendChild(s);
  }
}
function toggleAuto(){G.autoSkill=!G.autoSkill;const b=document.getElementById('abtn');b.className='rb'+(G.autoSkill?' on':'');b.innerHTML='자동<br>스킬<br>'+(G.autoSkill?'ON':'OFF');}

let _rbD={};
function triggerRebirth(){
  _rbD={atk:Math.min(100,G.rb.atk+8),hp:Math.min(200,G.rb.hp+15),gold:Math.min(50,G.rb.gold+5),cd:Math.min(40,G.rb.cd+5)};
  document.getElementById('rbinfo').textContent='Wave '+G.wave+' 달성!';
  const grid=document.getElementById('rbgrid');grid.innerHTML='';
  [['⚔️','공격','+'+_rbD.atk+'%'],['❤️','HP','+'+_rbD.hp+'%'],['💰','골드','+'+_rbD.gold+'%'],['⚡','쿨타임','-'+_rbD.cd+'%']].forEach(([ic,n,v])=>{
    const d=document.createElement('div');d.className='rbi';
    d.innerHTML=`<div style="font-size:16px">${ic}</div><div style="color:#aaa;font-size:9px">${n}</div><div style="color:#ffd700;font-size:12px;font-weight:bold">${v}</div>`;
    grid.appendChild(d);
  });
  document.getElementById('rb').style.display='flex';
}
function doRebirth(){G.reinCount++;G.rb={..._rbD};recompute();G.hp=G.maxHp;document.getElementById('rb').style.display='none';showAnn('✨ 환생! 더 강해졌다!');}

function continueGame(){
  G.gold=Math.floor(G.gold*.7);G.hp=G.maxHp;G.gameover=false;
  ENT.bears=[];ENT.projs=[];G.waveKills=0;G.bossOn=false;bossRef=null;
  G.skCd=[0,0,0,0,0,0];G.berserkOn=false;G.sanctuaryOn=false;
  document.getElementById('death').style.display='none';showAnn('💀→💪 계속!');
}

// ── 시작 ──
async function start(){
  await initSprites();
  initWorld();
  recompute();
  G.hp=G.maxHp;
  buildSkillUI();
  for(let i=0;i<6;i++) spawnBear();
  requestAnimationFrame(loop);
}
start();
</script>
</body>
</html>
