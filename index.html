<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>좀비 서바이벌</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;overflow:hidden;touch-action:none;user-select:none;font-family:'Malgun Gothic',sans-serif}
canvas{display:block;position:fixed;top:0;left:0}
#ui{position:fixed;inset:0;pointer-events:none;z-index:10}
#hud{position:absolute;top:0;left:0;right:0;padding:8px 10px;background:linear-gradient(rgba(0,0,0,.8),transparent)}
.hrow{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
.hval{color:#fff;font-size:11px}
.hval b{color:#ffd700}
#bar-hp{height:10px;background:rgba(255,255,255,.15);border-radius:5px;overflow:hidden;margin-bottom:2px}
#bar-hp-f{height:100%;background:linear-gradient(90deg,#c00,#f60,#ff0);border-radius:5px;transition:width .1s}
#timebar{height:4px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
#timebar-f{height:100%;transition:width .05s;border-radius:2px}
#daynight{position:absolute;top:70px;left:50%;transform:translateX(-50%);font-size:13px;color:#fff;text-shadow:0 0 10px currentColor;pointer-events:none;opacity:0;transition:opacity .5s}
#ann{position:absolute;top:35%;left:50%;transform:translate(-50%,-50%);font-size:20px;color:#ff8844;text-shadow:0 0 18px #f40;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .3s;text-align:center}
#levelup{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.88);pointer-events:all;gap:10px}
#levelup h2{color:#ffd700;font-size:20px;text-shadow:0 0 20px #fa0}
.lcard{background:rgba(255,255,255,.06);border:1px solid rgba(255,215,0,.3);border-radius:12px;padding:12px 20px;width:220px;cursor:pointer;text-align:center}
.lcard:hover{background:rgba(255,215,0,.12);border-color:#ffd700}
.lcard .lic{font-size:28px}
.lcard .lnm{color:#eee;font-size:13px;margin:4px 0}
.lcard .ld{color:#aaa;font-size:10px}
#btns{position:absolute;right:8px;bottom:140px;display:flex;flex-direction:column;gap:8px;pointer-events:all}
.rb{width:52px;height:52px;border-radius:50%;border:2px solid rgba(255,215,0,.6);background:rgba(0,0,0,.7);color:#fff;font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;text-align:center;line-height:1.3}
#death{position:absolute;inset:0;display:none;flex-direction:column;align-items:center;justify-content:center;gap:14px;background:rgba(0,0,0,.93);pointer-events:all}
.bp{background:linear-gradient(135deg,#800,#f22);color:#fff;padding:11px 28px;border-radius:20px;font-size:14px;cursor:pointer;border:none}
.bs{background:rgba(255,255,255,.07);color:#888;padding:9px 22px;border-radius:20px;font-size:13px;cursor:pointer;border:1px solid rgba(255,255,255,.15)}
#buildmenu{position:absolute;bottom:140px;left:8px;display:none;flex-direction:column;gap:6px;pointer-events:all}
.bmbtn{background:rgba(0,0,0,.85);border:1px solid rgba(80,180,255,.4);border-radius:10px;color:#fff;padding:7px 12px;font-size:10px;cursor:pointer;white-space:nowrap}
.bmbtn:hover{background:rgba(80,180,255,.2)}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="ui">
  <div id="hud">
    <div class="hrow">
      <span class="hval">❤️ <b id="hhp">100</b>/<b id="hmhp">100</b></span>
      <span class="hval">⏱️ Day <b id="hday">1</b></span>
      <span class="hval">💰<b id="hgold">0</b> | ⭐Lv.<b id="hlv">1</b></span>
    </div>
    <div id="bar-hp"><div id="bar-hp-f" style="width:100%"></div></div>
    <div style="margin-top:3px">
      <div id="timebar"><div id="timebar-f" style="width:50%"></div></div>
    </div>
    <div style="font-size:9px;color:rgba(255,255,255,.4);text-align:right;margin-top:1px" id="timeinfo">낮 | 좀비: <span id="hzc">0</span></div>
  </div>
  <div id="daynight"></div>
  <div id="ann"></div>
  <div id="buildmenu">
    <div class="bmbtn" onclick="startBuild('wall')">🧱 벽 (💰50)</div>
    <div class="bmbtn" onclick="startBuild('turret')">🔫 포탑 (💰200)</div>
    <div class="bmbtn" onclick="startBuild('medkit')">🏥 의무실 (💰300)</div>
    <div class="bmbtn" onclick="startBuild('barricade')">⛩️ 바리케이드 (💰80)</div>
    <div class="bmbtn" onclick="closeBuild()" style="border-color:rgba(255,60,60,.4);color:#f88">✕ 닫기</div>
  </div>
  <div id="btns">
    <div class="rb" onclick="toggleBuildMenu()">🏗️<br>건설</div>
    <div class="rb" onclick="hireMerc()">⚔️<br>용병</div>
  </div>
  <div id="levelup">
    <h2>✨ 레벨 업!</h2>
    <div id="lcards"></div>
  </div>
  <div id="death">
    <div style="font-size:40px">💀</div>
    <div style="color:#f44;font-size:22px">생존 실패</div>
    <div id="dinfo" style="color:#aaa;font-size:12px;text-align:center;line-height:2"></div>
    <button class="bp" onclick="location.reload()">다시 시작</button>
  </div>
</div>
<script>
const cv=document.getElementById('c');
const ctx=cv.getContext('2d',{alpha:false});
ctx.imageSmoothingEnabled=false;

function resize(){cv.width=innerWidth;cv.height=innerHeight;}
resize();addEventListener('resize',resize);

// ── 쿼터뷰 변환 ──
const ISO={sx:2,sy:1}; // x스케일, y스케일(눌림)
function toScreen(wx,wy,wz=0){
  // 쿼터뷰: x→오른쪽아래, y→왼쪽아래
  const sx2=(wx-wy)*ISO.sx*16;
  const sy2=(wx+wy)*ISO.sy*8-wz*22;
  return {x:sx2,y:sy2};
}
// 월드 → 화면 (카메라 포함)
function ws(wx,wy,wz=0){
  const s=toScreen(wx,wy,wz);
  return {x:s.x-cam.x+cv.width/2, y:s.y-cam.y+cv.height/2};
}
// 화면→월드 (대략)
function sw(sx2,sy2){
  const rx=sx2-cv.width/2+cam.x;
  const ry=sy2-cv.height/2+cam.y;
  const wx=(rx/(ISO.sx*16)+ry/(ISO.sy*8))/2;
  const wy=(ry/(ISO.sy*8)-rx/(ISO.sx*16))/2;
  return {x:wx,y:wy};
}

// ── 카메라 ──
const cam={x:0,y:0,tx:0,ty:0,shake:0,sx:0,sy:0};

// ── 팔레트 ──
const PAL={
  grass:['#2d4a1e','#3a5c26','#2a4520','#324f22'],
  dirt:['#4a3520','#5a4228','#443018'],
  road:'#3a3a3a',
  wall:'#8a7060',
  wallTop:'#b09880',
  zombie:['#4a7a4a','#3d6b3d','#5a8a5a'],
  zombieD:['#2a4a2a','#1d3b1d'],
  blood:'#8b0000',
};

// ── 게임 상태 ──
const G={
  hp:100,maxHp:100,gold:150,lv:1,xp:0,xpNext:50,
  day:1,time:0,dayLen:90, // dayLen초
  isNight:false,kills:0,wave:0,
  atkDmg:15,atkSpd:1.5,atkRng:140,
  hpRegen:.5,dmgRed:0,
  dead:false,buildMode:null,
  mercCount:0,maxMerc:5,
  px:0,py:0, // 월드 좌표
};

// ── 엔티티 ──
const ENT={zombies:[],projs:[],parts:[],floats:[],mercs:[],buildings:[]};

// ── 타일맵 ──
const TSIZE=1; // 월드 단위
const MAP_R=60;
const tiles=new Map();
function tkey(x,y){return x+','+y;}
function initMap(){
  for(let x=-MAP_R;x<=MAP_R;x++){
    for(let y=-MAP_R;y<=MAP_R;y++){
      const d=Math.hypot(x,y);
      let t='grass';
      if(d<4) t='dirt';
      tiles.set(tkey(x,y),t);
    }
  }
}

// ── 스프라이트 로드 ──
const SPR={};
let spriteSheet=null;
const FRAME_W=48,FRAME_H=65;
// 애니메이션 행 정의 (파일 없으면 폴백)
// 행0=대기, 행1=걷기, 행2=공격, 행3=죽음 등 (실제 파일에 맞게 조정)
const ANIM={
  idle:{row:0,frames:4,spd:8},
  walk:{row:1,frames:8,spd:10},
  attack:{row:2,frames:6,spd:14},
};

function loadSprites(){
  return new Promise(res=>{
    // 업로드된 스프라이트시트 시도
    const imgs=['player_sheet.png','char_default.png','player.png'];
    let tried=0;
    function tryNext(){
      if(tried>=imgs.length){res(null);return;}
      const img=new Image();
      img.onload=()=>{spriteSheet=img;res(img);};
      img.onerror=()=>{tried++;tryNext();};
      img.src=imgs[tried++];
    }
    tryNext();
  });
}

// ── 도트 캐릭터 그리기 (폴백) ──
function drawDotPlayer(x,y,dir,anim,frame){
  const px2=Math.round(x),py2=Math.round(y);
  const t=frame*.3;
  const bob=anim==='walk'?Math.sin(t)*3:0;
  const flip=dir<0;
  ctx.save();
  if(flip){ctx.translate(px2,py2);ctx.scale(-1,1);ctx.translate(-px2,-py2);}
  // 그림자
  ctx.globalAlpha=.3;ctx.fillStyle='#000';
  ctx.beginPath();ctx.ellipse(px2,py2+2,14,5,0,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;
  // 다리
  const loff=anim==='walk'?Math.sin(t)*5:0;
  ctx.fillStyle='#1a2a5a';
  ctx.fillRect(px2-7,py2-18+bob,6,14+loff);
  ctx.fillRect(px2+1,py2-18+bob,6,14-loff);
  // 신발
  ctx.fillStyle='#111';
  ctx.fillRect(px2-8,py2-5+bob,8,5);
  ctx.fillRect(px2+1,py2-5+bob,8,5);
  // 몸통
  ctx.fillStyle='#3a6a3a';
  ctx.fillRect(px2-9,py2-36+bob,18,18);
  // 포켓/디테일
  ctx.fillStyle='#2a5a2a';
  ctx.fillRect(px2-7,py2-32+bob,5,5);
  ctx.fillRect(px2+2,py2-32+bob,5,5);
  // 팔
  const aoff=anim==='attack'?-8:0;
  ctx.fillStyle='#3a6a3a';
  ctx.fillRect(px2-14,py2-35+bob+aoff,6,12);
  ctx.fillRect(px2+8,py2-35+bob-aoff,6,12);
  // 손
  ctx.fillStyle='#f5c18a';
  ctx.fillRect(px2-14,py2-24+bob+aoff,6,5);
  ctx.fillRect(px2+8,py2-24+bob-aoff,6,5);
  // 총(오른쪽)
  ctx.fillStyle='#333';
  ctx.fillRect(px2+12,py2-26+bob-aoff,14,5);
  ctx.fillStyle='#555';
  ctx.fillRect(px2+22,py2-27+bob-aoff,6,7);
  // 목
  ctx.fillStyle='#f5c18a';
  ctx.fillRect(px2-4,py2-40+bob,8,5);
  // 머리
  ctx.fillStyle='#f5c18a';
  ctx.fillRect(px2-9,py2-56+bob,18,17);
  // 눈
  ctx.fillStyle='#222';
  ctx.fillRect(px2-5,py2-50+bob,3,3);
  ctx.fillRect(px2+2,py2-50+bob,3,3);
  // 머리카락 (분홍/보라)
  ctx.fillStyle='#cc44aa';
  ctx.fillRect(px2-9,py2-56+bob,18,5);
  ctx.fillRect(px2-9,py2-51+bob,3,4);
  ctx.fillRect(px2+6,py2-51+bob,3,4);
  ctx.restore();
}

function drawDotZombie(x,y,dir,hp,mhp,big){
  const px2=Math.round(x),py2=Math.round(y);
  const sc=big?1.4:1;
  const flip=dir>0;
  ctx.save();
  ctx.translate(px2,py2);
  if(flip)ctx.scale(-1,1);
  ctx.scale(sc,sc);
  // 그림자
  ctx.globalAlpha=.3;ctx.fillStyle='#000';
  ctx.beginPath();ctx.ellipse(0,2,14,5,0,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;
  // 다리 (비틀거림)
  const wobble=Math.sin(Date.now()*.004+x)*.3;
  ctx.fillStyle='#3a2a1a';
  ctx.fillRect(-7,-18,5,14);ctx.fillRect(2,-18,5,14);
  ctx.fillStyle='#2a1a0a';
  ctx.fillRect(-8,-5,7,5);ctx.fillRect(2,-5,7,5);
  // 몸통 (누더기)
  ctx.fillStyle=PAL.zombie[Math.floor(Math.abs(x+y))%3];
  ctx.fillRect(-9,-36,18,18);
  ctx.fillStyle=PAL.zombieD[0];
  ctx.fillRect(-7,-30,4,8);
  // 팔 (늘어짐)
  ctx.fillStyle=PAL.zombie[0];
  ctx.fillRect(-15,-36+wobble*5,6,16);
  ctx.fillRect(9,-34-wobble*5,6,16);
  // 목
  ctx.fillStyle='#5a8a5a';
  ctx.fillRect(-4,-40,8,5);
  // 머리
  ctx.fillStyle='#5a8a5a';
  ctx.fillRect(-8,-54,16,15);
  // 눈 (빨간)
  ctx.fillStyle='#ff2222';
  ctx.fillRect(-5,-49,3,3);ctx.fillRect(2,-49,3,3);
  // 입(좀비)
  ctx.fillStyle='#8b0000';
  ctx.fillRect(-4,-44,8,3);
  ctx.fillStyle='#f5f5dc';
  ctx.fillRect(-3,-44,2,2);ctx.fillRect(1,-44,2,2);
  // 머리카락(헝클어짐)
  ctx.fillStyle='#1a1a1a';
  ctx.fillRect(-8,-56,3,5);ctx.fillRect(-2,-57,3,6);ctx.fillRect(4,-56,4,5);
  ctx.restore();
  // HP바
  const hw=28*sc,hh=3;
  const yr=py2-60*sc;
  const hr=Math.max(0,hp/mhp);
  ctx.fillStyle='rgba(0,0,0,.7)';ctx.fillRect(px2-hw/2,yr,hw,hh);
  ctx.fillStyle=hr>.5?'#44ff44':'#ff4444';
  ctx.fillRect(px2-hw/2,yr,hw*hr,hh);
}

function drawBuilding(b){
  const s=ws(b.wx,b.wy,0);
  const x=s.x+cam.sx,y=s.y+cam.sy;
  ctx.save();
  if(b.type==='wall'){
    // 쿼터뷰 벽
    const W2=28,H2=36,D=10;
    ctx.fillStyle='#6a5a4a';// 왼면
    ctx.beginPath();ctx.moveTo(x-W2,y);ctx.lineTo(x,y-H2/2);ctx.lineTo(x,y-H2/2-D);ctx.lineTo(x-W2,y-D);ctx.closePath();ctx.fill();
    ctx.fillStyle='#8a7060';// 오른면
    ctx.beginPath();ctx.moveTo(x,y-H2/2);ctx.lineTo(x+W2,y);ctx.lineTo(x+W2,y-D);ctx.lineTo(x,y-H2/2-D);ctx.closePath();ctx.fill();
    ctx.fillStyle='#b09880';// 윗면
    ctx.beginPath();ctx.moveTo(x-W2,y-D);ctx.lineTo(x,y-H2/2-D);ctx.lineTo(x+W2,y-D);ctx.lineTo(x,y+H2/2-D*2+6);ctx.closePath();ctx.fill();
    // HP바
    const hr=b.hp/b.mhp;
    ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(x-14,y-H2-D,28,3);
    ctx.fillStyle='#44aaff';ctx.fillRect(x-14,y-H2-D,28*hr,3);
  } else if(b.type==='turret'){
    // 포탑 기반
    ctx.fillStyle='#555566';
    ctx.beginPath();ctx.ellipse(x,y-4,20,10,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#777788';
    ctx.beginPath();ctx.ellipse(x,y-8,14,7,0,0,Math.PI*2);ctx.fill();
    // 포신
    const ang=b.atkAng||0;
    ctx.strokeStyle='#aaaacc';ctx.lineWidth=5;
    ctx.beginPath();ctx.moveTo(x,y-10);ctx.lineTo(x+Math.cos(ang)*24,y-10+Math.sin(ang)*12);ctx.stroke();
    // 레드라이트
    ctx.fillStyle=b.atkT>0?'#ff4444':'#441111';
    ctx.beginPath();ctx.arc(x,y-14,4,0,Math.PI*2);ctx.fill();
    const hr=b.hp/b.mhp;
    ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(x-14,y-28,28,3);
    ctx.fillStyle='#44aaff';ctx.fillRect(x-14,y-28,28*hr,3);
  } else if(b.type==='medkit'){
    ctx.fillStyle='#aa2222';
    ctx.fillRect(x-14,y-24,28,22);
    ctx.fillStyle='#cc3333';
    ctx.fillRect(x-14,y-26,28,4);
    ctx.fillStyle='#ffffff';
    ctx.fillRect(x-3,y-22,6,14);
    ctx.fillRect(x-8,y-17,16,5);
    const hr=b.hp/b.mhp;
    ctx.fillStyle='rgba(0,0,0,.6)';ctx.fillRect(x-14,y-32,28,3);
    ctx.fillStyle='#44ff44';ctx.fillRect(x-14,y-32,28*hr,3);
  } else if(b.type==='barricade'){
    ctx.fillStyle='#6a4a2a';
    for(let i=0;i<3;i++){
      ctx.fillRect(x-18+i*12,y-18,8,18);
      ctx.fillStyle='#8a6040';
      ctx.fillRect(x-18+i*12,y-20,8,4);
      ctx.fillStyle='#6a4a2a';
    }
  }
  ctx.restore();
}

function drawMerc(m){
  const s=ws(m.wx,m.wy,0);
  const x=s.x+cam.sx,y=s.y+cam.sy;
  const flip=m.dir<0;
  ctx.save();
  if(flip){ctx.translate(x,y);ctx.scale(-1,1);ctx.translate(-x,-y);}
  // 그림자
  ctx.globalAlpha=.25;ctx.fillStyle='#000';
  ctx.beginPath();ctx.ellipse(x,y+2,10,4,0,0,Math.PI*2);ctx.fill();
  ctx.globalAlpha=1;
  const bob=Math.sin(Date.now()*.006+m.id)*2*(m.moving?1:0);
  // 다리
  ctx.fillStyle='#2a2a4a';
  ctx.fillRect(x-5,y-14+bob,4,10);ctx.fillRect(x+1,y-14+bob,4,10);
  // 몸
  ctx.fillStyle=m.col||'#4a4a8a';
  ctx.fillRect(x-7,y-26+bob,14,13);
  // 팔+총
  ctx.fillStyle=m.col||'#4a4a8a';
  ctx.fillRect(x-11,y-26+bob,4,8);ctx.fillRect(x+7,y-26+bob,4,8);
  ctx.fillStyle='#222';ctx.fillRect(x+9,y-22+bob,12,3);
  // 목+머리
  ctx.fillStyle='#f5c18a';
  ctx.fillRect(x-3,y-30+bob,6,4);
  ctx.fillRect(x-6,y-40+bob,12,11);
  // 헬멧
  ctx.fillStyle=m.col||'#4a4a8a';
  ctx.fillRect(x-7,y-42+bob,14,8);
  // 눈
  ctx.fillStyle='#222';ctx.fillRect(x-3,y-36+bob,2,2);ctx.fillRect(x+1,y-36+bob,2,2);
  // 이름
  ctx.fillStyle='rgba(0,0,0,.5)';ctx.fillRect(x-16,y-50+bob,32,10);
  ctx.fillStyle='#aaddff';ctx.font='7px sans-serif';ctx.textAlign='center';
  ctx.fillText(m.name,x,y-42+bob);
  ctx.restore();
}

// ── 좀비 스폰 ──
let uid2=0;
const uid=()=>++uid2;

function spawnZombie(){
  const ang=Math.random()*Math.PI*2;
  const dist=500+Math.random()*300;
  const sp=ws(G.px,G.py,0);
  const wpos=sw(sp.x+Math.cos(ang)*dist,sp.y+Math.sin(ang)*dist);
  const big=Math.random()<.08+(G.day-1)*.015;
  const hpBase=big?220:55;
  const hpScale=1+(G.day-1)*.22;
  const mhp=Math.round(hpBase*hpScale);
  ENT.zombies.push({
    id:uid(),wx:wpos.x,wy:wpos.y,
    hp:mhp,mhp,
    spd:.8+Math.random()*.4+(G.day-1)*.04,
    atk:6+G.day*2,at:0,
    big,col:big?'#6aaa6a':PAL.zombie[0],
    dir:1,ph:Math.random()*Math.PI*2,
    gold:big?8:2,xp:big?15:4,
  });
}

// ── 용병 고용 ──
const MERC_NAMES=['알파','베타','감마','델타','엡실론'];
const MERC_COLS=['#4a6aaa','#aa4a4a','#4aaa6a','#aa8a4a','#8a4aaa'];
function hireMerc(){
  if(G.mercCount>=G.maxMerc){showAnn('용병 꽉 참!');return;}
  const cost=200+G.mercCount*100;
  if(G.gold<cost){showAnn('💰 골드 부족! ('+cost+'필요)');return;}
  G.gold-=cost;G.mercCount++;
  const ang=Math.random()*Math.PI*2;
  ENT.mercs.push({
    id:uid(),
    name:MERC_NAMES[ENT.mercs.length%5],
    col:MERC_COLS[ENT.mercs.length%5],
    wx:G.px+Math.cos(ang)*60,wy:G.py+Math.sin(ang)*60,
    hp:120,mhp:120,
    atkDmg:20,atkRng:180,atkT:0,atkInt:1.8,
    spd:1.1,dir:1,moving:false,
    target:null,ang:0,
  });
  showAnn('⚔️ 용병 고용! ('+G.mercCount+'/'+G.maxMerc+')');
}

// ── 플레이어 공격 ──
let atkT=0,walkPh=0,playerDir=1,playerAnim='idle';
function doPlayerAtk(dt){
  atkT+=dt;
  const interval=1/Math.max(.1,G.atkSpd);
  if(atkT<interval)return;atkT=0;
  // 가장 가까운 좀비
  const targets=ENT.zombies.filter(z=>Math.hypot(z.wx-G.px,z.wy-G.py)<G.atkRng/30);
  if(!targets.length)return;
  targets.sort((a,b)=>Math.hypot(a.wx-G.px,a.wy-G.py)-Math.hypot(b.wx-G.px,b.wy-G.py));
  const t=targets[0];
  playerDir=t.wx>G.px?1:-1;
  playerAnim='attack';
  const dx=t.wx-G.px,dy=t.wy-G.py;
  fireProj(G.px,G.py,dx,dy,G.atkDmg,'#ffff44',18,G.atkRng/30,'player');
  if(G.multiShot){
    const ang=Math.atan2(dy,dx)+.3;
    fireProj(G.px,G.py,Math.cos(ang),Math.sin(ang),G.atkDmg,'#ffff44',18,G.atkRng/30,'player');
  }
}

// ── 조이스틱 ──
const JOY={on:false,dx:0,dy:0,ox:0,oy:0,bx:0,by:0,kx:0,ky:0};
function joyStart(cx,cy){
  if(cx>cv.width-110||cy>cv.height-100||cy<100)return;
  JOY.on=true;JOY.ox=cx;JOY.oy=cy;
  JOY.bx=cx-48;JOY.by=cy-48;JOY.kx=cx-20;JOY.ky=cy-20;
  JOY.dx=0;JOY.dy=0;
}
function joyMove(cx,cy){
  if(!JOY.on)return;
  let dx=cx-JOY.ox,dy=cy-JOY.oy;
  const len=Math.hypot(dx,dy);if(len>48){dx=dx/len*48;dy=dy/len*48;}
  JOY.dx=dx/48;JOY.dy=dy/48;
  JOY.kx=JOY.ox+dx-20;JOY.ky=JOY.oy+dy-20;
}
function joyEnd(){JOY.on=false;JOY.dx=0;JOY.dy=0;}
addEventListener('touchstart',e=>{e.preventDefault();joyStart(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
addEventListener('touchmove',e=>{e.preventDefault();joyMove(e.touches[0].clientX,e.touches[0].clientY);},{passive:false});
addEventListener('touchend',e=>{joyEnd();},{passive:false});
cv.addEventListener('mousedown',e=>{
  if(buildType){
    const wp=sw(e.clientX,e.clientY);
    placeBuilding(Math.round(wp.x),Math.round(wp.y));
    return;
  }
  joyStart(e.clientX,e.clientY);
});
addEventListener('mousemove',e=>{if(JOY.on)joyMove(e.clientX,e.clientY);});
addEventListener('mouseup',e=>{joyEnd();});

// ── 타일 그리기 ──
function drawTiles(){
  // 화면에 보이는 타일만 렌더
  const viewR=20;
  const cp=sw(cv.width/2,cv.height/2);
  const cx2=Math.round(cp.x),cy2=Math.round(cp.y);
  // 쿼터뷰 정렬: y 내림차순으로 그려야 앞이 앞에
  const toRender=[];
  for(let tx=cx2-viewR;tx<=cx2+viewR;tx++){
    for(let ty=cy2-viewR;ty<=cy2+viewR;ty++){
      const t=tiles.get(tkey(tx,ty));if(!t)continue;
      const s=ws(tx,ty,0);
      toRender.push({tx,ty,t,sx:s.x+cam.sx,sy:s.y+cam.sy});
    }
  }
  toRender.sort((a,b)=>(a.tx+a.ty)-(b.tx+b.ty));

  toRender.forEach(({tx,ty,t,sx,sy})=>{
    // 쿼터뷰 타일 (마름모꼴)
    const W2=32,H2=16;
    ctx.beginPath();
    ctx.moveTo(sx,sy-H2);
    ctx.lineTo(sx+W2,sy);
    ctx.lineTo(sx,sy+H2);
    ctx.lineTo(sx-W2,sy);
    ctx.closePath();
    // 색
    const seed=(tx*7+ty*13)%4;
    if(t==='grass') ctx.fillStyle=PAL.grass[seed];
    else if(t==='dirt') ctx.fillStyle=PAL.dirt[seed%3];
    else ctx.fillStyle=PAL.road;
    ctx.fill();
    // 그리드 라인
    ctx.strokeStyle='rgba(0,0,0,.12)';ctx.lineWidth=.5;ctx.stroke();
  });
}

// ── 낮/밤 ──
let spawnT=0,spawnInt=2.5;
function updateDayNight(dt){
  G.time+=dt;
  const halfDay=G.dayLen/2;
  const dayPh=G.time%G.dayLen;
  const wasNight=G.isNight;
  G.isNight=dayPh>=halfDay;
  if(G.isNight&&!wasNight){
    G.day++;
    showAnn('🌙 밤이 왔다! 좀비들이 몰려온다!');
    const dn=document.getElementById('daynight');
    dn.textContent='🌙 밤';dn.style.color='#4488ff';dn.style.opacity='1';
    setTimeout(()=>dn.style.opacity='0',2500);
    spawnInt=Math.max(.5,1.8-G.day*.08);
  } else if(!G.isNight&&wasNight){
    showAnn('☀️ 낮이 됐다! 기지를 강화하라!');
    const dn=document.getElementById('daynight');
    dn.textContent='☀️ 낮';dn.style.color='#ffdd44';dn.style.opacity='1';
    setTimeout(()=>dn.style.opacity='0',2500);
    spawnInt=Math.max(1.5,4-G.day*.1);
  }
  // 스폰
  const maxZ=G.isNight?Math.min(120,20+G.day*8):Math.min(40,5+G.day*2);
  spawnT+=dt;
  if(spawnT>=spawnInt&&ENT.zombies.length<maxZ){
    spawnT=0;
    const cnt=G.isNight?Math.min(5,1+Math.floor(G.day/2)):1;
    for(let i=0;i<cnt;i++)spawnZombie();
  }
}

// ── 메인 루프 ──
let last=0,animPh=0;
function loop(ts){
  requestAnimationFrame(loop);
  const dt=Math.min((ts-last)/1000,.05);last=ts;
  if(G.dead)return;
  animPh+=dt;

  const W=cv.width,H=cv.height;

  // 플레이어 이동
  const moving=JOY.on&&(Math.abs(JOY.dx)>.03||Math.abs(JOY.dy)>.03);
  if(moving){
    // 쿼터뷰: 조이스틱 → 월드 좌표 변환
    const sp=3.5;
    const jx=JOY.dx,jy=JOY.dy;
    // 스크린 x → wx-wy, 스크린 y → wx+wy
    const wx2=jx/(ISO.sx)+jy/(ISO.sy*2);
    const wy2=-jx/(ISO.sx)+jy/(ISO.sy*2);
    G.px+=wx2*sp*dt*30;
    G.py+=wy2*sp*dt*30;
    G.px=Math.max(-MAP_R+1,Math.min(MAP_R-1,G.px));
    G.py=Math.max(-MAP_R+1,Math.min(MAP_R-1,G.py));
    walkPh+=dt*8;
    playerAnim='walk';
    if(JOY.dx>0.1)playerDir=1;else if(JOY.dx<-0.1)playerDir=-1;
  } else {
    walkPh*=.9;
    if(playerAnim==='walk')playerAnim='idle';
  }

  // 카메라
  const tp=ws(G.px,G.py,0);
  cam.tx=tp.x-W/2;cam.ty=tp.y-H/2;
  cam.x+=(cam.tx-cam.x)*.12;cam.y+=(cam.ty-cam.y)*.12;
  if(cam.shake>0){cam.shake-=dt*3;cam.sx=(Math.random()-.5)*cam.shake*8;cam.sy=(Math.random()-.5)*cam.shake*8;}else{cam.sx*=.7;cam.sy*=.7;}

  // 낮밤
  updateDayNight(dt);

  // 플레이어 공격
  doPlayerAtk(dt);

  // HP 회복
  if(G.hpRegen>0&&G.hp<G.maxHp)G.hp=Math.min(G.maxHp,G.hp+G.hpRegen*dt);

  // 포탑 공격
  ENT.buildings.forEach(b=>{
    if(b.type!=='turret')return;
    b.atkT-=dt;
    const near=ENT.zombies.filter(z=>Math.hypot(z.wx-b.wx,z.wy-b.wy)<8).sort((a,c)=>Math.hypot(a.wx-b.wx,a.wy-b.wy)-Math.hypot(c.wx-b.wx,c.wy-b.wy))[0];
    if(near){
      b.atkAng=Math.atan2(near.wy-b.wy,near.wx-b.wx);
      if(b.atkT<=0){b.atkT=1.2;fireProj(b.wx,b.wy,near.wx-b.wx,near.wy-b.wy,30,'#ff8844',16,9,'turret');}
    }
    // 의무실 회복
    if(b.type==='medkit'){
      if(Math.hypot(G.px-b.wx,G.py-b.wy)<5)G.hp=Math.min(G.maxHp,G.hp+8*dt);
      ENT.mercs.forEach(m=>{if(Math.hypot(m.wx-b.wx,m.wy-b.wy)<5)m.hp=Math.min(m.mhp,m.hp+5*dt);});
    }
  });

  // 용병 AI
  ENT.mercs.forEach(m=>{
    m.atkT-=dt;
    const near=ENT.zombies.filter(z=>Math.hypot(z.wx-m.wx,z.wy-m.wy)<m.atkRng/30).sort((a,b)=>Math.hypot(a.wx-m.wx,a.wy-m.wy)-Math.hypot(b.wx-m.wx,b.wy-m.wy))[0];
    if(near){
      // 공격
      if(m.atkT<=0){m.atkT=m.atkInt;fireProj(m.wx,m.wy,near.wx-m.wx,near.wy-m.wy,m.atkDmg,'#88aaff',16,m.atkRng/30,'merc');}
      // 이동 (사거리 안에서)
      const d=Math.hypot(near.wx-m.wx,near.wy-m.wy);
      if(d>m.atkRng/35){
        const spd=m.spd*dt;
        m.wx+=(near.wx-m.wx)/d*spd;m.wy+=(near.wy-m.wy)/d*spd;
        m.moving=true;m.dir=near.wx>m.wx?1:-1;
      } else m.moving=false;
    } else {
      // 플레이어 따라다니기
      const d=Math.hypot(G.px-m.wx,G.py-m.wy);
      if(d>4){
        const spd=m.spd*dt;
        m.wx+=(G.px-m.wx)/d*spd;m.wy+=(G.py-m.wy)/d*spd;
        m.moving=true;m.dir=G.px>m.wx?1:-1;
      } else m.moving=false;
    }
  });

  // 좀비 이동 + 공격
  const deadZ=[];
  ENT.zombies.forEach(z=>{
    // 가장 가까운 타겟(플레이어 or 건물)
    let tx=G.px,ty=G.py,td=Math.hypot(G.px-z.wx,G.py-z.wy);
    ENT.buildings.forEach(b=>{
      const d=Math.hypot(b.wx-z.wx,b.wy-z.wy);
      if(d<td){tx=b.wx;ty=b.wy;td=d;}
    });
    const d2=Math.max(.01,Math.hypot(tx-z.wx,ty-z.wy));
    z.wx+=(tx-z.wx)/d2*z.spd*dt;
    z.wy+=(ty-z.wy)/d2*z.spd*dt;
    z.dir=tx>z.wx?1:-1;
    // 플레이어 공격
    if(td<1.5){
      z.at=(z.at||0)+dt;
      if(z.at>=1.2){z.at=0;hitPlayer(z.atk);}
    }
    // 건물 공격
    ENT.buildings.forEach(b=>{
      if(Math.hypot(b.wx-z.wx,b.wy-z.wy)<1.2){
        b.hp-=z.atk*.5*dt;
        if(b.hp<=0)b.dead=true;
      }
    });
  });
  ENT.buildings=ENT.buildings.filter(b=>!b.dead);

  // 투사체
  const deadP=new Set();
  ENT.projs.forEach((p,i)=>{
    p.wx+=p.dx*p.spd*dt;p.wy+=p.dy*p.spd*dt;p.traveled+=p.spd*dt;
    if(p.traveled>p.rng){deadP.add(i);return;}
    ENT.zombies.forEach(z=>{
      if(deadP.has(i))return;
      if(Math.hypot(z.wx-p.wx,z.wy-p.wy)<.9){
        z.hp-=p.dmg;
        spawnParts(z.wx,z.wy,PAL.blood,5);
        addFloat(z.wx,z.wy,Math.round(p.dmg),'#ff4444');
        if(G.splash&&p.owner==='player'){
          ENT.zombies.forEach(o=>{if(o!==z&&Math.hypot(o.wx-z.wx,o.wy-z.wy)<2)o.hp-=p.dmg*.4;});
          spawnParts(z.wx,z.wy,'#ff4400',12);
        }
        if(z.hp<=0){
          G.gold+=Math.round(z.gold*(G.goldMul||1));
          G.xp+=z.xp;G.kills++;
          spawnParts(z.wx,z.wy,'#4a7a4a',10);
          addFloat(z.wx,z.wy,'💰+'+z.gold,'#ffd700');
          deadZ.push(z);
          // 레벨업
          if(G.xp>=G.xpNext){
            G.lv++;G.xp-=G.xpNext;G.xpNext=Math.round(G.xpNext*1.35);
            showLevelUp();
          }
        }
        deadP.add(i);
      }
    });
  });
  ENT.projs=ENT.projs.filter((_,i)=>!deadP.has(i));
  ENT.zombies=ENT.zombies.filter(z=>!deadZ.includes(z));

  // 파티클
  ENT.parts.forEach(p=>{p.life-=dt*30;p.wx+=p.vx*dt*2;p.wy+=p.vy*dt*2;p.vx*=.92;p.vy*=.92;});
  ENT.parts=ENT.parts.filter(p=>p.life>0);
  ENT.floats.forEach(f=>{f.life-=dt*30;f.wy+=f.vy;});
  ENT.floats=ENT.floats.filter(f=>f.life>0);

  // ── 렌더 ──
  // 배경
  const nightT=G.isNight?.85:.0;
  const bgA=`rgb(${Math.round(8+nightT*4)},${Math.round(12+nightT*4)},${Math.round(20+nightT*10)})`;
  ctx.fillStyle=bgA;ctx.fillRect(0,0,W,H);

  // 밤 오버레이
  if(G.isNight){
    ctx.save();
    const phs=ws(G.px,G.py,0);
    const rg=ctx.createRadialGradient(phs.x+cam.sx,phs.y+cam.sy,60,phs.x+cam.sx,phs.y+cam.sy,350);
    rg.addColorStop(0,'rgba(0,0,0,0)');
    rg.addColorStop(1,'rgba(0,0,20,.72)');
    ctx.fillStyle=rg;ctx.fillRect(0,0,W,H);
    ctx.restore();
  }

  // 타일
  drawTiles();

  // 건물 (뒤)
  const allEnt=[
    ...ENT.buildings.map(b=>({...b,_type:'building',_sortY:b.wy+b.wx})),
    ...ENT.zombies.map(z=>({...z,_type:'zombie',_sortY:z.wy+z.wx})),
    ...ENT.mercs.map(m=>({...m,_type:'merc',_sortY:m.wy+m.wx})),
    {_type:'player',_sortY:G.py+G.px},
  ];
  allEnt.sort((a,b)=>a._sortY-b._sortY);

  allEnt.forEach(e=>{
    if(e._type==='building'){drawBuilding(e);}
    else if(e._type==='zombie'){
      const s=ws(e.wx,e.wy,0);
      drawDotZombie(s.x+cam.sx,s.y+cam.sy,e.dir,e.hp,e.mhp,e.big);
    } else if(e._type==='merc'){
      drawMerc(e);
    } else if(e._type==='player'){
      const sp=ws(G.px,G.py,0);
      drawDotPlayer(sp.x+cam.sx,sp.y+cam.sy,playerDir,playerAnim,Math.round(walkPh*10));
    }
  });
  if(playerAnim==='attack')playerAnim='idle';

  // 투사체
  ENT.projs.forEach(p=>{
    const s=ws(p.wx,p.wy,0);
    const x=s.x+cam.sx,y=s.y+cam.sy;
    ctx.save();
    ctx.shadowColor=p.col;ctx.shadowBlur=8;
    ctx.fillStyle=p.col;
    ctx.beginPath();ctx.arc(x,y,4,0,Math.PI*2);ctx.fill();
    ctx.restore();
  });

  // 파티클
  ENT.parts.forEach(p=>{
    const s=ws(p.wx,p.wy,0);
    const x=s.x+cam.sx,y=s.y+cam.sy;
    ctx.save();ctx.globalAlpha=Math.max(0,p.life/p.ml);
    ctx.fillStyle=p.col;ctx.fillRect(x-p.r/2,y-p.r/2,p.r,p.r);ctx.restore();
  });

  // 플로팅 텍스트
  ENT.floats.forEach(f=>{
    const s=ws(f.wx,f.wy,0);
    const x=s.x+cam.sx,y=s.y+cam.sy-(f.ml-f.life)*.3;
    ctx.save();ctx.globalAlpha=Math.max(0,f.life/f.ml);
    ctx.fillStyle=f.col;ctx.font='bold 12px sans-serif';ctx.textAlign='center';
    ctx.shadowColor=f.col;ctx.shadowBlur=4;
    ctx.fillText(f.txt,x,y);ctx.restore();
  });

  // 조이스틱
  if(JOY.on){
    ctx.save();
    ctx.strokeStyle='rgba(255,255,255,.2)';ctx.fillStyle='rgba(255,255,255,.07)';
    ctx.lineWidth=2;ctx.beginPath();ctx.arc(JOY.bx+48,JOY.by+48,48,0,Math.PI*2);ctx.fill();ctx.stroke();
    const kg=ctx.createRadialGradient(JOY.kx+20,JOY.ky+20,0,JOY.kx+20,JOY.ky+20,20);
    kg.addColorStop(0,'rgba(180,220,255,.95)');kg.addColorStop(1,'rgba(50,120,255,.75)');
    ctx.fillStyle=kg;ctx.shadowColor='#4488ff';ctx.shadowBlur=12;
    ctx.beginPath();ctx.arc(JOY.kx+20,JOY.ky+20,20,0,Math.PI*2);ctx.fill();
    ctx.restore();
  }

  // 건설 고스트
  if(buildType){
    ctx.save();
    ctx.fillStyle='rgba(80,180,255,.3)';ctx.strokeStyle='#4af';ctx.lineWidth=2;
    ctx.setLineDash([5,4]);
    ctx.fillRect(cv.width/2-20,cv.height/2-20,40,40);
    ctx.strokeRect(cv.width/2-20,cv.height/2-20,40,40);
    ctx.setLineDash([]);
    ctx.fillStyle='#4af';ctx.font='11px sans-serif';ctx.textAlign='center';
    ctx.fillText('탭하여 건설',cv.width/2,cv.height/2+35);
    ctx.restore();
  }

  // 밤 별
  if(G.isNight){
    ctx.save();ctx.globalAlpha=.6;
    for(let i=0;i<30;i++){
      const sx2=((i*173+G.day*7)%W);
      const sy2=((i*97+G.day*3)%(H*.4));
      const blink=.5+.5*Math.sin(animPh*2+i);
      ctx.fillStyle=`rgba(255,255,255,${blink*.8})`;
      ctx.fillRect(sx2,sy2,1.5,1.5);
    }
    ctx.restore();
  }

  // 비네트
  const vg=ctx.createRadialGradient(W/2,H/2,H*.25,W/2,H/2,H*.8);
  vg.addColorStop(0,'transparent');vg.addColorStop(1,'rgba(0,0,0,.5)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);

  updateHUD();
}

function hitPlayer(dmg){
  const actual=Math.round(dmg*(1-G.dmgRed/100));
  G.hp-=actual;
  addFloat(G.px,G.py,'💥'+actual,'#ff0000');
  cam.shake=Math.max(cam.shake,.2);
  if(G.hp<=0){
    G.hp=0;G.dead=true;
    document.getElementById('dinfo').innerHTML=`Day ${G.day} | 킬 ${G.kills}<br>레벨 ${G.lv} | 골드 ${Math.floor(G.gold)}`;
    document.getElementById('death').style.display='flex';
  }
}

// ── 시작 ──
async function start(){
  await loadSprites();
  initMap();
  // 초기 좀비
  for(let i=0;i<5;i++)spawnZombie();
  showAnn('☀️ Day 1 시작! 생존하라!');
  requestAnimationFrame(loop);
}
start();
</script>
