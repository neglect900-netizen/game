<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
<title>❄️ 빙원 타이쿤</title>
<link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{width:100%;height:100%;overflow:hidden;background:#0a1020;font-family:'Jua',sans-serif;touch-action:none;user-select:none;-webkit-user-select:none;}
canvas{display:block;position:absolute;top:0;left:0;z-index:1;touch-action:none;}
#hud{position:absolute;top:0;left:0;right:0;z-index:30;display:flex;gap:5px;align-items:center;padding:8px 10px;background:linear-gradient(to bottom,rgba(0,0,0,0.75),transparent);pointer-events:none;}
.pill{display:flex;align-items:center;gap:4px;background:rgba(0,8,25,0.8);border:1px solid rgba(100,180,255,0.25);border-radius:18px;padding:4px 9px;}
.pico{font-size:13px;}.pval{font-size:14px;color:#fff;font-weight:bold;min-width:28px;}
#hpWrap{position:absolute;top:46px;left:10px;z-index:30;pointer-events:none;}
#hpBar{width:150px;height:12px;background:rgba(0,0,0,0.6);border:1.5px solid rgba(255,80,80,0.4);border-radius:6px;overflow:hidden;}
#hpFill{height:100%;width:100%;}
#hpTxt{font-size:10px;color:#ffcdd2;margin-top:1px;text-align:center;}
#waveChip{position:absolute;top:46px;left:50%;transform:translateX(-50%);background:linear-gradient(135deg,#1565c0,#0d47a1);border:1.5px solid #42a5f5;border-radius:18px;padding:4px 14px;font-size:13px;color:#fff;z-index:30;pointer-events:none;white-space:nowrap;}
#mmWrap{position:absolute;top:46px;right:10px;z-index:30;pointer-events:none;}
#mmLabel{font-size:9px;color:rgba(150,210,255,0.7);text-align:center;margin-bottom:2px;letter-spacing:1px;}
#minimapCanvas{border:1.5px solid rgba(100,200,255,0.35);border-radius:8px;display:block;}
#goalBar{position:absolute;top:68px;left:10px;z-index:30;pointer-events:none;width:150px;}
#goalLabel{font-size:9px;color:#ffd54f;margin-bottom:2px;}
#goalTrack{height:7px;background:rgba(0,0,0,0.5);border:1px solid rgba(255,213,79,0.3);border-radius:4px;overflow:hidden;}
#goalFill{height:100%;background:linear-gradient(90deg,#f57f17,#ffd54f);transition:width 0.3s;width:0%;}
#goalTxt{font-size:9px;color:#ffd54f;text-align:right;margin-top:1px;}
#skills{position:absolute;left:10px;bottom:88px;z-index:100;display:flex;flex-direction:row;gap:8px;pointer-events:auto;}
.skbtn{width:56px;height:56px;border-radius:12px;background:rgba(5,15,40,0.95);cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;border:2px solid #37474f;-webkit-tap-highlight-color:transparent;position:relative;overflow:hidden;}
.skbtn.ready{border-color:#ffd54f;box-shadow:0 0 16px rgba(255,213,79,0.55);}
.skbtn.locked{opacity:0.3;filter:grayscale(1);}
.sk-name{font-size:7px;color:#90caf9;pointer-events:none;margin-top:1px;}
.sk-cd-ov{position:absolute;inset:0;border-radius:10px;background:rgba(0,0,0,0.68);display:flex;align-items:center;justify-content:center;font-size:15px;color:#fff;pointer-events:none;}
#upgBar{position:absolute;bottom:0;left:0;right:0;z-index:100;background:linear-gradient(to top,rgba(3,8,20,0.98),rgba(5,12,28,0.92));border-top:1.5px solid rgba(100,180,255,0.18);display:flex;overflow-x:auto;scrollbar-width:none;pointer-events:auto;min-height:80px;}
#upgBar::-webkit-scrollbar{display:none;}
.ub{flex:0 0 76px;padding:7px 3px;text-align:center;cursor:pointer;border-right:1px solid rgba(255,255,255,0.07);position:relative;-webkit-tap-highlight-color:transparent;}
.ub:active{background:rgba(100,180,255,0.12);}
.ub.dim{opacity:0.28;}
.ub.can-buy{background:rgba(46,125,50,0.2);}
.ub.can-buy::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:#66bb6a;}
.ub-ico{font-size:20px;display:block;line-height:1.3;}
.ub-name{font-size:8px;color:#90caf9;margin-top:1px;}
.ub-lv{font-size:8px;color:#546e7a;}
.ub-cost{font-size:11px;color:#ffd54f;font-weight:bold;}
#pop,#gameOver,#shopPop{position:absolute;inset:0;background:rgba(0,4,18,0.93);display:flex;align-items:center;justify-content:center;z-index:200;pointer-events:auto;}
.h{display:none!important;}
.pbox{background:linear-gradient(145deg,#0c1a2e,#182d48);border:1.5px solid rgba(100,200,255,0.3);border-radius:22px;padding:26px 20px;text-align:center;width:90%;max-width:340px;}
.pbox h1{font-size:25px;color:#fff;margin:6px 0;}
.pbox p{font-size:13px;color:#90caf9;line-height:1.65;margin-bottom:16px;}
.pbtn{background:linear-gradient(135deg,#ff7043,#e53935);border:none;border-radius:22px;padding:11px 30px;font-family:'Jua',sans-serif;font-size:18px;color:#fff;cursor:pointer;transition:transform 0.1s;margin:4px;}
.pbtn:active{transform:scale(0.95);}
.pbtn.blue{background:linear-gradient(135deg,#1976d2,#1565c0);}
.pbtn.green{background:linear-gradient(135deg,#388e3c,#2e7d32);}
#shopPop .pbox{max-height:88vh;overflow-y:auto;scrollbar-width:thin;}
.shop-item{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,0.04);border:1px solid rgba(100,180,255,0.12);border-radius:11px;padding:9px 11px;margin:6px 0;cursor:pointer;text-align:left;}
.shop-item:active{background:rgba(100,180,255,0.1);}
.shop-item.bought{opacity:0.38;pointer-events:none;}
.shop-item.afford{border-color:rgba(102,187,106,0.45);}
.si-ico{font-size:26px;flex-shrink:0;}
.si-info{flex:1;}
.si-name{font-size:13px;color:#fff;font-weight:bold;}
.si-desc{font-size:10px;color:#78909c;line-height:1.4;margin-top:2px;}
.si-cost{font-size:13px;color:#ffd54f;font-weight:bold;white-space:nowrap;}
#banner{position:absolute;top:26%;left:50%;transform:translate(-50%,-50%);font-size:28px;color:#fff;text-shadow:0 2px 12px rgba(100,200,255,0.9);opacity:0;z-index:48;pointer-events:none;white-space:nowrap;transition:opacity 0.25s;text-align:center;}
#banner.on{opacity:1;}
#dmgOverlay{position:absolute;inset:0;z-index:60;pointer-events:none;background:radial-gradient(ellipse at center,transparent 40%,rgba(220,20,20,0.65) 100%);opacity:0;transition:opacity 0.08s;}
#dmgOverlay.on{opacity:1;}
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="hud">
  <div class="pill"><span class="pico">🎒</span><span class="pval" id="hM">0/50</span></div>
  <div class="pill"><span class="pico">🍖</span><span class="pval" id="hCooked">0</span></div>
  <div class="pill"><span class="pico">💰</span><span class="pval" id="hG">0</span></div>
  <div class="pill"><span class="pico">💀</span><span class="pval" id="hK">0</span></div>
</div>
<div id="hpWrap"><div id="hpBar"><div id="hpFill"></div></div><div id="hpTxt">100/100</div></div>
<div id="waveChip">Wave 1</div>
<div id="mmWrap"><div id="mmLabel">MINIMAP</div><canvas id="minimapCanvas" width="115" height="115"></canvas></div>
<div id="goalBar"><div id="goalLabel">💰 다음 목표</div><div id="goalTrack"><div id="goalFill"></div></div><div id="goalTxt">0/500</div></div>
<div id="banner"></div>
<div id="dmgOverlay"></div>
<div id="skills"></div>
<div id="upgBar"></div>

<div id="pop">
  <div class="pbox">
    <div style="font-size:50px">🐻❄️</div>
    <h1>빙원 타이쿤</h1>
    <p>곰 사냥 → 고기 납품 → 요리 → 판매<br>💰 골드로 포탑·스킬·시설을 구축하라!<br><br><b style="color:#ffd54f">상점</b>에서 방어 시설을 구매하면<br>더 오래 살아남을 수 있다!</p>
    <button class="pbtn" id="startBtn">⚔️ 생존 시작!</button>
  </div>
</div>
<div id="gameOver" class="h">
  <div class="pbox">
    <div style="font-size:48px">💀</div>
    <h1 style="color:#ef5350">사망</h1>
    <p id="goStats"></p>
    <button class="pbtn blue" id="respawnBtn">🔄 부활 (💰-30%)</button>
  </div>
</div>
<div id="shopPop" class="h">
  <div class="pbox">
    <h1>🏪 상점</h1>
    <p style="font-size:11px;color:#ffd54f;margin-bottom:8px">골드로 캠프를 강화하세요!</p>
    <div id="shopItems"></div>
    <button class="pbtn" onclick="closeShop()" style="margin-top:10px">닫기</button>
  </div>
</div>

<script>
'use strict';
const ISO_X=52,ISO_Y=26;

const WEAPONS=[
  {n:'단검',   ico:'🗡️',range:1.4,spd:0.55,dmg:10,  proj:false,aoe:0,  col:'#bdbdbd'},
  {n:'철도끼', ico:'🪓', range:1.6,spd:0.48,dmg:22,  proj:false,aoe:0,  col:'#00e5ff'},
  {n:'사냥창', ico:'🔱', range:2.2,spd:0.42,dmg:42,  proj:false,aoe:1.2,col:'#4dd0e1'},
  {n:'권총',   ico:'🔫', range:4.0,spd:0.38,dmg:65,  proj:true, aoe:0,  col:'#ef5350'},
  {n:'산탄총', ico:'💥', range:3.5,spd:0.62,dmg:95,  proj:true, aoe:2.0,col:'#ff7043'},
  {n:'기관총', ico:'🔫', range:4.5,spd:0.13,dmg:52,  proj:true, aoe:0,  col:'#ffd54f'},
  {n:'저격총', ico:'🎯', range:8.0,spd:0.85,dmg:210, proj:true, aoe:0,  col:'#ce93d8'},
  {n:'대포',   ico:'💣', range:5.0,spd:1.15,dmg:340, proj:true, aoe:3.0,col:'#ff6f00'},
  {n:'대검',   ico:'⚔️', range:3.0,spd:0.52,dmg:500, proj:false,aoe:4.0,col:'#ffd54f'},
  {n:'신성검', ico:'✨', range:4.0,spd:0.40,dmg:900, proj:false,aoe:6.0,col:'#ff5252'},
];

const SKILL_DEFS=[
  {id:'meteor',  n:'메테오',  maxCd:18,unlockCost:300},
  {id:'thunder', n:'번개폭풍',maxCd:22,unlockCost:500},
  {id:'blizzard',n:'맹설폭풍',maxCd:20,unlockCost:400},
  {id:'nuke',    n:'핵폭발',  maxCd:35,unlockCost:1000},
];

const SHOP_ITEMS=[
  {id:'turret1',n:'자동 석궁 Lv1',  desc:'자동 조준 사격 포탑 2기 설치',cost:400, ico:'🏹',bought:false,type:'turret',lv:1},
  {id:'turret2',n:'자동 석궁 Lv2',  desc:'더 빠르고 강한 포탑. Lv1 필요',cost:900, ico:'🏹',bought:false,type:'turret',lv:2,req:'turret1'},
  {id:'turret3',n:'마법 포탑',       desc:'3방향 마법탄. Lv2 필요',       cost:2000,ico:'🔮',bought:false,type:'turret',lv:3,req:'turret2'},
  {id:'wall1',  n:'얼음 방벽',       desc:'캠프 주변 방벽. 적 이동 차단', cost:600, ico:'🧊',bought:false,type:'wall'},
  {id:'chef1',  n:'요리사 고용',     desc:'자동 요리. 캠프 안 가도 OK',   cost:500, ico:'👨‍🍳',bought:false,type:'chef',lv:1},
  {id:'chef2',  n:'수석 요리사',     desc:'요리 속도 3배. chef1 필요',    cost:1200,ico:'👨‍🍳',bought:false,type:'chef',lv:2,req:'chef1'},
  {id:'sell1',  n:'가격 인상 계약',  desc:'판매 단가 +60%',               cost:700, ico:'📜',bought:false,type:'price',val:1.6},
  {id:'sell2',  n:'독점 계약',       desc:'판매 단가 추가 +100%',         cost:1800,ico:'📜',bought:false,type:'price',val:2.0,req:'sell1'},
  {id:'bag1',   n:'대형 배낭',       desc:'고기 수납 +60칸',              cost:350, ico:'🎒',bought:false,type:'bag',val:60},
  {id:'bag2',   n:'상인 수레',       desc:'고기 수납 +120칸',             cost:800, ico:'🛒',bought:false,type:'bag',val:120,req:'bag1'},
  {id:'regen1', n:'응급 처치 키트', desc:'초당 HP 2% 회복',              cost:450, ico:'💊',bought:false,type:'regen',val:0.02},
  {id:'xbow',   n:'폭발 화살',       desc:'포탑탄에 폭발 범위 추가',      cost:800, ico:'💥',bought:false,type:'turretUpg',req:'turret1'},
];

const UPGRADES={
  wpn: {n:'무기강화',ico:'🗡️',lv:1,cost:30, cm:1.7,max:10},
  hp:  {n:'체력증가',ico:'❤️',lv:1,cost:35, cm:1.7,max:10},
  spd: {n:'이동속도',ico:'💨',lv:1,cost:45, cm:1.8,max:8},
  shop:{n:'🏪 상점', ico:'🏪',lv:0,cost:0,  cm:1,  max:1,isShop:true},
};

const cv=document.getElementById('c');
const ctx=cv.getContext('2d');
const mmCv=document.getElementById('minimapCanvas');
const mmCtx=mmCv.getContext('2d');

let W,H,UBH=80;
function resize(){UBH=document.getElementById('upgBar').offsetHeight||80;W=cv.width=window.innerWidth;H=cv.height=window.innerHeight;}
resize();window.addEventListener('resize',resize);

function toS(wx,wy){return{x:W/2+(wx-cam.x)*ISO_X-(wy-cam.y)*ISO_X,y:(H-UBH)/2+(wx-cam.x)*ISO_Y+(wy-cam.y)*ISO_Y};}
function toW(sx,sy){const dx=(sx-W/2)/ISO_X,dy=(sy-(H-UBH)/2)/ISO_Y;return{wx:cam.x+(dx+dy)/2,wy:cam.y+(dy-dx)/2};}

const cam={x:0,y:0};
const ptr={active:false,wx:0,wy:0};
const keys={};

const bears=[],drops=[],projs=[],swings=[],parts=[],floats=[];
const snowflakes=[],trees=[],customers=[],turrets=[],walls=[];
let skillEffects=[];
const skills=[];

const P={wx:0,wy:0,angle:0,hp:100,maxHp:100,meat:0,maxMeat:50,cookedMeat:0,gold:0,kills:0,atkCool:0,swingT:0,regenT:0,iFrames:0,dead:false};
const camp={wx:0,wy:0};
let campMeat=0,cookProg=0,cookT=0,sellT=0;
let wave=1,waveTimer=45,waveDur=45,bossActive=false,spawnT=0,custSpawnT=3;
let running=false,lastT=0;

const GOALS=[200,500,1000,2000,4000,8000,15000,30000];
let goalIdx=0;
const shop={turretLv:0,chefLv:0,wall:false,priceMul:1,regen:0,xbow:false};

function initWorld(){
  trees.length=0;snowflakes.length=0;
  for(let i=0;i<180;i++){let x=(Math.random()-0.5)*130,y=(Math.random()-0.5)*130;if(Math.hypot(x,y)>9)trees.push({wx:x,wy:y,sz:0.65+Math.random()*0.5,snow:Math.random()>0.4});}
  for(let i=0;i<120;i++)snowflakes.push({x:Math.random()*W,y:Math.random()*H,sp:0.2+Math.random()*0.55,dx:(Math.random()-0.5)*0.25});
}

function wpnLv(){return Math.min(UPGRADES.wpn.lv-1,WEAPONS.length-1);}
function wpn(){return WEAPONS[wpnLv()];}
function getHpMax(){return 100+(UPGRADES.hp.lv-1)*40;}
function getSpd(){return 0.030+(UPGRADES.spd.lv-1)*0.005;}
function getSell(){return Math.floor(10*shop.priceMul);}
function getWpnDmg(){return wpn().dmg*(1+(UPGRADES.wpn.lv-1)*0.28);}

function isUI(e){const t=e.target;return t.closest('#upgBar')||t.closest('#skills')||t.closest('.pbox')||t.closest('#hud')||t.closest('#mmWrap')||t.closest('#goalBar');}
function getPt(e){return e.touches&&e.touches.length>0?{x:e.touches[0].clientX,y:e.touches[0].clientY}:{x:e.clientX,y:e.clientY};}
function onDown(e){if(!running||P.dead)return;if(isUI(e))return;const p=getPt(e),w=toW(p.x,p.y);ptr.active=true;ptr.wx=w.wx;ptr.wy=w.wy;}
function onMove(e){if(!running||P.dead)return;if(isUI(e))return;if(!(e.buttons>0||(e.touches&&e.touches.length>0)))return;const p=getPt(e),w=toW(p.x,p.y);ptr.active=true;ptr.wx=w.wx;ptr.wy=w.wy;}
function onUp(){ptr.active=false;}
cv.addEventListener('mousedown',onDown);cv.addEventListener('mousemove',onMove);cv.addEventListener('mouseup',onUp);
cv.addEventListener('touchstart',e=>{e.preventDefault();onDown(e);},{passive:false});
cv.addEventListener('touchmove',e=>{e.preventDefault();onMove(e);},{passive:false});
cv.addEventListener('touchend',e=>{e.preventDefault();onUp();},{passive:false});
window.addEventListener('keydown',e=>keys[e.key.toLowerCase()]=true);
window.addEventListener('keyup',e=>keys[e.key.toLowerCase()]=false);

// 스킬 아이콘 그리기
function drawSkIcon(c,id,sz){
  c.clearRect(0,0,sz,sz);
  if(id==='meteor'){
    const g=c.createRadialGradient(sz/2,sz/2,2,sz/2,sz/2,sz/2);
    g.addColorStop(0,'#fff7e0');g.addColorStop(0.4,'#ff8c00');g.addColorStop(1,'#b71c1c');
    c.fillStyle=g;c.beginPath();c.arc(sz/2,sz/2,sz*0.38,0,Math.PI*2);c.fill();
    c.strokeStyle='rgba(255,160,0,0.7)';c.lineWidth=1.5;
    for(let a=0;a<5;a++){const ag=a/5*Math.PI*2;c.beginPath();c.moveTo(sz/2+Math.cos(ag)*sz*0.38,sz/2+Math.sin(ag)*sz*0.38);c.lineTo(sz/2+Math.cos(ag)*sz*0.48,sz/2+Math.sin(ag)*sz*0.48);c.stroke();}
    c.fillStyle='rgba(255,255,100,0.8)';c.beginPath();c.arc(sz/2,sz/2,sz*0.15,0,Math.PI*2);c.fill();
  } else if(id==='thunder'){
    c.fillStyle='#1a0030';c.fillRect(0,0,sz,sz);
    c.fillStyle='#e9d5ff';c.shadowColor='#a855f7';c.shadowBlur=8;
    c.beginPath();c.moveTo(sz*0.55,sz*0.05);c.lineTo(sz*0.35,sz*0.5);c.lineTo(sz*0.52,sz*0.5);c.lineTo(sz*0.3,sz*0.95);c.lineTo(sz*0.48,sz*0.52);c.lineTo(sz*0.3,sz*0.52);c.closePath();c.fill();c.shadowBlur=0;
  } else if(id==='blizzard'){
    const g=c.createRadialGradient(sz/2,sz/2,2,sz/2,sz/2,sz/2);
    g.addColorStop(0,'rgba(255,255,255,0.9)');g.addColorStop(0.5,'rgba(100,200,255,0.7)');g.addColorStop(1,'rgba(30,100,220,0)');
    c.fillStyle=g;c.beginPath();c.arc(sz/2,sz/2,sz/2,0,Math.PI*2);c.fill();
    c.strokeStyle='rgba(255,255,255,0.8)';c.lineWidth=1.5;
    for(let a=0;a<6;a++){const ag=a/6*Math.PI*2;c.beginPath();c.moveTo(sz/2,sz/2);c.lineTo(sz/2+Math.cos(ag)*sz*0.42,sz/2+Math.sin(ag)*sz*0.42);c.stroke();}
  } else if(id==='nuke'){
    const g=c.createRadialGradient(sz/2,sz/2,1,sz/2,sz/2,sz/2);
    g.addColorStop(0,'#fff');g.addColorStop(0.3,'#ffeb3b');g.addColorStop(0.6,'#ff5722');g.addColorStop(1,'rgba(100,0,0,0)');
    c.fillStyle=g;c.beginPath();c.arc(sz/2,sz/2,sz/2,0,Math.PI*2);c.fill();
    c.strokeStyle='rgba(255,255,255,0.4)';c.lineWidth=1;
    c.beginPath();c.arc(sz/2,sz/2,sz*0.22,0,Math.PI*2);c.stroke();
    c.beginPath();c.arc(sz/2,sz/2,sz*0.4,0,Math.PI*2);c.stroke();
  }
}

function renderSkillBtns(){
  const el=document.getElementById('skills');el.innerHTML='';
  for(let i=0;i<skills.length;i++){
    const sk=skills[i];
    const d=document.createElement('div');
    d.className='skbtn'+(sk.cd>0?'':' ready');
    const cvs=document.createElement('canvas');cvs.width=38;cvs.height=38;cvs.style.borderRadius='8px';
    drawSkIcon(cvs.getContext('2d'),sk.def.id,38);d.appendChild(cvs);
    const nm=document.createElement('div');nm.className='sk-name';nm.textContent=sk.def.n;d.appendChild(nm);
    if(sk.cd>0){const ov=document.createElement('div');ov.className='sk-cd-ov';ov.id='skcd'+i;ov.textContent=Math.ceil(sk.cd);d.appendChild(ov);}
    d.ontouchstart=(e)=>{e.stopPropagation();useSkill(i);};d.onclick=(e)=>{e.stopPropagation();useSkill(i);};
    el.appendChild(d);
  }
}

function useSkill(i){
  if(!running||P.dead)return;
  const sk=skills[i];if(sk.cd>0)return;
  sk.cd=sk.def.maxCd;
  const id=sk.def.id,px=P.wx,py=P.wy,sp=toS(px,py);

  if(id==='meteor'){
    const cnt=5+Math.floor(wave/3);
    for(let m=0;m<cnt;m++){
      const delay=m*0.35;
      const tx=px+(Math.random()-0.5)*12,ty=py+(Math.random()-0.5)*12;
      setTimeout(()=>{
        const tsp=toS(tx,ty);
        skillEffects.push({type:'meteor',x:tsp.x,y:tsp.y-220,tx:tsp.x,ty:tsp.y,life:1,maxLife:1,pr:0});
        setTimeout(()=>{
          const dmg=getWpnDmg()*8*(1+wave*0.1);
          for(const b of[...bears])if(Math.hypot(b.wx-tx,b.wy-ty)<4)hitBear(b,dmg,true);
          for(let p=0;p<16;p++){const a=Math.random()*Math.PI*2,s=3+Math.random()*7;parts.push({x:tsp.x,y:tsp.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-3,col:'#ff6f00',r:4+Math.random()*4,life:1});}
          swings.push({x:tsp.x,y:tsp.y,r:0,maxR:130,life:1,col:[255,100,20]});
        },380);
      },delay*1000);
    }
    addFloat(sp.x,sp.y-30,'☄️ 메테오!','#ff8c00');
    showBanner('☄️ 메테오 강타!');
  } else if(id==='thunder'){
    const targets=[...bears].slice(0,8+wave);
    targets.forEach((b,idx)=>{
      setTimeout(()=>{
        if(b._dead)return;
        const bsp=toS(b.wx,b.wy);
        skillEffects.push({type:'thunder',x:bsp.x,y:bsp.y-320,tx:bsp.x,ty:bsp.y,life:0.45,maxLife:0.45});
        const dmg=getWpnDmg()*12*(1+wave*0.08);hitBear(b,dmg,true);
        for(let p=0;p<8;p++){const a=Math.random()*Math.PI*2;parts.push({x:bsp.x,y:bsp.y,vx:Math.cos(a)*4,vy:Math.sin(a)*4-2,col:'#d8b4fe',r:3,life:0.8});}
      },idx*110);
    });
    addFloat(sp.x,sp.y-30,'⚡ 번개폭풍!','#c084fc');showBanner('⚡ 번개폭풍!');
  } else if(id==='blizzard'){
    for(const b of bears){b.frozen=true;b.frozenT=4+wave*0.2;}
    swings.push({x:sp.x,y:sp.y,r:0,maxR:W*0.9,life:0.8,col:[80,200,255]});
    skillEffects.push({type:'blizzard',x:sp.x,y:sp.y,life:2.5,maxLife:2.5});
    addFloat(sp.x,sp.y-30,'❄️ 맹설폭풍!','#7dd3fc');showBanner('❄️ 전체 빙결!');
  } else if(id==='nuke'){
    skillEffects.push({type:'nuke',x:sp.x,y:sp.y,r:0,life:1.5,maxLife:1.5});
    setTimeout(()=>{
      for(const b of[...bears]){const dmg=getWpnDmg()*25*(1+wave*0.15);hitBear(b,dmg,true);}
      for(let p=0;p<30;p++){const a=Math.random()*Math.PI*2,s=4+Math.random()*10;parts.push({x:sp.x,y:sp.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-4,col:['#ffeb3b','#ff5722','#fff'][Math.floor(Math.random()*3)],r:5+Math.random()*6,life:1.2});}
    },400);
    addFloat(sp.x,sp.y-30,'💥 핵폭발!','#ffd54f');showBanner('💥 핵폭발!!!');
  }
  renderSkillBtns();
}

function openShop(){renderShopItems();document.getElementById('shopPop').classList.remove('h');}
function closeShop(){document.getElementById('shopPop').classList.add('h');}

function renderShopItems(){
  const el=document.getElementById('shopItems');el.innerHTML='';
  // 시설 섹션
  const hdr=document.createElement('div');hdr.style.cssText='color:#90caf9;font-size:12px;margin:6px 0 4px;text-align:left;';hdr.textContent='🏗️ 시설 구매';el.appendChild(hdr);
  for(const item of SHOP_ITEMS){
    if(item.req){const req=SHOP_ITEMS.find(x=>x.id===item.req);if(!req||!req.bought){const d=document.createElement('div');d.className='shop-item bought';d.innerHTML=`<div class="si-ico">🔒</div><div class="si-info"><div class="si-name" style="color:#546e7a">${item.n}</div><div class="si-desc">선행: ${req?req.n:'?'} 필요</div></div>`;el.appendChild(d);continue;}}
    const can=P.gold>=item.cost;
    const d=document.createElement('div');d.className='shop-item'+(item.bought?' bought':can?' afford':'');
    d.innerHTML=`<div class="si-ico">${item.ico}</div><div class="si-info"><div class="si-name">${item.n}</div><div class="si-desc">${item.desc}</div></div><div class="si-cost">${item.bought?'✅':'💰'+item.cost}</div>`;
    if(!item.bought)d.onclick=()=>buyItem(item.id);
    el.appendChild(d);
  }
  const hdr2=document.createElement('div');hdr2.style.cssText='color:#ffd54f;font-size:12px;margin:12px 0 4px;text-align:left;';hdr2.textContent='⚡ 스킬 언락';el.appendChild(hdr2);
  for(const def of SKILL_DEFS){
    const already=skills.some(s=>s.def.id===def.id);const can=P.gold>=def.unlockCost;
    const d=document.createElement('div');d.className='shop-item'+(already?' bought':can?' afford':'');
    const cvs=document.createElement('canvas');cvs.width=32;cvs.height=32;cvs.style.flexShrink='0';drawSkIcon(cvs.getContext('2d'),def.id,32);
    const info=document.createElement('div');info.className='si-info';info.innerHTML=`<div class="si-name">${def.n}</div><div class="si-desc">쿨타임 ${def.maxCd}초. 광역 스킬.</div>`;
    const cost=document.createElement('div');cost.className='si-cost';cost.textContent=already?'✅':'💰'+def.unlockCost;
    d.appendChild(cvs);d.appendChild(info);d.appendChild(cost);
    if(!already)d.onclick=()=>unlockSkill(def.id);
    el.appendChild(d);
  }
}

function buyItem(id){
  const item=SHOP_ITEMS.find(x=>x.id===id);
  if(!item||item.bought||P.gold<item.cost)return;
  P.gold-=item.cost;item.bought=true;
  const sp=toS(P.wx,P.wy);addFloat(sp.x,sp.y-40,`✅ ${item.n}`,'#a5d6a7');
  if(item.type==='turret'){
    shop.turretLv=item.lv;turrets.length=0;
    const cnt=item.lv===1?2:item.lv===2?3:4;
    const angles=[Math.PI*0.25,Math.PI*0.75,Math.PI*1.25,Math.PI*1.75];
    for(let i=0;i<cnt;i++){const a=angles[i];turrets.push({wx:camp.wx+Math.cos(a)*4.5,wy:camp.wy+Math.sin(a)*4.5,atkCool:0,lv:item.lv,angle:0});}
  }
  if(item.type==='wall'){shop.wall=true;buildWalls();}
  if(item.type==='chef'){shop.chefLv=item.lv;}
  if(item.type==='price'){shop.priceMul*=item.val;}
  if(item.type==='bag'){P.maxMeat+=item.val;}
  if(item.type==='regen'){shop.regen+=item.val;}
  if(item.type==='turretUpg'){shop.xbow=true;}
  updateUI();renderShopItems();renderBar();
}

function unlockSkill(id){
  const def=SKILL_DEFS.find(x=>x.id===id);
  if(!def||skills.some(s=>s.def.id===id)||P.gold<def.unlockCost)return;
  P.gold-=def.unlockCost;skills.push({def,cd:0});
  addFloat(W/2,H/2-60,`✨ ${def.n} 언락!`,'#ffd54f');
  renderSkillBtns();renderShopItems();updateUI();
}

function buildWalls(){
  walls.length=0;const pts=14;
  for(let i=0;i<pts;i++){const a=i/pts*Math.PI*2;walls.push({wx:camp.wx+Math.cos(a)*6,wy:camp.wy+Math.sin(a)*6,hp:300,maxHp:300});}
}

function renderBar(){
  const bar=document.getElementById('upgBar');let h='';
  for(const[k,u]of Object.entries(UPGRADES)){
    if(u.isShop){h+=`<div class="ub can-buy" data-k="${k}" style="background:rgba(245,127,23,0.18)"><span class="ub-ico">🏪</span><div class="ub-name">상점</div><div class="ub-lv">방어/스킬</div><div class="ub-cost" style="color:#ff9800">OPEN</div></div>`;continue;}
    const maxed=u.lv>=u.max,can=!maxed&&P.gold>=u.cost;
    let ico=u.ico;if(k==='wpn')ico=wpn().ico;
    h+=`<div class="ub${maxed?'':can?' can-buy':' dim'}" data-k="${k}"><span class="ub-ico">${ico}</span><div class="ub-name">${u.n}</div><div class="ub-lv">Lv${u.lv}${maxed?'':'/'+u.max}</div><div class="ub-cost">${maxed?'MAX':'💰'+u.cost}</div></div>`;
  }
  bar.innerHTML=h;
  bar.querySelectorAll('.ub').forEach(el=>{
    const k=el.dataset.k;
    const fn=(e)=>{e.stopPropagation();if(UPGRADES[k].isShop)openShop();else doUpg(k);};
    el.ontouchstart=fn;el.onclick=fn;
  });
}

function doUpg(k){
  const u=UPGRADES[k];if(u.lv>=u.max||P.gold<u.cost)return;
  P.gold-=u.cost;u.lv++;u.cost=Math.ceil(u.cost*u.cm);
  if(k==='hp'){P.maxHp=getHpMax();P.hp=Math.min(P.hp+40,P.maxHp);}
  addFloat(toS(P.wx,P.wy).x,toS(P.wx,P.wy).y-35,`⬆️ ${u.n} Lv${u.lv}`,'#a5d6a7');
  updateUI();renderBar();
}

function updateUI(){
  document.getElementById('hM').textContent=Math.floor(P.meat)+'/'+P.maxMeat;
  document.getElementById('hCooked').textContent=P.cookedMeat;
  document.getElementById('hG').textContent=P.gold;
  document.getElementById('hK').textContent=P.kills;
  const pct=Math.max(0,P.hp/P.maxHp)*100;
  const hf=document.getElementById('hpFill');
  hf.style.width=pct+'%';
  hf.style.background=pct>50?'linear-gradient(90deg,#e53935,#ef9a9a)':pct>25?'linear-gradient(90deg,#e65100,#ffa726)':'linear-gradient(90deg,#b71c1c,#ef5350)';
  document.getElementById('hpTxt').textContent=Math.ceil(P.hp)+'/'+P.maxHp;
  if(!bossActive)document.getElementById('waveChip').textContent=`Wave ${wave} — ${Math.ceil(waveTimer)}s`;
  // 스킬 cd
  for(let i=0;i<skills.length;i++){const el=document.getElementById('skcd'+i);if(el){if(skills[i].cd>0){el.style.display='flex';el.textContent=Math.ceil(skills[i].cd);}else el.style.display='none';}}
  // 목표
  while(goalIdx<GOALS.length-1&&P.gold>=GOALS[goalIdx])goalIdx++;
  const gAmt=GOALS[Math.min(goalIdx,GOALS.length-1)];
  const gPrev=goalIdx>0?GOALS[goalIdx-1]:0;
  const gPct=Math.min(100,((P.gold-gPrev)/(gAmt-gPrev))*100)||0;
  document.getElementById('goalFill').style.width=gPct+'%';
  document.getElementById('goalTxt').textContent=P.gold+'/'+gAmt;
}

function addFloat(x,y,txt,col){floats.push({x,y,txt,col,life:1});}
function showBanner(msg){const b=document.getElementById('banner');b.innerHTML=msg;b.classList.add('on');clearTimeout(b._t);b._t=setTimeout(()=>b.classList.remove('on'),2400);}
function showHit(){const el=document.getElementById('dmgOverlay');el.classList.add('on');clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove('on'),160);}

function spawnBear(boss){
  const sc=1+(wave-1)*0.22;
  const ang=Math.random()*Math.PI*2,dist=boss?20:9+Math.random()*6;
  const bx=P.wx+Math.cos(ang)*dist,by=P.wy+Math.sin(ang)*dist;
  if(boss){
    bears.push({wx:bx,wy:by,hp:800*sc,maxHp:800*sc,dmg:22+wave*5,spd:0.011,meat:60,sz:68,col:'#b71c1c',isBoss:true,frozen:false,frozenT:0,_dead:false});
    showBanner(`🚨 BOSS!! Wave ${wave} 🚨`);
    const wc=document.getElementById('waveChip');wc.textContent='⚠️ BOSS!';wc.style.background='linear-gradient(135deg,#b71c1c,#7f0000)';wc.style.borderColor='#ef5350';
    bossActive=true;
  } else {
    const cols=['#ede8e0','#a5836a','#78909c','#5d8aa8'];
    bears.push({wx:bx,wy:by,hp:Math.ceil((18+wave*12)*sc),maxHp:Math.ceil((18+wave*12)*sc),dmg:4+wave*1.5,spd:0.013+wave*0.0008,meat:Math.ceil(2+wave*0.7),sz:36,col:cols[Math.floor(Math.random()*cols.length)],isBoss:false,frozen:false,frozenT:0,_dead:false});
  }
}

function hitBear(b,dmg,crit){
  if(b._dead)return;const d=crit?dmg*2.5:dmg;b.hp-=d;
  const sp=toS(b.wx,b.wy);addFloat(sp.x+(Math.random()-0.5)*20,sp.y-b.sz*0.5-8,(crit?'💥':'')+Math.ceil(d),crit?'#ffcc00':'#ffbbaa');
  if(b.hp<=0)killBear(b);
}

function killBear(b){
  if(b._dead)return;b._dead=true;P.kills++;
  const sp=toS(b.wx,b.wy);
  for(let i=0;i<14;i++){const a=Math.random()*Math.PI*2,s=2+Math.random()*6;parts.push({x:sp.x,y:sp.y,vx:Math.cos(a)*s,vy:Math.sin(a)*s-3,col:'#c62828',r:3+Math.random()*3,life:1});}
  for(let i=0;i<b.meat;i++){const a=Math.random()*Math.PI*2,s=0.05+Math.random()*0.1;drops.push({wx:b.wx+(Math.random()-0.5),wy:b.wy+(Math.random()-0.5),vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:20+Math.random()*5});}
  bears.splice(bears.indexOf(b),1);
  if(b.isBoss){
    bossActive=false;wave++;waveDur=Math.max(25,45-wave*1.5);waveTimer=waveDur;
    const wc=document.getElementById('waveChip');wc.style.background='';wc.style.borderColor='';
    P.gold+=Math.ceil(250*wave);addFloat(sp.x,sp.y-70,`💰+${Math.ceil(250*wave)} 보스처치!`,'#ffd54f');
    showBanner(`✅ Wave ${wave} 시작!`);
  }
}

function gameLoop(ts){
  if(!running)return;
  const dt=Math.min((ts-lastT)/1000,0.05);lastT=ts;
  update(dt);draw();renderMM();
  requestAnimationFrame(gameLoop);
}

function update(dt){
  if(P.dead)return;
  let skCh=false;for(const sk of skills)if(sk.cd>0){sk.cd=Math.max(0,sk.cd-dt);skCh=true;}
  if(skCh)renderSkillBtns();

  if(!bossActive){waveTimer-=dt;if(waveTimer<=0)spawnBear(true);}

  if(shop.regen>0){P.regenT+=dt;if(P.regenT>=1){P.hp=Math.min(P.maxHp,P.hp+P.maxHp*shop.regen);P.regenT=0;}}
  if(P.iFrames>0)P.iFrames-=dt;

  spawnT-=dt;
  if(spawnT<=0&&!bossActive){
    const maxB=6+wave*3;
    if(bears.length<maxB){const cnt=Math.min(2+Math.floor(wave/1.5),10);for(let i=0;i<cnt;i++)spawnBear(false);}
    spawnT=Math.max(0.5,3.5-wave*0.28);
  }

  custSpawnT-=dt;
  if(custSpawnT<=0&&customers.length<10){
    customers.push({wx:camp.wx+18+Math.random()*3,wy:camp.wy+10+Math.random()*5,state:'walking',got:0,want:1+Math.floor(Math.random()*5),col:['#1976d2','#7b1fa2','#388e3c','#c0392b','#d35400'][Math.floor(Math.random()*5)]});
    custSpawnT=Math.max(2,6-wave*0.18);
  }

  let mdx=0,mdy=0;
  if(keys['arrowup']||keys['w']){mdy-=1;mdx-=1;ptr.active=false;}
  if(keys['arrowdown']||keys['s']){mdy+=1;mdx+=1;ptr.active=false;}
  if(keys['arrowleft']||keys['a']){mdx-=1;mdy+=1;ptr.active=false;}
  if(keys['arrowright']||keys['d']){mdx+=1;mdy-=1;ptr.active=false;}
  if(mdx===0&&mdy===0&&ptr.active){
    const tdx=ptr.wx-P.wx,tdy=ptr.wy-P.wy,d=Math.hypot(tdx,tdy);
    if(d>0.4){mdx=tdx;mdy=tdy;}else ptr.active=false;
  }
  if(mdx!==0||mdy!==0){
    const len=Math.hypot(mdx,mdy),spd=getSpd();
    P.wx+=(mdx/len)*spd;P.wy+=(mdy/len)*spd;
    for(const t of trees){const dx=P.wx-t.wx,dy=P.wy-t.wy,d=Math.hypot(dx,dy);if(d<0.62){P.wx+=(dx/d)*(0.62-d);P.wy+=(dy/d)*(0.62-d);}}
    P.angle=Math.atan2((mdx+mdy)*ISO_Y,(mdx-mdy)*ISO_X);
  }
  cam.x+=(P.wx-cam.x)*0.1;cam.y+=(P.wy-cam.y)*0.1;

  if(P.atkCool>0)P.atkCool-=dt;
  const w=wpn();let target=null,minD=w.range;
  for(const b of bears){const d=Math.hypot(P.wx-b.wx,P.wy-b.wy);if(d<minD){minD=d;target=b;}}
  if(target&&P.atkCool<=0){
    const tSp=toS(target.wx,target.wy),pSp=toS(P.wx,P.wy);
    P.angle=Math.atan2(tSp.y-pSp.y,tSp.x-pSp.x);P.swingT=0.22;P.atkCool=w.spd;
    const dmg=getWpnDmg(),crit=Math.random()<0.12;
    if(w.proj){
      const a=Math.atan2(tSp.y-pSp.y,tSp.x-pSp.x);
      projs.push({x:pSp.x,y:pSp.y-12,vx:Math.cos(a)*20,vy:Math.sin(a)*20,dmg,col:w.col,life:1,aoe:w.aoe});
      if(w.aoe>0)for(let i=0;i<4;i++){const s=(Math.random()-0.5)*0.5;projs.push({x:pSp.x,y:pSp.y-12,vx:Math.cos(a+s)*17,vy:Math.sin(a+s)*17,dmg:dmg*0.5,col:w.col,life:1,aoe:0});}
    } else {
      if(w.aoe>0){swings.push({x:pSp.x,y:pSp.y,r:0,maxR:w.aoe*38,life:1.2,col:[255,220,50]});for(const b2 of[...bears])if(Math.hypot(b2.wx-P.wx,b2.wy-P.wy)<=w.aoe)hitBear(b2,dmg,Math.random()<0.15);}
      else{swings.push({x:pSp.x,y:pSp.y,r:0,maxR:70,life:1,col:[200,220,255]});hitBear(target,dmg,crit);}
    }
  }
  if(P.swingT>0)P.swingT-=dt;

  // 포탑
  for(const t of turrets){
    t.atkCool-=dt;if(t.atkCool>0)continue;
    const atkSpd=t.lv===1?0.8:t.lv===2?0.5:0.3,range=t.lv===1?6:t.lv===2?8:10;
    let tgt=null,td=range;
    for(const b of bears){const d=Math.hypot(t.wx-b.wx,t.wy-b.wy);if(d<td){td=d;tgt=b;}}
    if(tgt){
      t.atkCool=atkSpd;
      const tsp=toS(tgt.wx,tgt.wy),sp=toS(t.wx,t.wy);
      t.angle=Math.atan2(tsp.y-sp.y,tsp.x-sp.x);
      const dmg=(30+t.lv*40)*(1+wave*0.12);
      const aoeR=shop.xbow?2.5:0;
      projs.push({x:sp.x,y:sp.y-8,vx:Math.cos(t.angle)*16,vy:Math.sin(t.angle)*16,dmg,col:t.lv===3?'#c084fc':'#64b5f6',life:1.2,aoe:aoeR});
      if(t.lv===3)for(const off of[-0.35,0.35])projs.push({x:sp.x,y:sp.y-8,vx:Math.cos(t.angle+off)*16,vy:Math.sin(t.angle+off)*16,dmg:dmg*0.6,col:'#c084fc',life:1.2,aoe:0});
    }
  }

  // 방벽 충돌
  if(shop.wall){
    for(const b of bears){if(b._dead||b.frozen)continue;for(const wl of walls){const d=Math.hypot(b.wx-wl.wx,b.wy-wl.wy);if(d<0.8){b.wx-=(b.wx-wl.wx)/d*0.06;b.wy-=(b.wy-wl.wy)/d*0.06;}}}
  }

  // 적 이동 & 피격
  for(const b of bears){
    if(b._dead)continue;if(b.frozen){b.frozenT-=dt;if(b.frozenT<=0)b.frozen=false;continue;}
    const dx=P.wx-b.wx,dy=P.wy-b.wy,d=Math.hypot(dx,dy)||1;
    b.wx+=(dx/d)*b.spd;b.wy+=(dy/d)*b.spd;
    if(d<0.85&&P.iFrames<=0){P.hp-=b.dmg*dt*2.5;P.iFrames=0.07;if(Math.random()<0.18)showHit();if(P.hp<=0){P.dead=true;running=false;showGO();return;}}
  }

  // 드롭
  for(let i=drops.length-1;i>=0;i--){
    const d=drops[i];d.life-=dt;d.wx+=d.vx;d.wy+=d.vy;d.vx*=0.88;d.vy*=0.88;
    if(d.life<=0){drops.splice(i,1);continue;}
    if(Math.hypot(P.wx-d.wx,P.wy-d.wy)<1.2&&P.meat<P.maxMeat){P.meat++;drops.splice(i,1);addFloat(toS(P.wx,P.wy).x+(Math.random()-0.5)*15,toS(P.wx,P.wy).y-28,'+🥩','#ef9a9a');}
  }

  // 캠프 납품
  const cd=Math.hypot(P.wx-camp.wx,P.wy-camp.wy);
  const hasChef=shop.chefLv>0;
  if(cd<3.5&&P.meat>0){cookT-=dt;if(cookT<=0){P.meat--;campMeat++;cookT=0.08;}}
  if((cd<3.5||hasChef)&&campMeat>0&&P.cookedMeat<50){
    cookProg+=dt*(1+shop.chefLv*1.2);
    if(cookProg>=1.6){campMeat--;P.cookedMeat++;cookProg=0;addFloat(toS(camp.wx,camp.wy).x-10,toS(camp.wx,camp.wy).y-55,'🍖+1','#ffcc80');}
  } else if(cd>=3.5&&!hasChef) cookProg=0;

  // 손님
  sellT-=dt;
  for(let i=customers.length-1;i>=0;i--){
    const c=customers[i];
    const tWx=camp.wx+3.5,tWy=camp.wy+2+i*1.4;
    if(c.state==='walking'){const dx=tWx-c.wx,dy=tWy-c.wy,d=Math.hypot(dx,dy);if(d>0.15){c.wx+=(dx/d)*0.025;c.wy+=(dy/d)*0.025;}else c.state='waiting';}
    else if(c.state==='waiting'){
      const dy=tWy-c.wy;if(Math.abs(dy)>0.1)c.wy+=dy*0.05;
      if(i===0&&sellT<=0&&P.cookedMeat>0&&(cd<3.5||hasChef)){
        P.cookedMeat--;c.got++;const earn=getSell();P.gold+=earn;
        addFloat(toS(c.wx,c.wy).x,toS(c.wx,c.wy).y-35,`+${earn}💰`,'#ffd54f');
        sellT=hasChef?0.1:0.25;if(c.got>=c.want)c.state='leaving';
      }
    }
    else if(c.state==='leaving'){c.wx+=0.04;c.wy+=0.05;if(c.wy>cam.y+28)customers.splice(i,1);}
  }

  // 투사체
  for(let i=projs.length-1;i>=0;i--){
    const p=projs[i];p.x+=p.vx;p.y+=p.vy;p.life-=dt*1.5;
    let hit=false;
    for(const b of bears){
      if(b._dead)continue;
      const sp=toS(b.wx,b.wy);
      if(Math.hypot(p.x-sp.x,p.y-sp.y)<b.sz*0.9){
        if(p.aoe>0){for(const b2 of[...bears])if(Math.hypot(b2.wx-b.wx,b2.wy-b.wy)<=p.aoe)hitBear(b2,p.dmg*0.8,false);swings.push({x:sp.x,y:sp.y,r:0,maxR:p.aoe*38,life:0.8,col:[255,140,30]});}
        else hitBear(b,p.dmg,Math.random()<0.1);
        projs.splice(i,1);hit=true;break;
      }
    }
    if(!hit&&(p.life<=0||p.x<-200||p.x>W+200||p.y<-200||p.y>H+200))projs.splice(i,1);
  }

  for(let i=parts.length-1;i>=0;i--){const p=parts[i];p.x+=p.vx;p.y+=p.vy;p.vy+=0.2;p.life-=dt*2.2;if(p.life<=0)parts.splice(i,1);}
  for(let i=swings.length-1;i>=0;i--){const s=swings[i];s.r+=260*dt;s.life-=dt*2.8;if(s.life<=0)swings.splice(i,1);}
  for(let i=floats.length-1;i>=0;i--){const f=floats[i];f.y-=40*dt;f.life-=dt*1.1;if(f.life<=0)floats.splice(i,1);}
  for(let i=skillEffects.length-1;i>=0;i--){
    const se=skillEffects[i];se.life-=dt;
    if(se.life<=0){skillEffects.splice(i,1);continue;}
    if(se.type==='meteor'||se.type==='thunder')se.pr=(se.maxLife-se.life)/se.maxLife;
    if(se.type==='nuke'||se.type==='blizzard')se.r=(1-(se.life/se.maxLife))*Math.max(W,H)*0.8;
  }
  for(const s of snowflakes){s.x+=s.dx;s.y+=s.sp;if(s.y>H+5){s.y=-5;s.x=Math.random()*W;}if(s.x<0)s.x=W;if(s.x>W)s.x=0;}

  updateUI();
}

function draw(){
  ctx.fillStyle='#b0c8d4';ctx.fillRect(0,0,W,H);
  const cX=Math.floor(cam.x),cY=Math.floor(cam.y),r=14;
  for(let tx=cX-r;tx<=cX+r;tx++)for(let ty=cY-r;ty<=cY+r;ty++){
    const a=toS(tx,ty),b=toS(tx+1,ty),c=toS(tx+1,ty+1),d=toS(tx,ty+1);
    if(c.x<-30||a.x>W+30||d.y<-30||b.y>H+UBH+30)continue;
    ctx.fillStyle=(tx+ty)%2===0?'#c5dce8':'#b8d0db';
    ctx.beginPath();ctx.moveTo(a.x,a.y);ctx.lineTo(b.x,b.y);ctx.lineTo(c.x,c.y);ctx.lineTo(d.x,d.y);ctx.closePath();ctx.fill();
    ctx.strokeStyle='rgba(150,185,205,0.3)';ctx.lineWidth=0.5;ctx.stroke();
  }

  drawCamp();

  // 방벽
  if(shop.wall){for(const wl of walls){if(wl.hp<=0)continue;const sp=toS(wl.wx,wl.wy);const hp=wl.hp/wl.maxHp;ctx.fillStyle=`rgba(${Math.floor(150+hp*50)},${Math.floor(200+hp*30)},255,0.65)`;ctx.beginPath();ctx.roundRect(sp.x-7,sp.y-17,14,21,3);ctx.fill();ctx.strokeStyle='rgba(200,240,255,0.5)';ctx.lineWidth=1;ctx.stroke();}}

  const ents=[];
  ents.push({t:'player',sy:toS(P.wx,P.wy).y});
  for(const b of bears)ents.push({t:'bear',obj:b,sy:toS(b.wx,b.wy).y});
  for(const c of customers)ents.push({t:'cust',obj:c,sy:toS(c.wx,c.wy).y});
  for(const tr of trees)ents.push({t:'tree',obj:tr,sy:toS(tr.wx,tr.wy).y});
  for(const d of drops)ents.push({t:'drop',obj:d,sy:toS(d.wx,d.wy).y});
  for(const t of turrets)ents.push({t:'turret',obj:t,sy:toS(t.wx,t.wy).y});
  ents.sort((a,b)=>a.sy-b.sy);
  for(const e of ents){
    if(e.sy<-130||e.sy>H+130)continue;
    if(e.t==='player')drawPlayer();
    else if(e.t==='bear')drawBear(e.obj);
    else if(e.t==='cust')drawCustomer(e.obj);
    else if(e.t==='tree')drawTree(e.obj);
    else if(e.t==='drop')drawDrop(e.obj);
    else if(e.t==='turret')drawTurret(e.obj);
  }

  drawEffects();

  if(ptr.active){const tp=toS(ptr.wx,ptr.wy);ctx.globalAlpha=0.4;ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.setLineDash([4,4]);ctx.beginPath();ctx.ellipse(tp.x,tp.y,18,9,0,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);ctx.globalAlpha=1;}

  for(const f of floats){
    ctx.globalAlpha=Math.max(0,f.life);ctx.fillStyle=f.col;ctx.font='bold 14px Jua';ctx.textAlign='center';
    ctx.shadowColor='#000';ctx.shadowBlur=5;ctx.fillText(f.txt,f.x,f.y);ctx.shadowBlur=0;
  }
  ctx.globalAlpha=1;ctx.textAlign='left';
}

  ctx.beginPath();ctx.arc(sz*0.56,-sz*0.48,sz*0.06,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=b.frozen?'#1565c0':'#212121';ctx.fillRect(sz*0.27-2,-sz*0.26-2,4,4);ctx.fillRect(sz*0.43-2,-sz*0.26-2,4,4);
  ctx.fillStyle='#000';ctx.beginPath();ctx.arc(sz*0.38,-sz*0.18,sz*0.07,0,Math.PI*2);ctx.fill();

  ctx.fillStyle='#8d6e63';ctx.beginPath();ctx.moveTo(cs.x,cs.y-22);ctx.lineTo(cs.x+110,cs.y+33);ctx.lineTo(cs.x,cs.y+58);ctx.lineTo(cs.x-110,cs.y+33);ctx.closePath();ctx.fill();

  ctx.fillStyle='#6d4c41';ctx.beginPath();ctx.moveTo(cs.x+110,cs.y+33);ctx.lineTo(cs.x+110,cs.y+45);ctx.lineTo(cs.x,cs.y+70);ctx.lineTo(cs.x,cs.y+58);ctx.closePath();ctx.fill();

  ctx.fillStyle='#5d4037';ctx.save();ctx.translate(fx,fy+2);ctx.rotate(0.3);ctx.fillRect(-18,-4,36,7);ctx.restore();

    ctx.fillStyle='rgba(255,255,150,0.6)';ctx.beginPath();ctx.ellipse(fx,fy-17,3,7*fl,0,0,Math.PI*2);ctx.fill();

  for(let i=0;i<cooked;i++){ctx.fillStyle=`hsl(35,85%,${45+i%3*3}%)`;ctx.fillRect(cs.x+20,cs.y+8-i*6,24,7);ctx.fillStyle='rgba(255,255,180,0.35)';ctx.fillRect(cs.x+22,cs.y+10-i*6,5,3);}

  ctx.fillStyle='#4e342e';ctx.fillRect(cs.x+50,cs.y-50,65,30);ctx.fillStyle='#3e2723';ctx.fillRect(cs.x+50,cs.y-20,65,10);
  ctx.fillStyle='#ffecb3';ctx.font='bold 11px Jua';ctx.textAlign='center';ctx.fillText(`💰 ${getSell()}원`,cs.x+82,cs.y-31);
  ctx.fillStyle='#a5d6a7';ctx.font='9px Jua';ctx.fillText(`🍖 재고:${P.cookedMeat}`,cs.x+82,cs.y-18);

  if(cookProg>0&&campMeat>0){ctx.fillStyle='rgba(0,0,0,0.5)';ctx.fillRect(cs.x-28,cs.y-32,52,7);ctx.fillStyle='#ffd54f';ctx.fillRect(cs.x-28,cs.y-32,52*(cookProg/1.6),7);ctx.fillStyle='#fff';ctx.font='8px Jua';ctx.textAlign='center';ctx.fillText('요리중...',cs.x-2,cs.y-26);}

  const d=Math.hypot(P.wx-camp.wx,P.wy-camp.wy);
  if(d<6){ctx.globalAlpha=0.1;ctx.strokeStyle='#fff';ctx.lineWidth=2;ctx.setLineDash([6,5]);ctx.beginPath();ctx.ellipse(cs.x,cs.y+22,200,90,0,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);ctx.globalAlpha=1;}
  ctx.textAlign='left';
}

function drawChef3D(x,y,lv){
  ctx.save();ctx.translate(x,y);
  ctx.fillStyle='rgba(0,0,0,0.22)';ctx.beginPath();ctx.ellipse(0,28,15,5,0,0,Math.PI*2);ctx.fill();
  // 다리
  ctx.fillStyle='#1a237e';ctx.fillRect(-7,12,6,16);ctx.fillRect(2,12,6,16);
  ctx.fillStyle='#283593';ctx.fillRect(-8,12,3,16);ctx.fillRect(1,12,3,16);
  ctx.fillStyle='#212121';ctx.beginPath();ctx.ellipse(-5,28,7,4,0.1,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(5,28,7,4,-0.1,0,Math.PI*2);ctx.fill();
  // 몸(앞치마)
  ctx.fillStyle='#fff';ctx.beginPath();ctx.ellipse(0,2,13,16,0,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#e8e8e8';ctx.fillRect(-6,0,12,14);
  ctx.strokeStyle='#bdbdbd';ctx.lineWidth=1;ctx.strokeRect(-6,0,12,14);
  ctx.strokeStyle='#bdbdbd';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(-6,0);ctx.lineTo(0,-6);ctx.lineTo(6,0);ctx.stroke();
  ctx.fillStyle='#f0f0f0';ctx.fillRect(-4,4,7,5);
  // 팔
  ctx.fillStyle='#fff';ctx.beginPath();ctx.ellipse(-16,-2,5,10,0.5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.ellipse(16,-2,5,10,-0.5,0,Math.PI*2);ctx.fill();
  ctx.fillStyle='#ffcc9f';ctx.beginPath();ctx.arc(-18,5,5,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(18,5,5,0,Math.PI*2);ctx.fill();
  // 프라이팬
  ctx.fillStyle='#546e7a';ctx.fillRect(18,-2,4,18);ctx.fillStyle='#90a4ae';ctx.beginPath();ctx.ellipse(26,14,10,7,-0.3,0,Math.PI*2);ctx.fill();
  if(cookProg>0){ctx.fillStyle='rgba(255,150,0,0.5)';ctx.beginPath();ctx.ellipse(26,14,8,5,-0.3,0,Math.PI*2);ctx.fill();}
  // 머리
  ctx.fillStyle='#ffcc9f';ctx.beginPath();ctx.arc(0,-16,11,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#5d4037';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(-6,-20);ctx.lineTo(-2,-21);ctx.stroke();ctx.beginPath();ctx.moveTo(6,-20);ctx.lineTo(2,-21);ctx.stroke();
  ctx.fillStyle='#212121';ctx.fillRect(-5,-18,3,3);ctx.fillRect(2,-18,3,3);
  ctx.strokeStyle='#c84b4b';ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(0,-13,4,0.1,Math.PI-0.1);ctx.stroke();
  ctx.fillStyle='rgba(255,150,150,0.4)';ctx.beginPath();ctx.arc(-7,-15,3,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(7,-15,3,0,Math.PI*2);ctx.fill();
  // 쉐프 모자
  ctx.fillStyle='#fff';ctx.fillRect(-9,-30,18,14);
  ctx.fillStyle='#f5f5f5';ctx.beginPath();ctx.ellipse(0,-30,11,5,0,0,Math.PI*2);ctx.fill();
  ctx.beginPath();ctx.ellipse(0,-38,8,10,0,0,Math.PI*2);ctx.fill();
  ctx.strokeStyle='#e0e0e0';ctx.lineWidth=1;ctx.strokeRect(-9,-30,18,14);
  if(lv>=2){ctx.fillStyle='#ffd54f';ctx.font='bold 7px Jua';ctx.textAlign='center';ctx.fillText('★★',0,-24);}
  ctx.restore();
}

function drawEffects(){
  for(const s of swings){const a=Math.min(s.life,0.65);ctx.globalAlpha=a;ctx.strokeStyle=`rgba(${s.col[0]},${s.col[1]},${s.col[2]},${a})`;ctx.lineWidth=s.life*8;ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.stroke();}ctx.globalAlpha=1;
  for(const p of projs){ctx.fillStyle=p.col;ctx.shadowColor=p.col;ctx.shadowBlur=6;ctx.beginPath();ctx.arc(p.x,p.y,p.aoe>0?8:4,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;}
  for(const p of parts){ctx.globalAlpha=Math.max(0,p.life);ctx.fillStyle=p.col;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();}ctx.globalAlpha=1;
  for(const se of skillEffects){
    if(se.type==='meteor'){
      const pr=se.pr||0,cx=se.x+(se.tx-se.x)*pr,cy=se.y+(se.ty-se.y)*pr;
      ctx.fillStyle='#ff6f00';ctx.shadowColor='#ff8c00';ctx.shadowBlur=16;ctx.beginPath();ctx.arc(cx,cy,10,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='rgba(255,200,0,0.7)';ctx.beginPath();ctx.arc(cx,cy,6,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0;
      for(let i=1;i<=5;i++){const tp=Math.max(0,pr-i*0.07);const tx=se.x+(se.tx-se.x)*tp,ty=se.y+(se.ty-se.y)*tp;ctx.fillStyle=`rgba(255,${100+i*22},0,${0.55-i*0.09})`;ctx.beginPath();ctx.arc(tx,ty,8-i,0,Math.PI*2);ctx.fill();}
    } else if(se.type==='thunder'){
      const pr=se.life/se.maxLife;ctx.strokeStyle=`rgba(200,130,255,${pr*0.9})`;ctx.lineWidth=3+pr*4;ctx.shadowColor='#9333ea';ctx.shadowBlur=16;
      ctx.beginPath();const sg=6;for(let i=0;i<=sg;i++){const t2=i/sg,nx=se.x+(se.tx-se.x)*t2+(i>0&&i<sg?(Math.random()-0.5)*18:0),ny=se.y+(se.ty-se.y)*t2;if(i===0)ctx.moveTo(nx,ny);else ctx.lineTo(nx,ny);}
      ctx.stroke();ctx.shadowBlur=0;
    } else if(se.type==='nuke'){
      const pr=1-se.life/se.maxLife;ctx.globalAlpha=Math.max(0,(se.life/se.maxLife)*0.5);
      const g=ctx.createRadialGradient(se.x,se.y,0,se.x,se.y,se.r*pr+10);
      g.addColorStop(0,'rgba(255,255,200,0.9)');g.addColorStop(0.4,'rgba(255,150,0,0.6)');g.addColorStop(1,'rgba(255,80,0,0)');
      ctx.fillStyle=g;ctx.beginPath();ctx.arc(se.x,se.y,(se.r*pr)+10,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
    } else if(se.type==='blizzard'){
      const pr=se.life/se.maxLife;ctx.globalAlpha=pr*0.28;
      const g=ctx.createRadialGradient(se.x,se.y,0,se.x,se.y,W);
      g.addColorStop(0,'rgba(200,240,255,0.8)');g.addColorStop(1,'rgba(100,180,255,0)');
      ctx.fillStyle=g;ctx.fillRect(0,0,W,H);ctx.globalAlpha=1;
    }
  }
  ctx.fillStyle='rgba(255,255,255,0.68)';
  for(const s of snowflakes){ctx.beginPath();ctx.arc(s.x,s.y,1.4,0,Math.PI*2);ctx.fill();}
}

function renderMM(){
  const mW=115,mH=115,msc=3;
  mmCtx.clearRect(0,0,mW,mH);
  mmCtx.fillStyle='rgba(4,10,28,0.88)';mmCtx.fillRect(0,0,mW,mH);
  mmCtx.strokeStyle='rgba(100,180,255,0.08)';mmCtx.lineWidth=1;
  for(let g=0;g<mW;g+=23){mmCtx.beginPath();mmCtx.moveTo(g,0);mmCtx.lineTo(g,mH);mmCtx.stroke();}
  for(let g=0;g<mH;g+=23){mmCtx.beginPath();mmCtx.moveTo(0,g);mmCtx.lineTo(mW,g);mmCtx.stroke();}
  const mm=(wx,wy)=>({x:mW/2+(wx-P.wx)*msc,y:mH/2+(wy-P.wy)*msc});
  const cs=mm(camp.wx,camp.wy);
  mmCtx.fillStyle='#ff9800';mmCtx.fillRect(cs.x-5,cs.y-5,10,10);
  mmCtx.strokeStyle='#ffd54f';mmCtx.lineWidth=1.5;mmCtx.strokeRect(cs.x-5,cs.y-5,10,10);
  for(const b of bears){const bs=mm(b.wx,b.wy);mmCtx.fillStyle=b.isBoss?'#ff1744':'#ef5350';mmCtx.beginPath();mmCtx.arc(bs.x,bs.y,b.isBoss?4:2.5,0,Math.PI*2);mmCtx.fill();}
  for(const t of turrets){const ts=mm(t.wx,t.wy);mmCtx.fillStyle='#64b5f6';mmCtx.fillRect(ts.x-3,ts.y-3,6,6);}
  mmCtx.fillStyle='#fff';mmCtx.beginPath();mmCtx.arc(mW/2,mH/2,4,0,Math.PI*2);mmCtx.fill();
  mmCtx.strokeStyle='#4fc3f7';mmCtx.lineWidth=2;mmCtx.stroke();
  mmCtx.strokeStyle='rgba(100,180,255,0.18)';mmCtx.lineWidth=1;mmCtx.beginPath();mmCtx.arc(mW/2,mH/2,mW/2-2,0,Math.PI*2);mmCtx.stroke();
}

function showGO(){
  document.getElementById('goStats').innerHTML=`Wave <b>${wave}</b> | 킬 <b>${P.kills}</b> | 골드 <b>${P.gold}</b>`;
  document.getElementById('gameOver').classList.remove('h');
}

function startGame(){
  document.getElementById('pop').classList.add('h');
  initWorld();running=true;lastT=performance.now();
  showBanner('❄️ 생존을 시작하라!');
  renderBar();renderSkillBtns();updateUI();
  requestAnimationFrame(gameLoop);
}

function respawn(){
  P.gold=Math.floor(P.gold*0.7);P.hp=P.maxHp;P.dead=false;
  P.wx=camp.wx;P.wy=camp.wy;
  bears.length=0;projs.length=0;skillEffects.length=0;bossActive=false;
  document.getElementById('gameOver').classList.add('h');
  running=true;lastT=performance.now();
  showBanner('🔄 부활!');requestAnimationFrame(gameLoop);
}

document.getElementById('startBtn').onclick=startGame;
document.getElementById('respawnBtn').onclick=respawn;
renderBar();updateUI();
</script>
